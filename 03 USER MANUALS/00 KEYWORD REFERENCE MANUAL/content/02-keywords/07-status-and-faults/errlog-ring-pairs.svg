<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="ErrLog stores 128 event pairs in a circular buffer of 256 elements; the upper 8 bits of each code element tag the source axis or thread, the lower 24 bits hold the error code.">
  <title>ErrLog 128-pair circular buffer and tagged code layout</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <!-- Top: ring of 128 pairs (256 elements) -->
  <text x="20" y="20" font-weight="bold">ErrLog: 128 event pairs in a circular buffer (256 used elements; index [0] unused)</text>

  <!-- pair cells -->
  <g>
    <rect x="20" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="50" y="58" text-anchor="middle" font-size="11">[1]</text>
    <text x="50" y="73" text-anchor="middle" font-size="10">code</text>

    <rect x="80" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="110" y="58" text-anchor="middle" font-size="11">[2]</text>
    <text x="110" y="73" text-anchor="middle" font-size="10">time</text>

    <rect x="150" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="180" y="58" text-anchor="middle" font-size="11">[3]</text>
    <text x="180" y="73" text-anchor="middle" font-size="10">code</text>

    <rect x="210" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="240" y="58" text-anchor="middle" font-size="11">[4]</text>
    <text x="240" y="73" text-anchor="middle" font-size="10">time</text>

    <text x="305" y="68" text-anchor="middle">. . .</text>

    <rect x="340" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="370" y="58" text-anchor="middle" font-size="11">[253]</text>
    <text x="370" y="73" text-anchor="middle" font-size="10">code</text>

    <rect x="400" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="430" y="58" text-anchor="middle" font-size="11">[254]</text>
    <text x="430" y="73" text-anchor="middle" font-size="10">time</text>

    <rect x="460" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="490" y="58" text-anchor="middle" font-size="11">[255]</text>
    <text x="490" y="73" text-anchor="middle" font-size="10">code</text>

    <rect x="520" y="40" width="60" height="44" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="550" y="58" text-anchor="middle" font-size="11">[256]</text>
    <text x="550" y="73" text-anchor="middle" font-size="10">time</text>
  </g>

  <!-- wrap arrow -->
  <path d="M 580 30 C 660 0 660 110 600 110 L 60 110 C 0 110 0 30 50 30" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="760" y="135" text-anchor="end" font-size="11" fill="#5b6b7b">wraps to [1] when full (oldest pair overwritten)</text>

  <!-- pair brackets -->
  <text x="80" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">pair 1</text>
  <text x="210" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">pair 2</text>
  <text x="400" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">pair 127</text>
  <text x="520" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">pair 128</text>

  <!-- Bottom: tagged code element layout -->
  <text x="20" y="160" font-weight="bold">Element 1 of a pair (tagged code) — 32-bit layout</text>

  <rect x="20" y="180" width="240" height="52" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="140" y="200" text-anchor="middle">upper 8 bits</text>
  <text x="140" y="220" text-anchor="middle" font-size="11">source tag</text>

  <rect x="260" y="180" width="500" height="52" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="510" y="200" text-anchor="middle">lower 24 bits</text>
  <text x="510" y="220" text-anchor="middle" font-size="11">error code (same value as ConFlt for controller faults)</text>

  <!-- decoding -->
  <text x="20" y="260" font-weight="bold">Decode an entry at index k</text>
  <text x="20" y="280" font-size="12">code &#160; = ErrLog[k] &amp; 0xFFFFFF</text>
  <text x="20" y="298" font-size="12">source = (ErrLog[k] &gt;&gt; 24) &amp; 0xFF &#160; (0 = non-axis, 1 = axis A, 2 = axis B, ... , 16+n = user-program thread n)</text>
</svg>
