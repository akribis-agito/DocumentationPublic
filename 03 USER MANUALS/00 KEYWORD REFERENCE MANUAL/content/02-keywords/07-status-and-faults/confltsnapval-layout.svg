<svg xmlns="http://www.w3.org/2000/svg" width="780" height="280" viewBox="0 0 780 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="ConFltSnapVal layout: slots 1 to 4 hold values selected by ConFltSnapSrc, slots 5 to 14 hold hard-coded system parameters frozen at the fault.">
  <title>ConFltSnapVal 14-slot snapshot layout</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="20" y="20" font-weight="bold">ConFltSnapVal — fixed 14-slot snapshot taken atomically at the fault</text>

  <!-- ConFltSnapSrc on the left, user slots -->
  <text x="120" y="58" text-anchor="middle" font-weight="bold" font-size="12">ConFltSnapSrc[1..4]</text>
  <text x="120" y="76" text-anchor="middle" font-size="11" fill="#5b6b7b">user-configured (complex CAN codes)</text>

  <g>
    <rect x="40" y="90" width="160" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="120" y="110" text-anchor="middle" font-size="12">ConFltSnapSrc[1]</text>
    <rect x="40" y="124" width="160" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="120" y="144" text-anchor="middle" font-size="12">ConFltSnapSrc[2]</text>
    <rect x="40" y="158" width="160" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="120" y="178" text-anchor="middle" font-size="12">ConFltSnapSrc[3]</text>
    <rect x="40" y="192" width="160" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="120" y="212" text-anchor="middle" font-size="12">ConFltSnapSrc[4]</text>
  </g>

  <!-- arrows -->
  <line x1="200" y1="105" x2="280" y2="105" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="200" y1="139" x2="280" y2="139" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="200" y1="173" x2="280" y2="173" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="200" y1="207" x2="280" y2="207" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- right side: 14 slots -->
  <text x="500" y="58" text-anchor="middle" font-weight="bold" font-size="12">ConFltSnapVal[1..14]</text>
  <text x="500" y="76" text-anchor="middle" font-size="11" fill="#5b6b7b">frozen values</text>

  <g>
    <rect x="290" y="90" width="420" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="310" y="110" font-size="12">[1]</text>
    <text x="500" y="110" text-anchor="middle" font-size="12">user-selected parameter 1</text>

    <rect x="290" y="124" width="420" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="310" y="144" font-size="12">[2]</text>
    <text x="500" y="144" text-anchor="middle" font-size="12">user-selected parameter 2</text>

    <rect x="290" y="158" width="420" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="310" y="178" font-size="12">[3]</text>
    <text x="500" y="178" text-anchor="middle" font-size="12">user-selected parameter 3</text>

    <rect x="290" y="192" width="420" height="30" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="310" y="212" font-size="12">[4]</text>
    <text x="500" y="212" text-anchor="middle" font-size="12">user-selected parameter 4</text>
  </g>

  <!-- fixed system slots row -->
  <rect x="290" y="232" width="420" height="34" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="310" y="252" font-size="12">[5..14]</text>
  <text x="500" y="252" text-anchor="middle" font-size="12">fixed system parameters (StatReg, MotionStat, Pos, Vel,</text>
  <text x="500" y="263" text-anchor="middle" font-size="11">current, ConFlt, HW-prot bits, MotorReason, motion reason, time)</text>

  <!-- group labels on right (clear of slot text) -->
  <text x="740" y="158" font-size="11" fill="#5b6b7b">user</text>
  <text x="740" y="252" font-size="11" fill="#5b6b7b">system</text>
</svg>
