<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="The position reference is differenced once for velocity (scaled by VelFFW and divided by 2^16) and twice for acceleration (scaled by AccFFW and divided by 2^8); the two feedforward terms sum, pass through the feedforward filter, then add to the velocity-loop output to form CurrRefCtrl.">
  <title>Feedforward signal structure</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
  </defs>

  <!-- Reference input -->
  <text x="58" y="120" text-anchor="middle">Position</text>
  <text x="58" y="136" text-anchor="middle">reference</text>
  <line x1="58" y1="148" x2="58" y2="70" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="58" y1="148" x2="58" y2="160" stroke="#1f2933" stroke-width="1.4"/>

  <!-- top branch: acceleration -->
  <line x1="58" y1="70" x2="118" y2="70" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="120" y="52" width="170" height="36" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="205" y="68" text-anchor="middle">Second difference</text>
  <text x="205" y="83" text-anchor="middle" font-size="11">(reference acceleration)</text>
  <line x1="290" y1="70" x2="318" y2="70" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="320" y="52" width="70" height="36" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="355" y="74" text-anchor="middle">AccFFW</text>
  <line x1="390" y1="70" x2="430" y2="70" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="432" y="52" width="64" height="36" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="464" y="68" text-anchor="middle">&#215; 1/2&#8312;</text>
  <text x="464" y="83" text-anchor="middle" font-size="11">(1/256)</text>

  <!-- bottom branch: velocity -->
  <line x1="58" y1="160" x2="118" y2="160" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="120" y="142" width="170" height="36" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="205" y="158" text-anchor="middle">Filtered derivative</text>
  <text x="205" y="173" text-anchor="middle" font-size="11">dPosRef (ref velocity)</text>
  <line x1="290" y1="160" x2="318" y2="160" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="320" y="142" width="70" height="36" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="355" y="164" text-anchor="middle">VelFFW</text>
  <line x1="390" y1="160" x2="430" y2="160" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="432" y="142" width="64" height="36" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="464" y="158" text-anchor="middle">&#215; 1/2&#185;&#8310;</text>
  <text x="464" y="173" text-anchor="middle" font-size="11">(1/65536)</text>

  <!-- summing of FF terms -->
  <line x1="496" y1="70" x2="540" y2="70" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="540" y1="70" x2="540" y2="103" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="496" y1="160" x2="540" y2="160" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="540" y1="160" x2="540" y2="137" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="515" y="100" width="50" height="40" rx="20" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="540" y="125" text-anchor="middle">&#931;</text>

  <!-- FF filter -->
  <line x1="565" y1="120" x2="603" y2="120" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="605" y="100" width="100" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="655" y="116" text-anchor="middle">Feedforward</text>
  <text x="655" y="131" text-anchor="middle">filter</text>

  <!-- final sum with velocity-loop output -->
  <line x1="705" y1="120" x2="743" y2="120" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="745" y="100" width="50" height="40" rx="20" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="770" y="125" text-anchor="middle">&#931;</text>
  <text x="770" y="230" text-anchor="middle">Velocity</text>
  <text x="770" y="246" text-anchor="middle">loop output</text>
  <line x1="770" y1="218" x2="770" y2="142" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="795" y1="120" x2="840" y2="120" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="828" y="100" text-anchor="middle">CurrRefCtrl</text>

  <text x="440" y="300" text-anchor="middle" fill="#1f2933">Feedforwards act only in position operation mode and add into the current reference.</text>
</svg>
