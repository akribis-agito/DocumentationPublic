<svg xmlns="http://www.w3.org/2000/svg" width="860" height="280" viewBox="0 0 860 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="430" y="22" text-anchor="middle" font-weight="bold">Two locations the position-loop filters act on</text>

  <!-- Profiler -->
  <rect x="30" y="80" width="100" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="80" y="100" text-anchor="middle">Profiler</text>
  <text x="80" y="118" text-anchor="middle" fill="#5b6b7b">output</text>

  <!-- post-profiler filter (index 1) -->
  <line x1="130" y1="105" x2="168" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="170" y="80" width="130" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="235" y="100" text-anchor="middle">Post-profiler filter</text>
  <text x="235" y="118" text-anchor="middle" fill="#5b6b7b">PosFiltOn[1]</text>

  <!-- PosRef label -->
  <line x1="300" y1="105" x2="338" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="340" y="98">PosRef</text>

  <!-- Sum -->
  <rect x="400" y="85" width="50" height="40" rx="20" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="425" y="110" text-anchor="middle">&#931;</text>
  <line x1="390" y1="105" x2="398" y2="105" stroke="#5b6b7b" stroke-width="1.4"/>
  <text x="425" y="76" text-anchor="middle">+</text>

  <!-- Pos feedback into sum -->
  <text x="425" y="218" text-anchor="middle">Pos (feedback)</text>
  <line x1="425" y1="198" x2="425" y2="128" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="445" y="158">&#8722;</text>

  <!-- PosErr label, then index 2 filter -->
  <line x1="450" y1="105" x2="490" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="492" y="98">PosErr</text>

  <rect x="540" y="80" width="130" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="605" y="100" text-anchor="middle">Position-error filter</text>
  <text x="605" y="118" text-anchor="middle" fill="#5b6b7b">PosFiltOn[2]</text>
  <line x1="535" y1="105" x2="540" y2="105" stroke="#5b6b7b" stroke-width="1.4"/>

  <line x1="670" y1="105" x2="708" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="710" y="80" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="770" y="100" text-anchor="middle">PosGain (+PosKi,</text>
  <text x="770" y="118" text-anchor="middle">v5 only)</text>

  <text x="430" y="258" text-anchor="middle" fill="#5b6b7b">Index 1 shapes the reference before the error is formed; index 2 shapes the error before the position gain.</text>
</svg>
