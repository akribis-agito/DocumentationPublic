<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="PosFiltOn[1] shapes the profiler output before the position error is formed; PosFiltOn[2] shapes the error before the position gain. Pos feedback enters the summing node with a minus sign.">
  <title>PosFiltOn signal points</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" font-weight="bold">Two locations the position-loop filters act on</text>

  <!-- Profiler -->
  <rect x="20" y="80" width="100" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="70" y="100" text-anchor="middle">Profiler</text>
  <text x="70" y="118" text-anchor="middle" font-size="11" fill="#5b6b7b">output</text>

  <!-- post-profiler filter (index 1) -->
  <line x1="120" y1="105" x2="158" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="160" y="80" width="160" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="240" y="100" text-anchor="middle">Post-profiler filter</text>
  <text x="240" y="118" text-anchor="middle" font-size="11" fill="#5b6b7b">PosFiltOn[1]</text>

  <!-- PosRef line into sum -->
  <line x1="320" y1="105" x2="416" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="370" y="98" text-anchor="middle" font-size="11" fill="#5b6b7b">PosRef</text>

  <!-- Sum -->
  <circle cx="435" cy="105" r="17" fill="#fff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="435" y="111" text-anchor="middle" font-size="16">&#931;</text>
  <text x="421" y="98" font-size="11" fill="#5b6b7b">+</text>

  <!-- Pos feedback into sum -->
  <text x="435" y="218" text-anchor="middle" font-size="12">Pos (feedback)</text>
  <line x1="435" y1="200" x2="435" y2="124" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="456" y="138" font-size="13" fill="#5b6b7b">&#8722;</text>

  <!-- PosErr line out of sum -->
  <line x1="452" y1="105" x2="556" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="505" y="98" text-anchor="middle" font-size="11" fill="#5b6b7b">PosErr</text>
  <rect x="560" y="80" width="170" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="645" y="100" text-anchor="middle">Position-error filter</text>
  <text x="645" y="118" text-anchor="middle" font-size="11" fill="#5b6b7b">PosFiltOn[2]</text>

  <line x1="730" y1="105" x2="768" y2="105" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="770" y="80" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="830" y="100" text-anchor="middle">PosGain</text>
  <text x="830" y="118" text-anchor="middle" font-size="11" fill="#5b6b7b">(+ PosKi, v5 only)</text>

  <text x="450" y="258" text-anchor="middle" font-size="12" fill="#5b6b7b">Index 1 shapes the reference before the error is formed; index 2 shapes the error before the position gain.</text>
</svg>
