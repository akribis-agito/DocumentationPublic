<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="In true dual-loop, the motor encoder feeds the velocity loop while the load encoder closes the position loop; backlash between motor and load is bridged because each loop sees the right side of the coupling.">
  <title>Dual-loop feedback split</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-weight="bold">Dual-loop feedback split (DualLoopOn = 1)</text>

  <!-- Position loop block -->
  <rect x="40" y="60" width="180" height="60" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="130" y="84" text-anchor="middle">Position loop</text>
  <text x="130" y="102" text-anchor="middle" fill="#1f2933">PosGain (+ PosKi v5)</text>

  <line x1="220" y1="90" x2="258" y2="90" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Velocity loop block -->
  <rect x="260" y="60" width="180" height="60" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="350" y="84" text-anchor="middle">Velocity loop</text>
  <text x="350" y="102" text-anchor="middle" fill="#1f2933">VelGain / VelKi</text>

  <line x1="440" y1="90" x2="478" y2="90" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Current loop block -->
  <rect x="480" y="60" width="170" height="60" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="565" y="84" text-anchor="middle">Current loop</text>
  <text x="565" y="102" text-anchor="middle" fill="#1f2933">CurrGain / CurrKi</text>

  <line x1="650" y1="90" x2="688" y2="90" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Motor + compliant coupling -->
  <rect x="690" y="60" width="100" height="60" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="740" y="84" text-anchor="middle">Motor</text>
  <text x="740" y="102" text-anchor="middle" font-size="11" fill="#1f2933">+ compliant</text>

  <line x1="740" y1="120" x2="740" y2="148" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="690" y="150" width="100" height="50" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="740" y="180" text-anchor="middle">Load</text>

  <!-- Motor encoder feedback to velocity loop (routed at x=670 to avoid motor/load boxes) -->
  <text x="430" y="244" text-anchor="middle" font-size="12">Motor encoder (auxiliary)</text>
  <line x1="430" y1="248" x2="430" y2="225" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="430" y1="225" x2="670" y2="225" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="670" y1="225" x2="670" y2="135" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="670" y1="135" x2="350" y2="135" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="350" y1="135" x2="350" y2="124" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="540" y="148" font-size="11" fill="#1f2933">velocity feedback via DualLoopFact</text>

  <!-- Load encoder feedback to position loop (routed at x=805, then top at y=45) -->
  <text x="130" y="296" text-anchor="middle" font-size="12">Load encoder (main)</text>
  <line x1="130" y1="282" x2="130" y2="265" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="130" y1="265" x2="805" y2="265" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="805" y1="265" x2="805" y2="45" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="805" y1="45" x2="130" y2="45" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="130" y1="45" x2="130" y2="58" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="540" y="280" font-size="11" fill="#1f2933">position feedback (Pos)</text>

  <text x="410" y="328" text-anchor="middle" font-size="11" fill="#1f2933">Backlash between motor and load is bridged: load encoder closes the position loop, motor encoder damps velocity.</text>
</svg>
