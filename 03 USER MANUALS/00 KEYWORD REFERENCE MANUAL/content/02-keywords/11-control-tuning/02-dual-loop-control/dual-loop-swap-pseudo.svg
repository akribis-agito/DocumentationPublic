<svg xmlns="http://www.w3.org/2000/svg" width="820" height="290" viewBox="0 0 820 290" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="In pseudo dual-loop with DualEncSwapOn, only the motor encoder is used: a scaled copy (x DualLoopFact / 65536) closes the position loop in load units, and the raw signal closes the velocity loop.">
  <title>Pseudo dual-loop with swapped feedback</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-weight="bold">Pseudo dual-loop (DualLoopOn = 1, DualEncSwapOn = 1)</text>

  <!-- Position loop -->
  <rect x="40" y="60" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="130" y="84" text-anchor="middle">Position loop</text>

  <line x1="220" y1="90" x2="258" y2="90" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Velocity loop -->
  <rect x="260" y="60" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="350" y="84" text-anchor="middle">Velocity loop</text>

  <line x1="440" y1="90" x2="478" y2="90" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Current + plant -->
  <rect x="480" y="60" width="170" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="565" y="84" text-anchor="middle">Current loop</text>

  <line x1="650" y1="90" x2="690" y2="90" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="690" y="60" width="100" height="60" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="740" y="92" text-anchor="middle">Motor + load</text>

  <!-- single feedback source: motor encoder -->
  <line x1="740" y1="120" x2="740" y2="160" stroke="#5b6b7b" stroke-width="1.4"/>
  <rect x="650" y="160" width="180" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="740" y="180" text-anchor="middle">Motor encoder (AuxPos)</text>
  <text x="740" y="198" text-anchor="middle" fill="#5b6b7b">only feedback in use</text>

  <!-- branch 1: scaled to load units for position loop -->
  <line x1="650" y1="185" x2="440" y2="185" stroke="#5b6b7b" stroke-width="1.4"/>
  <rect x="280" y="168" width="160" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="192" text-anchor="middle" font-size="12">&#215; DualLoopFact / 65536</text>
  <line x1="280" y1="185" x2="130" y2="185" stroke="#5b6b7b" stroke-width="1.4"/>
  <line x1="130" y1="185" x2="130" y2="122" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="100" y="146" fill="#5b6b7b">Pos (load units)</text>

  <!-- branch 2: raw to velocity loop -->
  <line x1="740" y1="210" x2="740" y2="248" stroke="#5b6b7b" stroke-width="1.4"/>
  <line x1="740" y1="248" x2="350" y2="248" stroke="#5b6b7b" stroke-width="1.4"/>
  <line x1="350" y1="248" x2="350" y2="122" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="430" y="240" fill="#5b6b7b">velocity feedback</text>

  <text x="410" y="282" text-anchor="middle" fill="#5b6b7b">A single feedback drives both loops; an internal offset is captured at the switch so engaging is bumpless.</text>
</svg>
