<svg xmlns="http://www.w3.org/2000/svg" width="660" height="270" viewBox="0 0 660 270" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="VelErr fans out to a proportional path (x VelGain) and an integral path (x VelKi into an accumulator gated by anti-windup); P and I outputs sum into VelPI out. When the current loop saturates, a feedback line freezes the integrator.">
  <title>Velocity PI loop with anti-windup</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/>
    </marker>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/>
    </marker>
  </defs>

  <!-- VelErr input -->
  <rect x="14" y="110" width="86" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="57" y="135" text-anchor="middle">VelErr</text>

  <!-- VelGain (P) -->
  <rect x="140" y="50" width="100" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="190" y="75" text-anchor="middle">&#215; VelGain</text>

  <!-- VelKi multiplier on the I path -->
  <rect x="140" y="170" width="100" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="190" y="195" text-anchor="middle">&#215; VelKi</text>

  <!-- Anti-windup gate -->
  <rect x="270" y="170" width="80" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="310" y="188" text-anchor="middle" font-size="12">anti-</text>
  <text x="310" y="202" text-anchor="middle" font-size="12">windup</text>

  <!-- Integrator (accumulator) -->
  <rect x="370" y="170" width="100" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="420" y="195" text-anchor="middle">accumulate</text>

  <!-- Summing junction -->
  <circle cx="510" cy="130" r="14" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="510" y="134" text-anchor="middle">+</text>

  <!-- Output -->
  <rect x="554" y="110" width="86" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="597" y="135" text-anchor="middle">VelPI out</text>

  <!-- Arrows: VelErr fans out to P and I paths -->
  <path d="M100,130 L120,130 L120,70 L138,70" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M120,130 L120,190 L138,190" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- P path to summing junction -->
  <path d="M240,70 L490,70 L490,120" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- I path: VelKi -> gate -> accumulate -> sum -->
  <path d="M240,190 L268,190" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M350,190 L368,190" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M470,190 L510,190 L510,146" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Sum to output -->
  <path d="M524,130 L552,130" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Saturation feedback to anti-windup -->
  <path d="M597,150 L597,236 L310,236 L310,212" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
  <text x="450" y="258" text-anchor="middle" font-size="12" fill="#1f2933">current-loop saturation &#8594; freeze integrator</text>

  <!-- Path labels -->
  <text x="190" y="42" text-anchor="middle" font-size="11" fill="#1f2933">P path</text>
  <text x="190" y="164" text-anchor="middle" font-size="11" fill="#1f2933">I path</text>
</svg>
