<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5b8def"/>
    </marker>
  </defs>

  <!-- measured position -->
  <rect x="20" y="40" width="150" height="46" rx="4" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="95" y="60" text-anchor="middle">Measured position</text>
  <text x="95" y="77" text-anchor="middle">[Pos]</text>

  <!-- table lookup -->
  <rect x="230" y="30" width="180" height="66" rx="4" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="320" y="52" text-anchor="middle">Compensation table</text>
  <text x="320" y="69" text-anchor="middle">lookup + interpolation</text>
  <text x="320" y="86" text-anchor="middle">[CompFiltTble]</text>

  <!-- expected force -->
  <rect x="470" y="40" width="150" height="46" rx="4" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="545" y="60" text-anchor="middle">Expected force</text>
  <text x="545" y="77" text-anchor="middle">from position</text>

  <!-- measured force -->
  <rect x="20" y="200" width="150" height="46" rx="4" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="95" y="220" text-anchor="middle">Measured force</text>
  <text x="95" y="237" text-anchor="middle">[Force]</text>

  <!-- complementary filter -->
  <rect x="300" y="190" width="200" height="66" rx="4" fill="#fdecea" stroke="#e0736b"/>
  <text x="400" y="212" text-anchor="middle">Complementary filter</text>
  <text x="400" y="229" text-anchor="middle">low-pass [CompFiltFreq]</text>
  <text x="400" y="246" text-anchor="middle">blends the two sources</text>

  <!-- output -->
  <rect x="560" y="200" width="140" height="46" rx="4" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="630" y="220" text-anchor="middle">Force used by</text>
  <text x="630" y="237" text-anchor="middle">force control</text>

  <!-- arrows -->
  <line x1="170" y1="63" x2="228" y2="63" stroke="#5b8def" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="63" x2="468" y2="63" stroke="#5b8def" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="545" y1="86" x2="545" y2="150" stroke="#5b8def" stroke-width="1.5"/>
  <line x1="545" y1="150" x2="430" y2="150" stroke="#5b8def" stroke-width="1.5"/>
  <line x1="430" y1="150" x2="430" y2="188" stroke="#5b8def" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="223" x2="298" y2="223" stroke="#5b8def" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="223" x2="558" y2="223" stroke="#5b8def" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
