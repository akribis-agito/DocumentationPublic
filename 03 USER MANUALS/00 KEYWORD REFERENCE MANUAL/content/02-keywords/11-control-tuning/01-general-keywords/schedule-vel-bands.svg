<svg xmlns="http://www.w3.org/2000/svg" width="780" height="260" viewBox="0 0 780 260" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="390" y="22" text-anchor="middle" font-weight="bold">Velocity-band mapping (|velocity| compared against thresholds)</text>

  <!-- bands -->
  <rect x="40"  y="80" width="120" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="100" y="106" text-anchor="middle">Set 1</text>

  <rect x="160" y="80" width="120" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="220" y="106" text-anchor="middle">Set 2</text>

  <rect x="280" y="80" width="120" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="106" text-anchor="middle">Set 3</text>

  <rect x="400" y="80" width="120" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="460" y="106" text-anchor="middle">Set 4</text>

  <rect x="520" y="80" width="220" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="630" y="106" text-anchor="middle">Set 5</text>

  <!-- axis -->
  <line x1="40"  y1="150" x2="760" y2="150" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="760" y="168" text-anchor="end">|velocity|</text>

  <!-- threshold ticks and labels -->
  <line x1="160" y1="146" x2="160" y2="174" stroke="#5b6b7b" stroke-width="1.4"/>
  <text x="160" y="190" text-anchor="middle">ScheduleVel[1]</text>

  <line x1="280" y1="146" x2="280" y2="174" stroke="#5b6b7b" stroke-width="1.4"/>
  <text x="280" y="190" text-anchor="middle">ScheduleVel[2]</text>

  <line x1="400" y1="146" x2="400" y2="174" stroke="#5b6b7b" stroke-width="1.4"/>
  <text x="400" y="190" text-anchor="middle">ScheduleVel[3]</text>

  <line x1="520" y1="146" x2="520" y2="174" stroke="#5b6b7b" stroke-width="1.4"/>
  <text x="520" y="190" text-anchor="middle">ScheduleVel[4]</text>

  <text x="390" y="232" text-anchor="middle" fill="#5b6b7b">Mode 4 steps between sets at the thresholds. Mode 9 interpolates gains linearly across each band.</text>
  <text x="390" y="250" text-anchor="middle" fill="#5b6b7b">SchedulePos and ScheduleTemp follow the same band-mapping pattern.</text>
</svg>
