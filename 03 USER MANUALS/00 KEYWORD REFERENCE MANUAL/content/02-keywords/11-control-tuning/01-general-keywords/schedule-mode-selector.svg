<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <!-- Configured gain arrays (five sets) -->
  <rect x="30" y="30" width="220" height="190" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="140" y="50" text-anchor="middle" font-weight="bold">Configured gain arrays</text>
  <text x="140" y="68" text-anchor="middle" fill="#5b6b7b">(length 5, one element per set)</text>
  <text x="50" y="92" >PosGain[1..5]</text>
  <text x="50" y="110">VelGain[1..5]</text>
  <text x="50" y="128">VelKi[1..5]</text>
  <text x="50" y="146">VelFFW[1..5]</text>
  <text x="50" y="164">AccFFW[1..5]</text>
  <text x="50" y="182">PosKi[1..5] (v5)</text>
  <text x="140" y="208" text-anchor="middle" fill="#5b6b7b">All scheduled gains switch together.</text>

  <!-- Inputs feeding the selector -->
  <rect x="300" y="20" width="220" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="410" y="42" text-anchor="middle">ScheduleMode (you set the rule)</text>

  <rect x="300" y="62" width="220" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="410" y="84" text-anchor="middle">ScheduleVel / SchedulePos / ScheduleTemp</text>

  <rect x="300" y="104" width="220" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="410" y="126" text-anchor="middle">ScheduleTime (timing modes)</text>

  <rect x="300" y="146" width="220" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="410" y="168" text-anchor="middle">Motion / position / velocity / temperature</text>

  <line x1="520" y1="37"  x2="585" y2="148" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="520" y1="79"  x2="585" y2="158" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="520" y1="121" x2="585" y2="168" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="520" y1="163" x2="585" y2="178" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Selector -->
  <rect x="590" y="135" width="200" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="690" y="158" text-anchor="middle" font-weight="bold">Scheduler</text>
  <text x="690" y="178" text-anchor="middle">evaluates the rule</text>

  <line x1="250" y1="125" x2="588" y2="160" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="320" y="118" fill="#5b6b7b">five sets &#8594;</text>

  <line x1="690" y1="195" x2="690" y2="220" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="600" y="222" width="180" height="36" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="690" y="244" text-anchor="middle">ScheduleSet = 1..5</text>

  <line x1="690" y1="258" x2="690" y2="280" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="540" y="282" width="300" height="42" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="690" y="300" text-anchor="middle" font-weight="bold">ScheduleGains[1..6]</text>
  <text x="690" y="316" text-anchor="middle" fill="#5b6b7b">values the control loops use this cycle</text>

  <line x1="540" y1="305" x2="385" y2="358" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="180" y="338" width="200" height="34" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="280" y="360" text-anchor="middle">Position / velocity / feedforward</text>

  <text x="410" y="372" text-anchor="middle" fill="#5b6b7b">In interpolated modes (9, 10) the gains are blended linearly between adjacent sets.</text>
</svg>
