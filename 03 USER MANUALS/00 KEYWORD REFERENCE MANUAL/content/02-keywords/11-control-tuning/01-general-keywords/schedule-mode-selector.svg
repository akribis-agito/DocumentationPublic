<svg xmlns="http://www.w3.org/2000/svg" width="840" height="400" viewBox="0 0 840 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="ScheduleMode selects which inputs (velocity, position, temperature, time, or motion state) the scheduler evaluates; the result is a ScheduleSet 1 to 5 that copies one column from the five configured gain arrays into ScheduleGains, which the control loops then use.">
  <title>Gain scheduler mode selection</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <!-- Configured gain arrays (five sets) -->
  <rect x="30" y="30" width="240" height="200" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="150" y="50" text-anchor="middle" font-weight="bold">Configured gain arrays</text>
  <text x="150" y="68" text-anchor="middle" font-size="11" fill="#5b6b7b">length 5, one element per set</text>
  <text x="50" y="92">PosGain[1..5]</text>
  <text x="50" y="110">VelGain[1..5]</text>
  <text x="50" y="128">VelKi[1..5]</text>
  <text x="50" y="146">VelFFW[1..5]</text>
  <text x="50" y="164">AccFFW[1..5]</text>
  <text x="50" y="182">PosKi[1..5] (v5)</text>
  <text x="150" y="214" text-anchor="middle" font-size="11" fill="#5b6b7b">all scheduled gains switch together</text>

  <!-- Inputs feeding the selector -->
  <rect x="310" y="20" width="260" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="440" y="42" text-anchor="middle" font-size="12">ScheduleMode (you set the rule)</text>

  <rect x="310" y="62" width="260" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="440" y="84" text-anchor="middle" font-size="11">ScheduleVel / SchedulePos / ScheduleTemp</text>

  <rect x="310" y="104" width="260" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="440" y="126" text-anchor="middle" font-size="12">ScheduleTime (timing modes)</text>

  <rect x="310" y="146" width="260" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="440" y="168" text-anchor="middle" font-size="11">motion state / position / velocity / temperature</text>

  <line x1="570" y1="37"  x2="615" y2="148" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="570" y1="79"  x2="615" y2="158" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="570" y1="121" x2="615" y2="168" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="570" y1="163" x2="615" y2="178" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Selector -->
  <rect x="620" y="135" width="200" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="720" y="158" text-anchor="middle" font-weight="bold">Scheduler</text>
  <text x="720" y="178" text-anchor="middle" font-size="12">evaluates the rule</text>

  <line x1="270" y1="125" x2="618" y2="160" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="340" y="118" font-size="11" fill="#5b6b7b">five sets &#8594;</text>

  <line x1="720" y1="195" x2="720" y2="218" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="630" y="222" width="180" height="36" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="720" y="244" text-anchor="middle">ScheduleSet = 1..5</text>

  <line x1="720" y1="258" x2="720" y2="280" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="560" y="282" width="280" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="700" y="302" text-anchor="middle" font-weight="bold">ScheduleGains[1..6]</text>
  <text x="700" y="320" text-anchor="middle" font-size="11" fill="#5b6b7b">values the control loops use this cycle</text>

  <line x1="560" y1="305" x2="380" y2="358" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="170" y="350" width="220" height="34" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="280" y="372" text-anchor="middle" font-size="12">position / velocity / feedforward loops</text>

  <text x="420" y="394" text-anchor="middle" font-size="11" fill="#5b6b7b">In interpolated modes (9, 10) the gains are blended linearly between adjacent sets.</text>
</svg>
