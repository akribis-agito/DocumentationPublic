<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <!-- Title -->
  <text x="380" y="22" text-anchor="middle" font-weight="bold">ScheduleMode = 2 (optimal settling by time)</text>

  <!-- Time axis -->
  <line x1="60"  y1="150" x2="720" y2="150" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="730" y="154">t</text>

  <!-- Phase markers on axis -->
  <line x1="220" y1="143" x2="220" y2="157" stroke="#5b6b7b" stroke-width="1.4"/>
  <line x1="460" y1="143" x2="460" y2="157" stroke="#5b6b7b" stroke-width="1.4"/>

  <!-- Phase labels -->
  <text x="140" y="178" text-anchor="middle" fill="#5b6b7b">in motion</text>
  <text x="340" y="178" text-anchor="middle" fill="#5b6b7b">post-motion dwell</text>
  <text x="340" y="194" text-anchor="middle" fill="#5b6b7b">(length = ScheduleTime)</text>
  <text x="590" y="178" text-anchor="middle" fill="#5b6b7b">stationary &amp; settled</text>

  <!-- Set bands (showing active set) -->
  <rect x="60"  y="80"  width="160" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="140" y="105" text-anchor="middle">Set 1 (motion)</text>

  <rect x="220" y="80"  width="240" height="40" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="340" y="105" text-anchor="middle">Set 2 (intermediate)</text>

  <rect x="460" y="80"  width="260" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="590" y="105" text-anchor="middle">Set 3 (steady-state)</text>

  <!-- triggers below -->
  <text x="220" y="232" text-anchor="middle">motion stops</text>
  <text x="220" y="248" text-anchor="middle" fill="#5b6b7b">(timer starts)</text>
  <line x1="220" y1="220" x2="220" y2="158" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="460" y="232" text-anchor="middle">timer reaches</text>
  <text x="460" y="248" text-anchor="middle" fill="#5b6b7b">ScheduleTime</text>
  <line x1="460" y1="220" x2="460" y2="158" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="380" y="282" text-anchor="middle" fill="#5b6b7b">Mode 6 swaps the roles (set 2 during/just after motion, set 1 once settled).</text>
</svg>
