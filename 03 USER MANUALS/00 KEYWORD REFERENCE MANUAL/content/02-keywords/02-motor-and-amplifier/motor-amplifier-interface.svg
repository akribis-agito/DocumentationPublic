<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold">Motor and amplifier interface</text>

  <!-- AmpType: drive mode -->
  <rect x="30" y="60" width="190" height="80" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="125" y="84" text-anchor="middle" font-weight="bold">AmpType</text>
  <text x="125" y="104" text-anchor="middle" font-size="11">drive mode: built-in</text>
  <text x="125" y="120" text-anchor="middle" font-size="11">amplifier or external</text>

  <!-- MotorType: commutation -->
  <rect x="30" y="180" width="190" height="100" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="125" y="204" text-anchor="middle" font-weight="bold">MotorType</text>
  <text x="125" y="224" text-anchor="middle" font-size="11">brush / brushless / stepper</text>
  <text x="125" y="244" text-anchor="middle" font-size="11">PolePrs, StepBits,</text>
  <text x="125" y="260" text-anchor="middle" font-size="11">encoder resolution</text>

  <!-- Commutation / current generation -->
  <rect x="290" y="120" width="190" height="100" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="385" y="148" text-anchor="middle" font-weight="bold">Commutation &amp;</text>
  <text x="385" y="166" text-anchor="middle" font-weight="bold">current generation</text>
  <text x="385" y="190" text-anchor="middle" font-size="11">phase-current references</text>
  <text x="385" y="206" text-anchor="middle" font-size="11">scaled by full-scale</text>

  <!-- Power stage -->
  <rect x="560" y="120" width="170" height="100" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="645" y="156" text-anchor="middle" font-weight="bold">Power stage</text>
  <text x="645" y="178" text-anchor="middle" font-size="11">to the motor</text>
  <text x="645" y="196" text-anchor="middle" font-size="11">windings</text>

  <!-- arrows into commutation -->
  <line x1="220" y1="100" x2="289" y2="148" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="220" y1="230" x2="289" y2="186" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- to power stage -->
  <line x1="480" y1="170" x2="556" y2="170" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- scaling annotation -->
  <text x="385" y="244" text-anchor="middle" font-size="10.5" fill="#5b6b7b">AAmpFullScale / LAmpFullScale</text>
  <text x="385" y="258" text-anchor="middle" font-size="10.5" fill="#5b6b7b">StepInMotCurr / StepInPosCurr (stepper)</text>

  <!-- external note -->
  <text x="645" y="244" text-anchor="middle" font-size="10.5" fill="#5b6b7b">external modes emit a</text>
  <text x="645" y="258" text-anchor="middle" font-size="10.5" fill="#5b6b7b">command instead</text>
</svg>
