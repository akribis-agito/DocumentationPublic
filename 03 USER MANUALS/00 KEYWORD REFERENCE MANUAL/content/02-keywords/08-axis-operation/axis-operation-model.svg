<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold">Axis operation model</text>

  <!-- Disabled -->
  <rect x="40" y="60" width="200" height="70" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="140" y="88" text-anchor="middle" font-weight="bold">Disabled</text>
  <text x="140" y="108" text-anchor="middle">MotorOn = 0</text>
  <text x="140" y="123" text-anchor="middle" font-size="11">no power, all loops inactive</text>

  <!-- Enabled -->
  <rect x="480" y="60" width="200" height="70" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="580" y="88" text-anchor="middle" font-weight="bold">Enabled</text>
  <text x="580" y="108" text-anchor="middle">MotorOn = 1</text>
  <text x="580" y="123" text-anchor="middle" font-size="11">loops run per OperationMode</text>

  <!-- enable arrow -->
  <path d="M240,86 L478,86" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="80" text-anchor="middle" font-size="11">enable</text>
  <!-- disable arrow -->
  <path d="M478,110 L242,110" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="125" text-anchor="middle" font-size="11">disable / fault</text>

  <!-- OperationMode selector -->
  <text x="580" y="162" text-anchor="middle" font-size="12">OperationMode selects the active loops</text>
  <path d="M580,130 L580,176" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Mode boxes -->
  <rect x="40" y="200" width="150" height="86" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="115" y="224" text-anchor="middle" font-weight="bold">Position (3)</text>
  <text x="115" y="244" text-anchor="middle" font-size="11">position +</text>
  <text x="115" y="259" text-anchor="middle" font-size="11">velocity +</text>
  <text x="115" y="274" text-anchor="middle" font-size="11">current loops</text>

  <rect x="210" y="200" width="150" height="86" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="285" y="224" text-anchor="middle" font-weight="bold">Velocity (2)</text>
  <text x="285" y="248" text-anchor="middle" font-size="11">velocity +</text>
  <text x="285" y="263" text-anchor="middle" font-size="11">current loops</text>

  <rect x="380" y="200" width="150" height="86" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="455" y="224" text-anchor="middle" font-weight="bold">Current (1)</text>
  <text x="455" y="256" text-anchor="middle" font-size="11">current loop only</text>

  <rect x="550" y="200" width="150" height="86" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="625" y="224" text-anchor="middle" font-weight="bold">Force (4)</text>
  <text x="625" y="248" text-anchor="middle" font-size="11">force loop +</text>
  <text x="625" y="263" text-anchor="middle" font-size="11">current loop</text>

  <!-- connector from selector to modes -->
  <path d="M580,176 L580,190 L115,190 L115,198" fill="none" stroke="#5b6b7b" stroke-width="1.2"/>
  <path d="M285,190 L285,198" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M455,190 L455,198" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M625,190 L625,198" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M115,190 L115,198" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- how to switch -->
  <rect x="120" y="330" width="480" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="352" text-anchor="middle" font-weight="bold">Switching between modes</text>
  <text x="360" y="372" text-anchor="middle" font-size="11">direct OperationMode assignment &#183; GoToPosMode / GoToCurrMode / GoToForceMode</text>
  <text x="360" y="387" text-anchor="middle" font-size="11">automatic condition checks &#183; digital input (DInMode)</text>
  <path d="M360,300 L360,328" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
