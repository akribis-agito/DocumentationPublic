<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320" role="img" aria-label="Motor enable/disable state machine. From Disabled (MotorOn = 0), setting MotorOn = 1 runs pre-checks (hardware, commutation, filters); on success the enable sequence presets the reference and releases the brake, reaching Enabled (MotorOn = 1). A failing check rejects the enable; a fault forces motor off." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Motor enable / disable state machine</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold">Motor enable / disable</text>

  <!-- Disabled -->
  <rect x="30" y="120" width="150" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="148" text-anchor="middle" font-weight="bold">Disabled</text>
  <text x="105" y="167" text-anchor="middle" font-size="11">MotorOn = 0</text>

  <!-- Pre-checks -->
  <rect x="230" y="120" width="150" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="305" y="142" text-anchor="middle" font-weight="bold">Pre-checks</text>
  <text x="305" y="161" text-anchor="middle" font-size="11">hardware, commutation,</text>
  <text x="305" y="175" text-anchor="middle" font-size="11">filters validated</text>

  <!-- Enable sequence -->
  <rect x="430" y="120" width="150" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="505" y="142" text-anchor="middle" font-weight="bold">Enable sequence</text>
  <text x="505" y="161" text-anchor="middle" font-size="11">reference preset,</text>
  <text x="505" y="175" text-anchor="middle" font-size="11">brake release</text>

  <!-- Enabled -->
  <rect x="565" y="240" width="110" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="620" y="265" text-anchor="middle" font-weight="bold">Enabled</text>
  <text x="620" y="283" text-anchor="middle" font-size="11">MotorOn = 1</text>

  <!-- Fault -->
  <rect x="230" y="240" width="150" height="56" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="305" y="265" text-anchor="middle" font-weight="bold">Fault</text>
  <text x="305" y="283" text-anchor="middle" font-size="11">forces motor off</text>

  <!-- transitions -->
  <path d="M180,152 L228,152" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="204" y="146" text-anchor="middle" font-size="10">MotorOn=1</text>

  <path d="M380,152 L428,152" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="404" y="146" text-anchor="middle" font-size="10">all pass</text>

  <path d="M505,184 L505,250 L563,266" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- rejected: pre-checks back to disabled -->
  <path d="M305,184 L305,210 L130,210 L120,182" fill="none" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="200" y="206" text-anchor="middle" font-size="10" fill="#c0392b">any check fails: rejected</text>

  <!-- disable enabled->disabled -->
  <path d="M565,260 L105,232 L105,186" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="330" y="232" text-anchor="middle" font-size="10">MotorOn = 0 (disable)</text>

  <!-- fault path -->
  <path d="M565,290 L382,280" fill="none" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M230,268 L106,268 L105,186" fill="none" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="160" y="262" text-anchor="middle" font-size="10" fill="#c0392b">fault &#8594; off</text>
</svg>
