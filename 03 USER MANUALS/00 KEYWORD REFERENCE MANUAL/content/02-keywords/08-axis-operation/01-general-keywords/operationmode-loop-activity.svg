<svg xmlns="http://www.w3.org/2000/svg" width="813" height="302" viewBox="-87 -7 813 302" role="img" aria-label="Which control loops are active in each OperationMode. Mode 1 Current runs only the current loop. Mode 2 Velocity adds the velocity loop. Mode 3 Position adds the position loop. Mode 4 Force runs the force loop atop the current loop. Filled cells = loop runs; outlined cells = loop bypassed." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Loop activity by OperationMode</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker></defs>

  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="bold">Loops active in each OperationMode</text>
  <text x="320" y="40" text-anchor="middle" font-size="11" fill="#1f2933">filled = loop runs; outlined = loop bypassed (error forced to zero)</text>

  <!-- Column headers (modes) -->
  <text x="245" y="72" text-anchor="middle" font-weight="bold">1: Current</text>
  <text x="350" y="72" text-anchor="middle" font-weight="bold">2: Velocity</text>
  <text x="450" y="72" text-anchor="middle" font-weight="bold">3: Position</text>
  <text x="560" y="72" text-anchor="middle" font-weight="bold">4: Force</text>

  <!-- Row labels -->
  <text x="180" y="105" text-anchor="end">Force loop</text>
  <text x="180" y="150" text-anchor="end">Position loop</text>
  <text x="180" y="195" text-anchor="end">Velocity loop</text>
  <text x="180" y="240" text-anchor="end">Current loop</text>

  <!-- Force loop row (only active in mode 4) -->
  <rect x="210" y="88" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>
  <rect x="315" y="88" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>
  <rect x="415" y="88" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>
  <rect x="525" y="88" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="560" y="107" text-anchor="middle">active</text>

  <!-- Position loop row -->
  <rect x="210" y="133" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>
  <rect x="315" y="133" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>
  <rect x="415" y="133" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="450" y="152" text-anchor="middle">active</text>
  <rect x="525" y="133" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>

  <!-- Velocity loop row -->
  <rect x="210" y="178" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>
  <rect x="315" y="178" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="350" y="197" text-anchor="middle">active</text>
  <rect x="415" y="178" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="450" y="197" text-anchor="middle">active</text>
  <rect x="525" y="178" width="70" height="28" rx="4" fill="none" stroke="#1f2933" stroke-width="1.2"/>

  <!-- Current loop row (always on) -->
  <rect x="210" y="223" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="245" y="242" text-anchor="middle">active</text>
  <rect x="315" y="223" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="350" y="242" text-anchor="middle">active</text>
  <rect x="415" y="223" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="450" y="242" text-anchor="middle">active</text>
  <rect x="525" y="223" width="70" height="28" rx="4" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="560" y="242" text-anchor="middle">active</text>

  <!-- Reference-entry annotation -->
  <text x="320" y="278" text-anchor="middle" font-size="11" fill="#1f2933">Reference enters at the topmost active loop; loops above it are bypassed and their error protections are not evaluated.</text>
</svg>
