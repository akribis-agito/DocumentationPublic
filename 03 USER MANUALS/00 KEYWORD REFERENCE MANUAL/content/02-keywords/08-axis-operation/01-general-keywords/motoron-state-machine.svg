<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold">MotorOn state machine</text>

  <!-- Motor OFF -->
  <rect x="40" y="110" width="210" height="96" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="145" y="136" text-anchor="middle" font-weight="bold">Motor OFF</text>
  <text x="145" y="158" text-anchor="middle" font-size="11">no power to the motor</text>
  <text x="145" y="174" text-anchor="middle" font-size="11">all control loops inactive</text>
  <text x="145" y="190" text-anchor="middle" font-size="11">reference tracks feedback</text>

  <!-- Motor ON -->
  <rect x="470" y="110" width="210" height="96" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="575" y="136" text-anchor="middle" font-weight="bold">Motor ON</text>
  <text x="575" y="158" text-anchor="middle" font-size="11">loops run per OperationMode</text>
  <text x="575" y="174" text-anchor="middle" font-size="11">faults cleared on enable</text>
  <text x="575" y="190" text-anchor="middle" font-size="11">brake released</text>

  <!-- enable transition (top) -->
  <path d="M250,128 C360,70 470,70 470,128" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="62" text-anchor="middle" font-weight="bold">MotorOn = 1</text>
  <text x="360" y="80" text-anchor="middle" font-size="11">pre-checks pass &#8594; enable sequence &#8594; brake release</text>

  <!-- disable transition (bottom) -->
  <path d="M470,188 C360,246 250,246 250,188" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="250" text-anchor="middle" font-weight="bold">MotorOn = 0, digital input, or fault</text>
  <text x="360" y="268" text-anchor="middle" font-size="11">see MotorReason for why the axis was disabled</text>

  <!-- self reject -->
  <path d="M70,110 C45,76 110,76 120,108" fill="none" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="120" y="74" text-anchor="middle" font-size="11" fill="#c0392b">enable rejected: stays off</text>
</svg>
