<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="bold">Entering position operation mode</text>

  <!-- entry paths -->
  <rect x="30" y="60" width="180" height="120" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="84" text-anchor="middle" font-weight="bold">Entry paths</text>
  <text x="120" y="106" text-anchor="middle" font-size="11">OperationMode = 3</text>
  <text x="120" y="124" text-anchor="middle" font-size="11">GoToPosMode</text>
  <text x="120" y="142" text-anchor="middle" font-size="11">condition check</text>
  <text x="120" y="160" text-anchor="middle" font-size="11">digital input (DInMode)</text>

  <!-- condition switch -->
  <rect x="270" y="60" width="180" height="120" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="82" text-anchor="middle" font-weight="bold">Condition check</text>
  <text x="360" y="104" text-anchor="middle" font-size="11">from current / force mode</text>
  <text x="360" y="124" text-anchor="middle" font-size="11">PosPosFlag = 1: Pos &lt; PosPosTh</text>
  <text x="360" y="142" text-anchor="middle" font-size="11">PosPosFlag = 2: Pos &gt; PosPosTh</text>
  <text x="360" y="162" text-anchor="middle" font-size="11">or end of command table</text>

  <!-- position mode -->
  <rect x="510" y="78" width="160" height="84" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="590" y="108" text-anchor="middle" font-weight="bold">Position mode</text>
  <text x="590" y="130" text-anchor="middle" font-size="11">OperationMode = 3</text>
  <text x="590" y="146" text-anchor="middle" font-size="11">PosPosFlag cleared</text>

  <path d="M210,120 L268,120" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M450,120 L508,120" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="479" y="114" text-anchor="middle" font-size="10">met</text>

  <!-- optional retract move -->
  <rect x="270" y="240" width="320" height="92" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="430" y="264" text-anchor="middle" font-weight="bold">Optional entry move (BeginOnToPos = 1)</text>
  <text x="430" y="286" text-anchor="middle" font-size="11">point-to-point move to RetractTarget (or RelTrgt)</text>
  <text x="430" y="304" text-anchor="middle" font-size="11">at RetractSpeed; flag auto-clears after it starts</text>
  <text x="430" y="322" text-anchor="middle" font-size="11">not run for direct OperationMode assignment</text>

  <path d="M590,162 L590,210 L430,210 L430,238" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="430" y="204" text-anchor="middle" font-size="10">on entry, if armed</text>
</svg>
