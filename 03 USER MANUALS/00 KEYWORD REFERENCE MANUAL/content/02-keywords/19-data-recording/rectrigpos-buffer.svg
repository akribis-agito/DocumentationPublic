<svg xmlns="http://www.w3.org/2000/svg" width="780" height="230" viewBox="0 0 780 230" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="RecTrigPos splits the recorder buffer of length RecLength into a pre-trigger portion equal to RecTrigPos percent of the length, followed by the remainder as post-trigger samples.">
  <title>RecTrigPos pre-trigger and post-trigger split</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="20" y="22" font-weight="bold">RecTrigPos splits RecLength into pre-trigger and post-trigger samples</text>

  <!-- buffer rectangle -->
  <rect x="60" y="70" width="660" height="60" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.4"/>
  <!-- pre-trigger shaded area -->
  <rect x="60" y="70" width="66" height="60" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <!-- trigger line -->
  <line x1="126" y1="60" x2="126" y2="142" stroke="#e0736b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="126" y="56" text-anchor="middle" font-size="11" fill="#e0736b">trigger fires here</text>

  <!-- labels -->
  <text x="93" y="105" text-anchor="middle" font-size="11">pre-trigger</text>
  <text x="423" y="105" text-anchor="middle" font-size="11">post-trigger</text>

  <!-- braces -->
  <line x1="60" y1="150" x2="60" y2="162" stroke="#5b6b7b"/>
  <line x1="126" y1="150" x2="126" y2="162" stroke="#5b6b7b"/>
  <line x1="60" y1="162" x2="126" y2="162" stroke="#5b6b7b"/>
  <text x="93" y="178" text-anchor="middle" font-size="11">RecTrigPos% &#215; RecLength</text>

  <line x1="126" y1="150" x2="126" y2="162" stroke="#5b6b7b"/>
  <line x1="720" y1="150" x2="720" y2="162" stroke="#5b6b7b"/>
  <line x1="126" y1="162" x2="720" y2="162" stroke="#5b6b7b"/>
  <text x="423" y="178" text-anchor="middle" font-size="11">(100 - RecTrigPos)% &#215; RecLength</text>

  <!-- total brace -->
  <line x1="60" y1="195" x2="60" y2="205" stroke="#5b6b7b"/>
  <line x1="720" y1="195" x2="720" y2="205" stroke="#5b6b7b"/>
  <line x1="60" y1="205" x2="720" y2="205" stroke="#5b6b7b"/>
  <text x="390" y="218" text-anchor="middle" font-size="11">total per parameter = RecLength samples</text>

  <!-- worked numbers callout -->
  <text x="60" y="46" font-size="11" fill="#5b6b7b">Example: RecLength=16384, RecTrigPos=10% &#8594; 1638 pre-trigger + 14746 post-trigger samples</text>
</svg>
