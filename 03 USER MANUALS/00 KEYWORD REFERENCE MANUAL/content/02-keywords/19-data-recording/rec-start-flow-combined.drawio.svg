<svg xmlns="http://www.w3.org/2000/svg" width="980" height="240" viewBox="0 0 980 240" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Parallel trigger detection flow: after RecStart the recorder fills the pre-trigger ring until full, then a single combined decision tests Trigger 1, Trigger 2 and Trigger 3 joined by RecTrigsLogic; on match the recorder continues into the post-trigger phase and ends.">
  <title>Parallel (logical) trigger detection flow</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <!-- start (terminator) -->
  <rect x="20" y="100" width="140" height="50" rx="25" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="90" y="130" text-anchor="middle">RecStart is called</text>

  <!-- pre-trigger fill loop: decision diamond + action box on top -->
  <rect x="220" y="30" width="180" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="310" y="58" text-anchor="middle">Fill pre-trigger ring</text>

  <polygon points="310,90 410,135 310,180 210,135" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="310" y="130" text-anchor="middle" font-size="12">Pre-trigger</text>
  <text x="310" y="146" text-anchor="middle" font-size="12">buffer full?</text>

  <!-- combined trigger decision -->
  <polygon points="600,90 740,135 600,180 460,135" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="600" y="122" text-anchor="middle" font-size="12">Triggers 1 / 2 / 3</text>
  <text x="600" y="138" text-anchor="middle" font-size="12">combined per</text>
  <text x="600" y="154" text-anchor="middle" font-size="12">RecTrigsLogic — fire?</text>

  <!-- continue + end -->
  <rect x="780" y="110" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="840" y="132" text-anchor="middle" font-size="12">Continue</text>
  <text x="840" y="148" text-anchor="middle" font-size="12">recording</text>

  <rect x="830" y="190" width="130" height="40" rx="20" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="895" y="215" text-anchor="middle" font-size="12">End of recording</text>

  <!-- arrows -->
  <!-- start -> pre-trigger diamond -->
  <path d="M160,135 L208,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- diamond no -> Fill -->
  <path d="M310,90 L310,76" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="320" y="86" font-size="11" fill="#5b6b7b">no</text>
  <!-- Fill -> diamond (loop) -->
  <path d="M395,74 C420,80 420,100 395,108" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- diamond yes -> trigger diamond -->
  <path d="M410,135 L458,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="434" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">yes</text>

  <!-- trigger no -> loop back on itself -->
  <path d="M600,180 C580,210 540,210 540,180 L540,150" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="540" y="210" text-anchor="middle" font-size="11" fill="#5b6b7b">no &#8212; keep sampling</text>

  <!-- trigger yes -> continue -->
  <path d="M740,135 L778,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="758" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">yes</text>

  <!-- continue -> end -->
  <path d="M840,160 L890,188" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
