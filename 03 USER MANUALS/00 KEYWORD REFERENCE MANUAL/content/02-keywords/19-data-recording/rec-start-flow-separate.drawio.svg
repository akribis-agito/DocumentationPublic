<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="240" viewBox="0 0 1300 240" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Serial trigger detection flow: after RecStart the recorder fills the pre-trigger ring until full, then waits for Trigger 1, then Trigger 2, then Trigger 3 in sequence; when the last trigger fires the recorder continues into the post-trigger phase and ends.">
  <title>Serial trigger detection flow</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <!-- start -->
  <rect x="20" y="100" width="140" height="50" rx="25" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="90" y="130" text-anchor="middle">RecStart is called</text>

  <!-- pre-trigger fill action -->
  <rect x="220" y="30" width="180" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="310" y="58" text-anchor="middle">Fill pre-trigger ring</text>

  <!-- pre-trigger decision -->
  <polygon points="310,90 410,135 310,180 210,135" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="310" y="130" text-anchor="middle" font-size="12">Pre-trigger</text>
  <text x="310" y="146" text-anchor="middle" font-size="12">buffer full?</text>

  <!-- Trigger 1 -->
  <polygon points="540,90 640,135 540,180 440,135" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="540" y="130" text-anchor="middle" font-size="12">Trigger 1</text>
  <text x="540" y="146" text-anchor="middle" font-size="12">detected?</text>

  <!-- Trigger 2 -->
  <polygon points="770,90 870,135 770,180 670,135" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="770" y="130" text-anchor="middle" font-size="12">Trigger 2</text>
  <text x="770" y="146" text-anchor="middle" font-size="12">detected?</text>

  <!-- Trigger 3 -->
  <polygon points="1000,90 1100,135 1000,180 900,135" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="1000" y="130" text-anchor="middle" font-size="12">Trigger 3</text>
  <text x="1000" y="146" text-anchor="middle" font-size="12">detected?</text>

  <!-- continue + end -->
  <rect x="1140" y="110" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="1200" y="132" text-anchor="middle" font-size="12">Continue</text>
  <text x="1200" y="148" text-anchor="middle" font-size="12">recording</text>

  <rect x="1140" y="190" width="130" height="40" rx="20" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="1205" y="215" text-anchor="middle" font-size="12">End of recording</text>

  <!-- arrows -->
  <path d="M160,135 L208,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <path d="M310,90 L310,76" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="320" y="86" font-size="11" fill="#5b6b7b">no</text>
  <path d="M395,74 C420,80 420,100 395,108" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <path d="M410,135 L438,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="424" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">yes</text>

  <path d="M640,135 L668,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="654" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">yes</text>

  <path d="M870,135 L898,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="884" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">yes</text>

  <path d="M1100,135 L1138,135" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="1119" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">yes</text>

  <!-- "no" self loops on each trigger -->
  <path d="M540,180 C520,210 480,210 480,180 L480,150" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="480" y="222" text-anchor="middle" font-size="11" fill="#5b6b7b">no</text>

  <path d="M770,180 C750,210 710,210 710,180 L710,150" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="710" y="222" text-anchor="middle" font-size="11" fill="#5b6b7b">no</text>

  <path d="M1000,180 C980,210 940,210 940,180 L940,150" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="940" y="222" text-anchor="middle" font-size="11" fill="#5b6b7b">no</text>

  <!-- continue -> end -->
  <path d="M1200,160 L1200,188" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
