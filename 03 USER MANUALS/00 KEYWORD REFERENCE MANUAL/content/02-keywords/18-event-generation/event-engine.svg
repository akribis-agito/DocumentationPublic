<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold">Event generation: position-compare engine</text>

  <!-- feedback position -->
  <rect x="30" y="120" width="160" height="70" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="110" y="148" text-anchor="middle" font-weight="bold">Feedback position</text>
  <text x="110" y="168" text-anchor="middle" font-size="11">of the selected axis</text>

  <!-- compare -->
  <rect x="260" y="110" width="200" height="92" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="360" y="134" text-anchor="middle" font-weight="bold">Reached compare position?</text>
  <text x="360" y="156" text-anchor="middle" font-size="11">EventType selects the source:</text>
  <text x="360" y="173" text-anchor="middle" font-size="11">single, by-gap (EventGap),</text>
  <text x="360" y="189" text-anchor="middle" font-size="11">or table (EventTable)</text>

  <!-- output pulse -->
  <rect x="530" y="120" width="160" height="70" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="610" y="148" text-anchor="middle" font-weight="bold">Fire output pulse</text>
  <text x="610" y="168" text-anchor="middle" font-size="11">width set by EventPulseWid</text>

  <!-- advance -->
  <rect x="260" y="250" width="200" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="274" text-anchor="middle" font-weight="bold">Advance to next position</text>
  <text x="360" y="292" text-anchor="middle" font-size="11">EventCntr++, EventNextPos updated</text>

  <!-- arrows -->
  <path d="M190,155 L256,155" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M460,155 L526,155" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="494" y="148" text-anchor="middle" font-size="11" fill="#777">yes</text>
  <path d="M610,190 C610,235 470,250 440,250" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M280,250 C150,240 110,225 110,192" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
