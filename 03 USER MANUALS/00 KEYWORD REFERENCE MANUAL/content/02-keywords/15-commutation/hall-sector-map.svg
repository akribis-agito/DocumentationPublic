<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" font-family="Segoe UI,Arial,sans-serif">
  <text x="8" y="18" font-size="13" font-weight="bold">Hall state &#8594; electrical angle (default "middle-angle" map)</text>
  <text x="8" y="36" font-size="11" fill="#444">Each 60&#176; electrical sector corresponds to one legal Hall state (value 1&#8211;6). Values 0 and 7 are illegal.</text>

  <!-- axis -->
  <line x1="60" y1="120" x2="600" y2="120" stroke="#8a929b" stroke-width="1"/>
  <text x="300" y="190" font-size="11" text-anchor="middle">electrical angle (degrees)</text>

  <!-- sector boundaries at 0,60,120,180,240,300,360 mapped to x 60..600 (90 px per 60 deg) -->
  <!-- sector blocks -->
  <rect x="60"  y="70" width="90" height="40" fill="#cfe9d4" stroke="#8a929b" stroke-width="0.6"/>
  <rect x="150" y="70" width="90" height="40" fill="#e0d2f0" stroke="#8a929b" stroke-width="0.6"/>
  <rect x="240" y="70" width="90" height="40" fill="#f7d7b0" stroke="#8a929b" stroke-width="0.6"/>
  <rect x="330" y="70" width="90" height="40" fill="#cfe9d4" stroke="#8a929b" stroke-width="0.6"/>
  <rect x="420" y="70" width="90" height="40" fill="#e0d2f0" stroke="#8a929b" stroke-width="0.6"/>
  <rect x="510" y="70" width="90" height="40" fill="#f7d7b0" stroke="#8a929b" stroke-width="0.6"/>

  <!-- HallsValue labels (centre angle of each sector) -->
  <text x="105" y="88"  font-size="11" text-anchor="middle">state 5</text>
  <text x="105" y="102" font-size="9"  text-anchor="middle">101 / 60&#176;</text>
  <text x="195" y="88"  font-size="11" text-anchor="middle">state 1</text>
  <text x="195" y="102" font-size="9"  text-anchor="middle">001 / 120&#176;</text>
  <text x="285" y="88"  font-size="11" text-anchor="middle">state 3</text>
  <text x="285" y="102" font-size="9"  text-anchor="middle">011 / 180&#176;</text>
  <text x="375" y="88"  font-size="11" text-anchor="middle">state 2</text>
  <text x="375" y="102" font-size="9"  text-anchor="middle">010 / 240&#176;</text>
  <text x="465" y="88"  font-size="11" text-anchor="middle">state 6</text>
  <text x="465" y="102" font-size="9"  text-anchor="middle">110 / 300&#176;</text>
  <text x="555" y="88"  font-size="11" text-anchor="middle">state 4</text>
  <text x="555" y="102" font-size="9"  text-anchor="middle">100 / 360&#176;</text>

  <!-- tick labels -->
  <text x="60"  y="138" font-size="9" text-anchor="middle">0</text>
  <text x="150" y="138" font-size="9" text-anchor="middle">60</text>
  <text x="240" y="138" font-size="9" text-anchor="middle">120</text>
  <text x="330" y="138" font-size="9" text-anchor="middle">180</text>
  <text x="420" y="138" font-size="9" text-anchor="middle">240</text>
  <text x="510" y="138" font-size="9" text-anchor="middle">300</text>
  <text x="600" y="138" font-size="9" text-anchor="middle">360</text>
</svg>
