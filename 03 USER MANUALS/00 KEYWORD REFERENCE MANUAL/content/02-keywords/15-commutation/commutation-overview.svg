<svg xmlns="http://www.w3.org/2000/svg" width="806" height="343" viewBox="0 -3 806 343" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Establishing the electrical angle: ComtMode selects a commutation method (search, hall sensors, absolute encoder, or minimal-jumps search); the alignment step finds the angle that keeps force 90 degrees from the magnet field; when complete ComtStatus equals 100, StatReg bit 0 is set, and ComtAng drives the phases for normal motion.">
  <title>Commutation overview</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="20" y="26" font-size="15" font-weight="bold">Establishing the electrical angle</text>
  <text x="20" y="44" fill="#555" font-size="11">ComtMode selects the method; ComtStatus reports progress; ComtAng is the resulting angle</text>

  <!-- methods column -->
  <rect x="20" y="66" width="200" height="180" rx="6" fill="#f4f7fb" stroke="#5b8def" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="120" y="88" text-anchor="middle" font-weight="bold">Commutation method</text>

  <rect x="36" y="100" width="168" height="28" rx="5" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.1"/>
  <text x="120" y="119" text-anchor="middle" font-size="12">Search ("jump to zero")</text>

  <rect x="36" y="134" width="168" height="28" rx="5" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.1"/>
  <text x="120" y="153" text-anchor="middle" font-size="12">Hall sensors</text>

  <rect x="36" y="168" width="168" height="28" rx="5" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.1"/>
  <text x="120" y="187" text-anchor="middle" font-size="12">Absolute encoder</text>

  <rect x="36" y="202" width="168" height="28" rx="5" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.1"/>
  <text x="120" y="221" text-anchor="middle" font-size="12">Minimal-jumps search</text>

  <!-- commutation process -->
  <rect x="290" y="120" width="160" height="70" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="370" y="146" text-anchor="middle" font-weight="bold">Align electrical angle</text>
  <text x="370" y="166" text-anchor="middle" font-size="11">find angle that keeps</text>
  <text x="370" y="182" text-anchor="middle" font-size="11">force 90&#176; from the field</text>

  <!-- complete -->
  <rect x="520" y="80" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="610" y="104" text-anchor="middle" font-weight="bold">Commutation complete</text>
  <text x="610" y="124" text-anchor="middle" font-size="11">ComtStatus = 100, StatReg bit 0 set</text>

  <!-- motor-on gate -->
  <rect x="520" y="170" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="610" y="194" text-anchor="middle" font-weight="bold">Normal motion allowed</text>
  <text x="610" y="214" text-anchor="middle" font-size="11">ComtAng drives the phases</text>

  <!-- arrows -->
  <line x1="220" y1="155" x2="288" y2="155" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="450" y1="140" x2="518" y2="112" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="610" y1="140" x2="610" y2="168" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <text x="20" y="286" fill="#555" font-size="11">Commutation runs automatically after power-on or motor-on (set by ComtMode), or on request. Until it completes,</text>
  <text x="20" y="302" fill="#555" font-size="11">StatReg bit 0 stays cleared and normal motion is blocked. Hall and absolute-encoder methods need little or no motion;</text>
  <text x="20" y="318" fill="#555" font-size="11">search methods apply a small command and observe the response. The angle in effect is reported by ComtAng.</text>
</svg>
