<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- Direct injection -->
  <text x="160" y="26" text-anchor="middle" font-size="15" font-weight="bold">Direct</text>
  <text x="160" y="44" text-anchor="middle" fill="#555" font-size="11">preceding signal ignored</text>

  <line x1="20" y1="110" x2="118" y2="110" stroke="#9fb4cc" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="68" y="100" text-anchor="middle" fill="#9fb4cc" font-size="11">loop output</text>
  <line x1="112" y1="102" x2="124" y2="118" stroke="#e0736b" stroke-width="1.5"/>
  <line x1="124" y1="102" x2="112" y2="118" stroke="#e0736b" stroke-width="1.5"/>

  <line x1="160" y1="180" x2="160" y2="130" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="160" y="200" text-anchor="middle">injection</text>

  <circle cx="160" cy="110" r="16" fill="#fff" stroke="#5b8def" stroke-width="1.2"/>
  <line x1="176" y1="110" x2="288" y2="110" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="234" y="100" text-anchor="middle">command</text>

  <!-- Additive injection -->
  <text x="480" y="26" text-anchor="middle" font-size="15" font-weight="bold">Additive</text>
  <text x="480" y="44" text-anchor="middle" fill="#555" font-size="11">summed with loop output</text>

  <line x1="340" y1="110" x2="462" y2="110" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="400" y="100" text-anchor="middle">loop output</text>

  <line x1="480" y1="180" x2="480" y2="130" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="480" y="200" text-anchor="middle">injection</text>

  <circle cx="480" cy="110" r="16" fill="#fff" stroke="#5b8def" stroke-width="1.2"/>
  <text x="480" y="115" text-anchor="middle" font-size="16">+</text>
  <line x1="496" y1="110" x2="608" y2="110" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="552" y="100" text-anchor="middle">command</text>
</svg>
