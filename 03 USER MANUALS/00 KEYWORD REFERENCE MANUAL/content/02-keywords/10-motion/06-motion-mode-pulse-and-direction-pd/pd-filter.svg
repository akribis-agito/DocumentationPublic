<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="410" y="22" text-anchor="middle" font-weight="bold">PDPosFilt: low-pass smoothing of the position reference in direct P/D mode</text>

  <!-- axes -->
  <line x1="80" y1="200" x2="780" y2="200" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="80" y1="60" x2="80" y2="200" stroke="#5b6b7b" stroke-width="1"/>
  <text x="420" y="232" text-anchor="middle" font-size="11">time</text>
  <text x="50" y="130" text-anchor="middle" font-size="11" transform="rotate(-90 50 130)">position</text>

  <!-- staircase input PDPos delta -->
  <path d="M80 200 H160 V170 H260 V145 H360 V120 H460 V90 H560 V80 H780" fill="none" stroke="#bbb" stroke-width="1.6"/>
  <text x="620" y="70" font-size="11" fill="#888">PDPos (raw input)</text>

  <!-- high cut-off (low smoothing) - tracks closely -->
  <path d="M80 200 L160 175 L260 150 L360 125 L460 95 L560 82 L780 82" fill="none" stroke="#5b8def" stroke-width="2"/>
  <text x="490" y="115" font-size="11" fill="#5b8def">high PDPosFilt (faster, less smoothing)</text>

  <!-- low cut-off (heavy smoothing) - smooth gradual rise -->
  <path d="M80 200 C 200 195 320 160 460 130 S 700 95 780 90" fill="none" stroke="#e0736b" stroke-width="2"/>
  <text x="320" y="170" font-size="11" fill="#e0736b">low PDPosFilt (heavier smoothing)</text>

  <!-- caption -->
  <text x="410" y="252" text-anchor="middle" font-size="11" fill="#5b6b7b">The filter coefficient is computed from PDPosFilt; raising PDPosFilt raises the cut-off frequency and tightens tracking.</text>
</svg>
