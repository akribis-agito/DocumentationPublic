<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Pulse-and-direction timing: each rising edge of the pulse line increments PDPos by the scaling factor PDFact over PDFactDen; the direction line sets the sign, so PDPos counts up while direction is high and down while it is low.">
  <title>Pulse-and-direction timing</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- title labels -->
  <text x="12" y="22" font-weight="bold">Pulse line</text>
  <text x="12" y="120" font-weight="bold">Direction line</text>
  <text x="12" y="218" font-weight="bold">PDPos (scaled counter)</text>

  <!-- Pulse waveform: 6 rising edges across the timeline -->
  <line x1="120" y1="60" x2="800" y2="60" stroke="#5b6b7b" stroke-width="1"/>
  <!-- pulses (high pulses) -->
  <path d="M150 60 V30 H170 V60 M230 60 V30 H250 V60 M310 60 V30 H330 V60 M450 60 V30 H470 V60 M530 60 V30 H550 V60 M610 60 V30 H630 V60" fill="none" stroke="#5b8def" stroke-width="1.5"/>
  <text x="160" y="78" text-anchor="middle" font-size="11">1</text>
  <text x="240" y="78" text-anchor="middle" font-size="11">2</text>
  <text x="320" y="78" text-anchor="middle" font-size="11">3</text>
  <text x="460" y="78" text-anchor="middle" font-size="11">4</text>
  <text x="540" y="78" text-anchor="middle" font-size="11">5</text>
  <text x="620" y="78" text-anchor="middle" font-size="11">6</text>

  <!-- Direction line: high for first three pulses, low for the rest -->
  <path d="M120 160 H400 V130 V160" fill="none" stroke="#e0736b" stroke-width="1.5"/>
  <path d="M120 130 H400" fill="none" stroke="#e0736b" stroke-width="1.5"/>
  <path d="M400 130 V160 H800" fill="none" stroke="#e0736b" stroke-width="1.5"/>
  <text x="260" y="120" text-anchor="middle" font-size="11" fill="#5b6b7b">high &#8594; count up</text>
  <text x="600" y="180" text-anchor="middle" font-size="11" fill="#5b6b7b">low &#8594; count down</text>

  <!-- PDPos staircase -->
  <line x1="120" y1="260" x2="800" y2="260" stroke="#5b6b7b" stroke-width="1"/>
  <!-- steps up to +3, then steps down to 0 -->
  <path d="M120 250 H160 V240 H240 V230 H320 V220 H460 V230 H540 V240 H620 V250 H800" fill="none" stroke="#5b8def" stroke-width="1.8"/>
  <!-- annotations -->
  <text x="160" y="248" font-size="11" fill="#5b6b7b">+1</text>
  <text x="240" y="238" font-size="11" fill="#5b6b7b">+2</text>
  <text x="320" y="228" font-size="11" fill="#5b6b7b">+3</text>
  <text x="460" y="218" font-size="11" fill="#5b6b7b">+2</text>
  <text x="540" y="228" font-size="11" fill="#5b6b7b">+1</text>
  <text x="620" y="238" font-size="11" fill="#5b6b7b">0</text>

  <!-- caption -->
  <text x="410" y="278" text-anchor="middle" font-size="11" fill="#5b6b7b">Each rising pulse edge advances PDPos by PDFact / PDFactDen; direction line sets the sign.</text>
</svg>
