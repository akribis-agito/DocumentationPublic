<svg xmlns="http://www.w3.org/2000/svg" width="820" height="250" viewBox="0 0 820 250" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- pulse/direction input -->
  <rect x="12" y="95" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="87" y="120" text-anchor="middle">Pulse / direction</text>
  <text x="87" y="138" text-anchor="middle" font-size="11">input (PDSubType)</text>

  <!-- scaling -->
  <rect x="202" y="95" width="160" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="282" y="116" text-anchor="middle">Scale &amp; sign</text>
  <text x="282" y="133" text-anchor="middle" font-size="11">PDFact / PDFactDen,</text>
  <text x="282" y="148" text-anchor="middle" font-size="11">PDEncDir</text>

  <!-- PDPos counter -->
  <rect x="402" y="95" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="477" y="120" text-anchor="middle">PDPos counter</text>
  <text x="477" y="138" text-anchor="middle" font-size="11">accumulated each cycle</text>

  <!-- direct branch -->
  <rect x="600" y="22" width="208" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="704" y="44" text-anchor="middle">Direct (MotionMode = 3)</text>
  <text x="704" y="62" text-anchor="middle" font-size="11">filter (PDPosFilt) &#8594; reference</text>

  <!-- indirect branch -->
  <rect x="600" y="172" width="208" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="704" y="194" text-anchor="middle">Indirect (MotionMode = 4)</text>
  <text x="704" y="212" text-anchor="middle" font-size="11">AbsTrgt &#8594; profiler &#8594; reference</text>

  <!-- arrows -->
  <line x1="162" y1="125" x2="200" y2="125" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="362" y1="125" x2="400" y2="125" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="552" y1="115" x2="598" y2="62" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="552" y1="135" x2="598" y2="188" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
