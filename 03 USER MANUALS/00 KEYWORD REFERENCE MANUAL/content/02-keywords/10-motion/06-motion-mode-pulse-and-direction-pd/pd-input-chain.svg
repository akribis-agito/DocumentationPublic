<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="860" height="300" fill="#ffffff"/>
  <!-- FPGA counter -->
  <rect x="10" y="60" width="150" height="60" rx="6" fill="#eef3fb" stroke="#3b6ea5"/>
  <text x="85" y="84" text-anchor="middle">FPGA PD counter</text>
  <text x="85" y="102" text-anchor="middle" font-size="11">pulses this cycle</text>
  <text x="85" y="116" text-anchor="middle" font-size="11">(&#177;127, format = PDSubType)</text>

  <!-- scaling -->
  <rect x="200" y="60" width="170" height="60" rx="6" fill="#eef9ee" stroke="#3b9a4f"/>
  <text x="285" y="82" text-anchor="middle">scale &#215; PDFact/PDFactDen</text>
  <text x="285" y="100" text-anchor="middle" font-size="11">sign &#215; (1 &#8722; 2&#183;PDEncDir)</text>
  <text x="285" y="114" text-anchor="middle" font-size="11">remainder fed forward</text>

  <!-- accumulator -->
  <rect x="410" y="60" width="150" height="60" rx="6" fill="#fbf3e7" stroke="#b5852f"/>
  <text x="485" y="84" text-anchor="middle">gllPDPos (32.32)</text>
  <text x="485" y="102" text-anchor="middle" font-size="11">+= delta each cycle</text>
  <text x="485" y="116" text-anchor="middle" font-size="11">read as PDPos / PDVel</text>

  <!-- direct -->
  <rect x="600" y="10" width="245" height="56" rx="6" fill="#f7eef9" stroke="#8a3b9a"/>
  <text x="722" y="30" text-anchor="middle">DIRECT (MotionMode=3)</text>
  <text x="722" y="48" text-anchor="middle" font-size="11">1st-order filter (PDFiltFact) &#8594; PosRef</text>

  <!-- indirect -->
  <rect x="600" y="116" width="245" height="56" rx="6" fill="#f7eef9" stroke="#8a3b9a"/>
  <text x="722" y="136" text-anchor="middle">INDIRECT (MotionMode=4)</text>
  <text x="722" y="154" text-anchor="middle" font-size="11">sets AbsTrgt &#8594; profiler &#8594; PosRef</text>

  <!-- arrows -->
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#444"/></marker></defs>
  <line x1="160" y1="90" x2="198" y2="90" stroke="#444" marker-end="url(#a)"/>
  <line x1="370" y1="90" x2="408" y2="90" stroke="#444" marker-end="url(#a)"/>
  <line x1="560" y1="80" x2="598" y2="45" stroke="#444" marker-end="url(#a)"/>
  <line x1="560" y1="100" x2="598" y2="138" stroke="#444" marker-end="url(#a)"/>

  <text x="430" y="210" font-size="12" fill="#555">SetPDPos presets gllPDPos; Begin latches PDPosInitial so motion is relative to that instant.</text>
  <text x="430" y="232" font-size="12" fill="#555">PDUsrUnits scales PDPos/PDVel only when read over the bus; PDEndTime gates in-target.</text>
</svg>
