<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" viewBox="0 0 700 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="RptMode geometry: with RptMode 0 the axis moves to AbsTrgt then back to start, one round-trip per pair of reps; with RptMode 1 each rep advances by delta, where delta is AbsTrgt minus start.">
  <title>RptMode bidirectional vs unidirectional geometry</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">RptMode: bidirectional (0) versus unidirectional (1)</text>

  <!-- Bidirectional row -->
  <text x="20" y="60" font-weight="bold">RptMode = 0 (bidirectional, to-and-fro)</text>
  <line x1="40" y1="100" x2="660" y2="100" stroke="#5b6b7b" stroke-width="1.2"/>

  <circle cx="80" cy="100" r="6" fill="#5b8def"/>
  <text x="80" y="118" text-anchor="middle" font-size="11">start</text>

  <circle cx="380" cy="100" r="6" fill="#e0736b"/>
  <text x="380" y="118" text-anchor="middle" font-size="11">AbsTrgt</text>

  <path d="M 80 100 C 80 70 380 70 380 100" fill="none" stroke="#5b8def" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="230" y="92" text-anchor="middle" fill="#5b8def" font-size="11">1st rep (out)</text>

  <path d="M 380 100 C 380 130 80 130 80 100" fill="none" stroke="#5b8def" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="230" y="148" text-anchor="middle" fill="#5b8def" font-size="11">2nd rep (back)</text>

  <text x="500" y="88" font-size="11" fill="#5b6b7b">RptCycles = 2 = one round-trip</text>

  <!-- Unidirectional row -->
  <text x="20" y="195" font-weight="bold">RptMode = 1 (unidirectional, stepping)</text>
  <line x1="40" y1="235" x2="660" y2="235" stroke="#5b6b7b" stroke-width="1.2"/>

  <circle cx="80"  cy="235" r="6" fill="#5b8def"/>
  <text x="80"  y="253" text-anchor="middle" font-size="11">start</text>
  <circle cx="220" cy="235" r="6" fill="#e0736b"/>
  <text x="220" y="253" text-anchor="middle" font-size="11">AbsTrgt</text>
  <circle cx="360" cy="235" r="6" fill="#e0736b"/>
  <text x="360" y="253" text-anchor="middle" font-size="11">+&#916;</text>
  <circle cx="500" cy="235" r="6" fill="#e0736b"/>
  <text x="500" y="253" text-anchor="middle" font-size="11">+2&#916;</text>

  <path d="M 80 235 C 80 210 220 210 220 235"  fill="none" stroke="#5b8def" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 220 235 C 220 210 360 210 360 235" fill="none" stroke="#5b8def" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 360 235 C 360 210 500 210 500 235" fill="none" stroke="#5b8def" stroke-width="1.6" marker-end="url(#arrow)"/>

  <text x="290" y="272" text-anchor="middle" fill="#5b8def" font-size="11">each rep advances by &#916; = AbsTrgt &#8722; start</text>
</svg>
