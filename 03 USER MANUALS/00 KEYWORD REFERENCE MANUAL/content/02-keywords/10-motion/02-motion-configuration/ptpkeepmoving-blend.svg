<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="PTPKeepMoving 0 versus 1: with PTPKeepMoving 0 a new Begin during a move is rejected until the axis rests, so two separate trapezoids run back to back; with PTPKeepMoving 1 the profiler retargets in place and blends from the current velocity to the new target without resting.">
  <title>PTPKeepMoving blend vs restart</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">PTPKeepMoving = 0 vs 1: behaviour at a mid-move Begin with a new target</text>

  <!-- shared axes -->
  <text x="20" y="55" font-weight="bold">PTPKeepMoving = 0 (default): wait for the move to finish, then start the next</text>
  <line x1="40" y1="130" x2="700" y2="130" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="40" y1="130" x2="40" y2="70" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="20" y="105" fill="#5b6b7b" font-size="11">vel</text>
  <text x="700" y="148" text-anchor="end" fill="#5b6b7b" font-size="11">time</text>

  <!-- profile 0: trapezoid + brake to zero + new trapezoid -->
  <polyline points="40,130 90,80 230,80 320,130 380,130 430,90 540,90 600,130"
            fill="none" stroke="#5b8def" stroke-width="2"/>
  <line x1="320" y1="125" x2="320" y2="138" stroke="#e0736b"/>
  <text x="320" y="158" text-anchor="middle" fill="#e0736b" font-size="11">new Begin</text>
  <text x="320" y="172" text-anchor="middle" fill="#5b6b7b" font-size="11">(rejected until rest)</text>

  <!-- ====== second block ====== -->
  <text x="20" y="200" font-weight="bold">PTPKeepMoving = 1: profiler retargets in place, ramps to the new target without resting</text>
  <line x1="40" y1="270" x2="700" y2="270" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="40" y1="270" x2="40" y2="215" stroke="#5b6b7b" stroke-width="1.2"/>

  <!-- profile 1: ramp up, hold, new Begin, ramp down to new cruise (smaller), hold, brake to zero -->
  <polyline points="40,270 90,225 230,225 320,225 400,250 540,250 600,270"
            fill="none" stroke="#5b8def" stroke-width="2"/>
  <line x1="320" y1="265" x2="320" y2="278" stroke="#e0736b"/>
  <text x="320" y="293" text-anchor="middle" fill="#e0736b" font-size="11">new Begin (lower target)</text>
</svg>
