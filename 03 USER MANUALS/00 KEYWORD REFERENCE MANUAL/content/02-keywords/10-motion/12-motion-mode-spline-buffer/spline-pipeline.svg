<svg xmlns="http://www.w3.org/2000/svg" width="820" height="190" viewBox="0 0 820 190" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Spline buffer motion pipeline: BuffPos and BuffTime waypoints are passed to spline interpolation governed by BuffCalc, BuffSplineMod, BuffEdgeMode and BuffSlopes; the fitted spline is streamed as the reference and repeats per BuffCycles.">
  <title>Spline buffer motion pipeline</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- waypoints -->
  <rect x="12" y="70" width="160" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="92" y="91" text-anchor="middle">Buffered points</text>
  <text x="92" y="108" text-anchor="middle" font-size="11">BuffPos, BuffTime</text>
  <text x="92" y="123" text-anchor="middle" font-size="11">(waypoints)</text>

  <!-- spline calc -->
  <rect x="262" y="70" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="352" y="91" text-anchor="middle">Spline interpolation</text>
  <text x="352" y="108" text-anchor="middle" font-size="11">BuffCalc, BuffSplineMod,</text>
  <text x="352" y="123" text-anchor="middle" font-size="11">BuffEdgeMode, BuffSlopes</text>

  <!-- reference -->
  <rect x="532" y="70" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="622" y="95" text-anchor="middle">Streamed reference</text>
  <text x="622" y="113" text-anchor="middle" font-size="11">repeats per BuffCycles</text>

  <!-- arrows -->
  <line x1="172" y1="100" x2="260" y2="100" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="100" x2="530" y2="100" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="352" y="158" text-anchor="middle" font-size="11" fill="#5b6b7b">coefficients computed by BuffCalc before Begin starts the motion</text>
</svg>
