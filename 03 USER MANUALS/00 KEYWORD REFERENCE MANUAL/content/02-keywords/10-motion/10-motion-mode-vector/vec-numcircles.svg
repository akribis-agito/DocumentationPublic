<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="VecNumCircles effect: with VecNumCircles equal to 0 the path is just the base arc from start to end; with VecNumCircles equal to 2 the path is the base arc plus two full revolutions, lengthening the total path distance by two times two-pi times the radius.">
  <title>Base arc vs base arc plus extra revolutions from VecNumCircles</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="410" y="22" text-anchor="middle" font-weight="bold">VecNumCircles adds full 2&#960; turns to the base arc</text>

  <!-- Case 1: VecNumCircles = 0 -->
  <text x="170" y="58" text-anchor="middle" font-weight="bold">VecNumCircles = 0</text>
  <circle cx="170" cy="160" r="60" fill="none" stroke="#5b8def" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="170" cy="160" r="3" fill="#5b6b7b"/>
  <text x="178" y="164" font-size="11">center</text>
  <circle cx="230" cy="160" r="4" fill="#5b8def"/>
  <text x="236" y="164" font-size="11">start</text>
  <circle cx="170" cy="100" r="4" fill="#e0736b"/>
  <text x="178" y="98" font-size="11">end</text>
  <path d="M 230 160 A 60 60 0 0 0 170 100" fill="none" stroke="#5b8def" stroke-width="2.4"/>
  <text x="170" y="248" text-anchor="middle" font-size="11" fill="#5b6b7b">base arc only (quarter turn)</text>

  <!-- Case 2: VecNumCircles = 2 -->
  <text x="650" y="58" text-anchor="middle" font-weight="bold">VecNumCircles = 2</text>
  <circle cx="650" cy="160" r="60" fill="none" stroke="#5b8def" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="650" cy="160" r="3" fill="#5b6b7b"/>
  <text x="658" y="164" font-size="11">center</text>
  <circle cx="710" cy="160" r="4" fill="#5b8def"/>
  <text x="716" y="164" font-size="11">start</text>
  <circle cx="650" cy="100" r="4" fill="#e0736b"/>
  <text x="658" y="98" font-size="11">end</text>
  <!-- base arc -->
  <path d="M 710 160 A 60 60 0 0 0 650 100" fill="none" stroke="#5b8def" stroke-width="2.4"/>
  <!-- two extra revolutions, drawn as concentric arrows -->
  <circle cx="650" cy="160" r="48" fill="none" stroke="#5b8def" stroke-width="1.6" stroke-dasharray="6 3"/>
  <circle cx="650" cy="160" r="36" fill="none" stroke="#5b8def" stroke-width="1.6" stroke-dasharray="6 3"/>
  <text x="650" y="248" text-anchor="middle" font-size="11" fill="#5b6b7b">base arc + 2 full turns</text>

  <!-- caption -->
  <text x="410" y="272" text-anchor="middle" font-size="11" fill="#5b6b7b">Total path length VecAbsTrgt = (base swept angle + 2&#960; &#215; VecNumCircles) &#215; radius</text>
</svg>
