<svg xmlns="http://www.w3.org/2000/svg" width="820" height="210" viewBox="0 0 820 210" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Vector motion pipeline: a line or arc path target is shaped by a single path-velocity profile (VecSpeed, VecAccel, VecDecel) and split across the VecMemberAxes group to produce per-axis references for each member.">
  <title>Vector motion pipeline</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- path target -->
  <rect x="12" y="78" width="160" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="92" y="103" text-anchor="middle">Path target</text>
  <text x="92" y="121" text-anchor="middle" font-size="11">line / arc (VecType)</text>

  <!-- path velocity profile -->
  <rect x="262" y="78" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="352" y="103" text-anchor="middle">Path-velocity profile</text>
  <text x="352" y="121" text-anchor="middle" font-size="11">VecSpeed, VecAccel, VecDecel</text>

  <!-- member axes -->
  <rect x="532" y="40" width="276" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="670" y="62" text-anchor="middle">Axis reference (member 1)</text>
  <rect x="532" y="128" width="276" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="670" y="156" text-anchor="middle">Axis reference (member n)</text>

  <!-- arrows -->
  <line x1="172" y1="108" x2="260" y2="108" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="100" x2="530" y2="66" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="116" x2="530" y2="150" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="352" y="190" text-anchor="middle" font-size="11" fill="#5b6b7b">single profile split across the VecMemberAxes group</text>
</svg>
