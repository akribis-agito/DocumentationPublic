<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="VelRef assembly: the position-controller output is summed with the velocity feed-forward, optional mode and dual-loop adjustments are applied, then the sum is clamped to plus or minus MaxVel.">
  <title>VelRef assembly</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">VelRef assembly: position-controller output + velocity feed-forward, clamped at MaxVel</text>

  <!-- PosErr -->
  <rect x="20" y="60" width="120" height="44" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="80" y="80" text-anchor="middle">PosErr</text>
  <text x="80" y="96" text-anchor="middle" font-size="11" fill="#1f2933">&#215; PosGain</text>

  <!-- dPosRef -->
  <rect x="20" y="160" width="140" height="44" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="90" y="180" text-anchor="middle">dPosRef</text>
  <text x="90" y="196" text-anchor="middle" font-size="11" fill="#1f2933">&#215; VelTrackFact / 1024</text>

  <!-- Sum -->
  <circle cx="240" cy="130" r="22" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="240" y="135" text-anchor="middle" font-size="18">+</text>

  <!-- Optional substitutions -->
  <rect x="310" y="60" width="170" height="44" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="395" y="80" text-anchor="middle">Vel-mode override</text>
  <text x="395" y="96" text-anchor="middle" font-size="11" fill="#1f2933">analog command replaces</text>

  <rect x="310" y="120" width="170" height="44" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="395" y="140" text-anchor="middle">Dual-loop scaling</text>
  <text x="395" y="156" text-anchor="middle" font-size="11" fill="#1f2933">&#215; DualLoopFact gain</text>

  <rect x="310" y="180" width="170" height="44" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="395" y="200" text-anchor="middle">Injection</text>
  <text x="395" y="216" text-anchor="middle" font-size="11" fill="#1f2933">sine / square / PRBS</text>

  <!-- Saturation -->
  <rect x="540" y="110" width="150" height="64" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.6"/>
  <text x="615" y="135" text-anchor="middle">Saturate to &#177;MaxVel</text>
  <text x="615" y="155" text-anchor="middle" font-size="11" fill="#1f2933">sets StatReg bit 23</text>
  <text x="615" y="171" text-anchor="middle" font-size="11" fill="#1f2933">on clamp</text>

  <!-- Output -->
  <text x="615" y="200" text-anchor="middle" font-size="12" font-weight="bold">&#8594; VelRef</text>

  <!-- arrows -->
  <line x1="140" y1="82" x2="218" y2="120" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="160" y1="182" x2="218" y2="140" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="262" y1="130" x2="310" y2="130" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="142" x2="540" y2="142" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="360" y="248" text-anchor="middle" fill="#1f2933" font-size="11">Each cycle: P-out + scaled feed-forward, then mode/dual-loop/injection adjustments, then hard clamp to &#177;MaxVel.</text>
</svg>
