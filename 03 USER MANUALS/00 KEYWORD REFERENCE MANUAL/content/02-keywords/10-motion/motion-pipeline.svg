<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Motion pipeline: command and profiler produce PosRef, which feeds control loops and the motor; feedback returns position and velocity, and the motion state is reported as MotionStat and MotionReason.">
  <title>Motion pipeline</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">Motion pipeline</text>

  <!-- Target / command -->
  <rect x="20" y="70" width="140" height="50" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="90" y="90" text-anchor="middle">Target / command</text>
  <text x="90" y="106" text-anchor="middle" font-size="11" fill="#1f2933">Begin, AbsTrgt</text>

  <!-- Trajectory profiler -->
  <rect x="190" y="70" width="170" height="50" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="275" y="90" text-anchor="middle">Trajectory profiler</text>
  <text x="275" y="106" text-anchor="middle" font-size="11" fill="#1f2933">Speed, Accel, Decel, Jerk</text>

  <!-- PosRef -->
  <rect x="390" y="70" width="130" height="50" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="455" y="90" text-anchor="middle" font-weight="bold">PosRef</text>
  <text x="455" y="106" text-anchor="middle" font-size="11" fill="#1f2933">position reference</text>

  <!-- Control loops -->
  <rect x="550" y="70" width="140" height="50" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="620" y="90" text-anchor="middle">Control loops</text>
  <text x="620" y="106" text-anchor="middle" font-size="11" fill="#1f2933">position / velocity</text>

  <!-- Motor -->
  <rect x="590" y="180" width="100" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="640" y="208" text-anchor="middle">Motor</text>

  <!-- Feedback -->
  <rect x="300" y="180" width="200" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="400" y="201" text-anchor="middle">Feedback: Pos, Vel</text>
  <text x="400" y="217" text-anchor="middle" font-size="11" fill="#1f2933">PosErr = PosRef &#8722; Pos</text>

  <!-- Motion state -->
  <rect x="170" y="240" width="260" height="40" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="300" y="265" text-anchor="middle" font-size="12">Motion state: MotionStat, MotionReason</text>

  <!-- forward arrows -->
  <line x1="160" y1="95" x2="187" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="360" y1="95" x2="387" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="520" y1="95" x2="547" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="620" y1="120" x2="620" y2="177" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- feedback arrows -->
  <line x1="590" y1="203" x2="503" y2="203" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="400" y1="180" x2="450" y2="123" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="430" y="160" fill="#1f2933" font-size="11">Pos / Vel</text>

  <!-- profiler reports state -->
  <line x1="275" y1="120" x2="285" y2="237" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
