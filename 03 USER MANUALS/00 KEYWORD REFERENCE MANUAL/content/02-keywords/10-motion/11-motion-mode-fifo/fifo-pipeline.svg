<svg xmlns="http://www.w3.org/2000/svg" width="820" height="190" viewBox="0 0 820 190" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="FIFO motion pipeline: the host pushes points or segments into the tail of a 128-entry FIFO queue; the controller drains one entry per FIFOCycleTime from the head, interpolating between entries into the reference.">
  <title>FIFO motion pipeline: fill at tail, drain at head</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- host pushes (fill) -->
  <rect x="12" y="70" width="160" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="92" y="95" text-anchor="middle">Host pushes (fill)</text>
  <text x="92" y="113" text-anchor="middle" font-size="11">points / segments</text>

  <!-- queue -->
  <rect x="262" y="70" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="352" y="95" text-anchor="middle">FIFO queue</text>
  <text x="352" y="113" text-anchor="middle" font-size="11">up to 128 entries</text>

  <!-- playback (drain) -->
  <rect x="532" y="70" width="180" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="622" y="91" text-anchor="middle">Playback (drain)</text>
  <text x="622" y="108" text-anchor="middle" font-size="11">per FIFOCycleTime,</text>
  <text x="622" y="123" text-anchor="middle" font-size="11">interpolated &#8594; reference</text>

  <!-- arrows -->
  <line x1="172" y1="100" x2="260" y2="100" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="100" x2="530" y2="100" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="352" y="80" text-anchor="middle" font-size="11" fill="#5b6b7b">tail</text>
  <text x="352" y="158" text-anchor="middle" font-size="11" fill="#5b6b7b">push at the tail, consume from the head each cycle</text>
</svg>
