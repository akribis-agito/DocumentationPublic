<svg xmlns="http://www.w3.org/2000/svg" width="560" height="170" font-family="sans-serif" font-size="12">
  <text x="10" y="20">Host pushes (fill)</text>
  <text x="400" y="20">Controller plays back (drain)</text>
  <rect x="10" y="35" width="540" height="40" fill="none" stroke="#333"/>
  <line x1="190" y1="35" x2="190" y2="75" stroke="#333"/>
  <line x1="280" y1="35" x2="280" y2="75" stroke="#333"/>
  <line x1="370" y1="35" x2="370" y2="75" stroke="#333"/>
  <line x1="460" y1="35" x2="460" y2="75" stroke="#333"/>
  <text x="60" y="60">newest ...</text>
  <text x="210" y="60">seg</text>
  <text x="300" y="60">seg</text>
  <text x="390" y="60">seg</text>
  <text x="480" y="60">oldest</text>
  <text x="490" y="95">(playing)</text>
  <path d="M10 110 H10" stroke="none"/>
  <text x="10" y="120">Push at the tail; the controller takes the next segment from the head each cycle time.</text>
  <text x="10" y="140">Queue empties faster than it is filled = underrun: the motion ends after the last segment.</text>
  <text x="10" y="160">Full queue = further pushes are rejected with an error until a segment is consumed.</text>
</svg>
