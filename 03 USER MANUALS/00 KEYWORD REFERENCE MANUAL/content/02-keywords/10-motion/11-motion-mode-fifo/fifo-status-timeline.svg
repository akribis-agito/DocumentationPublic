<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="FIFO free-slot timeline: the host fills faster than the controller drains so FIFOStatus[2] falls toward zero; at zero the queue is full and further pushes are rejected; as segments finish the free count rises again.">
  <title>FIFOStatus[2] free-slot timeline</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="410" y="22" text-anchor="middle" font-weight="bold">FIFO queue: 128-slot fill vs. drain, free-count crosses zero on full and 128 on empty</text>

  <!-- axes -->
  <line x1="80" y1="220" x2="780" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="80" y1="60" x2="80" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <text x="420" y="252" text-anchor="middle" font-size="11">time</text>
  <text x="50" y="140" text-anchor="middle" font-size="11" transform="rotate(-90 50 140)">FIFOStatus[2] (free slots)</text>
  <text x="74" y="64" text-anchor="end" font-size="11">128</text>
  <text x="74" y="222" text-anchor="end" font-size="11">0</text>

  <!-- horizontal guide lines for 128 and 0 -->
  <line x1="80" y1="60" x2="780" y2="60" stroke="#5b6b7b" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- free-count curve: drops as host pushes faster than drain, rises again -->
  <path d="M80 60 L150 80 L220 110 L290 140 L360 168 L430 188 L500 210 L520 220 L560 200 L620 168 L680 130 L740 95 L780 75" fill="none" stroke="#5b8def" stroke-width="2"/>

  <!-- markers -->
  <circle cx="520" cy="220" r="5" fill="#e0736b"/>
  <text x="526" y="218" font-size="11" fill="#e0736b">queue full &#8594; further pushes rejected</text>
  <circle cx="80" cy="60" r="5" fill="#5b8def"/>
  <text x="90" y="58" font-size="11" fill="#5b6b7b">queue empty (just cleared)</text>

  <!-- caption -->
  <text x="410" y="272" text-anchor="middle" font-size="11" fill="#5b6b7b">Poll FIFOStatus[2] to pace host pushes; an underrun (free count = 128 mid-playback) ends the motion gracefully.</text>
</svg>
