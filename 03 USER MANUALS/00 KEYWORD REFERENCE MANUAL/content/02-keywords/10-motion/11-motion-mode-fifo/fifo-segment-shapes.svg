<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="FIFO segment shapes over one FIFOCycleTime: a linear push advances position at constant velocity to the next sample; a parabolic push advances position with constant acceleration.">
  <title>FIFO linear versus parabolic segment shape</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="410" y="22" text-anchor="middle" font-weight="bold">FIFO segment shapes: position reference over one FIFOCycleTime</text>

  <!-- LEFT: linear segment -->
  <text x="180" y="58" text-anchor="middle" font-weight="bold">Linear (FIFOPushLinP / FIFOPushLinV)</text>
  <line x1="80" y1="220" x2="320" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="80" y1="220" x2="320" y2="120" stroke="#5b8def" stroke-width="2.2"/>
  <text x="200" y="156" font-size="11" fill="#5b6b7b">constant velocity</text>
  <text x="200" y="240" text-anchor="middle" font-size="11">FIFOCycleTime samples</text>
  <text x="70" y="222" text-anchor="end" font-size="11">start</text>
  <text x="70" y="124" text-anchor="end" font-size="11">start + &#916;p</text>
  <line x1="316" y1="125" x2="316" y2="115" stroke="#5b8def"/>

  <!-- RIGHT: parabolic segment -->
  <text x="610" y="58" text-anchor="middle" font-weight="bold">Parabolic (FIFOPushParP / FIFOPushParA)</text>
  <line x1="510" y1="220" x2="750" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="510" y1="80" x2="510" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <!-- Parabolic curve (constant accel from low velocity) -->
  <path d="M510 220 Q 630 220 750 100" fill="none" stroke="#5b8def" stroke-width="2.2"/>
  <text x="630" y="156" font-size="11" fill="#5b6b7b">constant acceleration</text>
  <text x="630" y="240" text-anchor="middle" font-size="11">FIFOCycleTime samples</text>
  <text x="500" y="222" text-anchor="end" font-size="11">start</text>
  <text x="500" y="104" text-anchor="end" font-size="11">start + &#916;p</text>

  <!-- caption -->
  <text x="410" y="272" text-anchor="middle" font-size="11" fill="#5b6b7b">A linear segment advances position at constant velocity; a parabolic segment ramps velocity at a constant acceleration.</text>
</svg>
