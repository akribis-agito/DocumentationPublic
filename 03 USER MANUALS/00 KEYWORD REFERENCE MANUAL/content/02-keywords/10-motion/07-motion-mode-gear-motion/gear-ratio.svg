<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Gear ratio worked example: with MasterFact 3 and MasterFactDen 5, when the master variable moves plus 5000 units MasterPos accumulates plus 3000 units. The fractional remainder is carried each cycle so the ratio is drift-free.">
  <title>Gear ratio worked example</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- title -->
  <text x="410" y="22" text-anchor="middle" font-weight="bold">Gear ratio MasterFact / MasterFactDen = 3 / 5 (worked example)</text>

  <!-- Master plot -->
  <text x="60" y="62" font-weight="bold">Master variable</text>
  <line x1="60" y1="170" x2="380" y2="170" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="60" y1="80" x2="60" y2="170" stroke="#5b6b7b" stroke-width="1"/>
  <text x="50" y="174" text-anchor="end" font-size="11">0</text>
  <text x="50" y="84" text-anchor="end" font-size="11">5000</text>
  <text x="220" y="190" text-anchor="middle" font-size="11">time</text>
  <!-- master ramp -->
  <line x1="60" y1="170" x2="380" y2="80" stroke="#5b8def" stroke-width="2"/>
  <text x="280" y="120" font-size="11" fill="#5b6b7b">+5000 units</text>

  <!-- Follower plot -->
  <text x="460" y="62" font-weight="bold">MasterPos accumulator</text>
  <line x1="460" y1="170" x2="780" y2="170" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="460" y1="80" x2="460" y2="170" stroke="#5b6b7b" stroke-width="1"/>
  <text x="450" y="174" text-anchor="end" font-size="11">0</text>
  <text x="450" y="84" text-anchor="end" font-size="11">5000</text>
  <text x="620" y="190" text-anchor="middle" font-size="11">time</text>
  <!-- follower ramp at 3/5 slope -->
  <line x1="460" y1="170" x2="780" y2="116" stroke="#5b8def" stroke-width="2"/>
  <text x="680" y="138" font-size="11" fill="#5b6b7b">+3000 units</text>

  <!-- arrow with ratio label between the two plots -->
  <line x1="395" y1="125" x2="445" y2="125" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="382" y="100" width="74" height="20" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1"/>
  <text x="419" y="114" text-anchor="middle" font-size="11">&#215; 3 / 5</text>

  <!-- caption -->
  <text x="410" y="232" text-anchor="middle" font-size="11" fill="#5b6b7b">Master moves +5000 units; with MasterFact = 3 and MasterFactDen = 5,</text>
  <text x="410" y="248" text-anchor="middle" font-size="11" fill="#5b6b7b">MasterPos accumulates +3000. The fractional remainder is carried each cycle so the ratio is drift-free.</text>
</svg>
