<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Speed change on the fly: while in cruise at Speed, when PosRef crosses SpeedChgPos in the forward direction, SpeedChgNew is loaded into Speed and the trajectory ramps to the new value under Accel and Decel; SpeedChgOn then auto-clears.">
  <title>Speed change on the fly timeline</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">Speed change on the fly (SpeedChgOn=1, SpeedChgDir=0 forward)</text>

  <!-- velocity axes -->
  <line x1="60" y1="180" x2="700" y2="180" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="60" y1="180" x2="60"  y2="60"  stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="40" y="80" fill="#5b6b7b" font-size="11">vel</text>
  <text x="700" y="198" text-anchor="end" fill="#5b6b7b" font-size="11">PosRef (time)</text>

  <!-- old cruise (Speed) -->
  <line x1="60"  y1="90"  x2="320" y2="90"  stroke="#5b8def" stroke-width="2"/>
  <text x="180" y="80"  text-anchor="middle" fill="#5b8def" font-size="11">Speed (initial)</text>

  <!-- ramp down to SpeedChgNew under Accel/Decel -->
  <line x1="320" y1="90"  x2="430" y2="140" stroke="#5b8def" stroke-width="2"/>

  <!-- new cruise (SpeedChgNew lower) -->
  <line x1="430" y1="140" x2="660" y2="140" stroke="#5b8def" stroke-width="2"/>
  <text x="545" y="132" text-anchor="middle" fill="#5b8def" font-size="11">SpeedChgNew</text>

  <!-- trigger marker -->
  <line x1="320" y1="60" x2="320" y2="190" stroke="#e0736b" stroke-dasharray="3,3"/>
  <text x="320" y="52" text-anchor="middle" fill="#e0736b" font-size="11">PosRef crosses SpeedChgPos</text>
  <text x="320" y="218" text-anchor="middle" fill="#e0736b" font-size="11">&#8594; load SpeedChgNew into Speed</text>
  <text x="320" y="232" text-anchor="middle" fill="#e0736b" font-size="11">&#8594; SpeedChgOn auto-clears (one-shot)</text>

  <text x="370" y="262" text-anchor="middle" fill="#5b6b7b" font-size="11">Ramp shape: normal Accel/Decel (and jerk smoothing); the speed does not step.</text>
</svg>
