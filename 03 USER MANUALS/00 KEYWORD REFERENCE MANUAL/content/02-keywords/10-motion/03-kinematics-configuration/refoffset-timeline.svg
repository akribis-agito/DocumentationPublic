<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Reference-offset injection timeline: across the RefOffsetSamp cycles, RefOffsetStep is added to the profiler reference each cycle, producing a shaped reference offset from the baseline ramp.">
  <title>Reference-offset per-cycle injection</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">RefOffsetSamp / RefOffsetStep: per-cycle reference injection</text>

  <!-- position axes -->
  <line x1="60" y1="200" x2="700" y2="200" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="60" y1="200" x2="60"  y2="60"  stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="40" y="80" fill="#5b6b7b" font-size="11">PosRef</text>
  <text x="700" y="218" text-anchor="end" fill="#5b6b7b" font-size="11">time (cycles)</text>

  <!-- profiler reference (baseline ramp) -->
  <line x1="60" y1="180" x2="660" y2="80" stroke="#5b8def" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="75" y="172" fill="#5b8def" font-size="11">profiler reference (Speed/Accel/Decel)</text>

  <!-- injection window -->
  <rect x="240" y="60" width="220" height="140" fill="#fdecea" opacity="0.4"/>
  <line x1="240" y1="60" x2="240" y2="200" stroke="#e0736b" stroke-dasharray="3,3"/>
  <line x1="460" y1="60" x2="460" y2="200" stroke="#e0736b" stroke-dasharray="3,3"/>
  <text x="350" y="74" text-anchor="middle" fill="#e0736b" font-size="11">RefOffsetSamp cycles</text>
  <text x="350" y="88" text-anchor="middle" fill="#e0736b" font-size="11">+RefOffsetStep each cycle</text>

  <!-- shaped reference with offset on top -->
  <path d="M 60 180 L 240 150 L 460 70 L 660 50" fill="none" stroke="#e0736b" stroke-width="2"/>
  <text x="510" y="50" text-anchor="middle" fill="#e0736b" font-size="11">shaped reference</text>

  <text x="240" y="220" text-anchor="middle" fill="#5b6b7b" font-size="11">arm</text>
  <text x="460" y="220" text-anchor="middle" fill="#5b6b7b" font-size="11">count expires &#8594; auto-clear</text>

  <text x="370" y="255" text-anchor="middle" fill="#5b6b7b" font-size="11">Total injected shift &#8776; RefOffsetStep &#215; RefOffsetSamp (added directly to the reference, bypassing Accel/Decel).</text>
</svg>
