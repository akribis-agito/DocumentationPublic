<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="CNC segment chain with two corner blends and a final stop: a non-zero CNCAEndSpeed at the corner between two segments lets the path velocity blend without stopping, while CNCAEndSpeed equal to zero at the end of the last segment forces the path to rest.">
  <title>CNC segment chain showing corner blends driven by CNCAEndSpeed</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- title -->
  <text x="410" y="22" text-anchor="middle" font-weight="bold">CNC segment chain: end-speed blending vs. stop-at-end</text>

  <!-- axes -->
  <line x1="60" y1="220" x2="780" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="60" y1="50" x2="60" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <text x="420" y="252" text-anchor="middle" font-size="11">path position (cumulative across segments)</text>
  <text x="40" y="135" text-anchor="middle" font-size="11" transform="rotate(-90 40 135)">path velocity</text>

  <!-- segment boundaries -->
  <line x1="260" y1="50" x2="260" y2="220" stroke="#5b6b7b" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="500" y1="50" x2="500" y2="220" stroke="#5b6b7b" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="720" y1="50" x2="720" y2="220" stroke="#5b6b7b" stroke-dasharray="4 4" opacity="0.5"/>
  <text x="160" y="68" text-anchor="middle" font-size="11" fill="#5b6b7b">segment 1</text>
  <text x="380" y="68" text-anchor="middle" font-size="11" fill="#5b6b7b">segment 2</text>
  <text x="610" y="68" text-anchor="middle" font-size="11" fill="#5b6b7b">segment 3 (last)</text>

  <!-- velocity envelope: accel up, blend at corner 1 (end_speed > 0), accel into seg 2 then decel to corner 2 (end_speed > 0), accel in seg 3 then decel to 0 -->
  <!-- seg 1: 0 -> 80 by accel, cruise, dec to 110 at corner 1 -->
  <path d="M60 220 L130 100 L220 100 L260 110" fill="none" stroke="#5b8def" stroke-width="2.2"/>
  <!-- seg 2: from 110, slight accel to 90, then dec to 130 at corner 2 -->
  <path d="M260 110 L320 90 L450 90 L500 130" fill="none" stroke="#5b8def" stroke-width="2.2"/>
  <!-- seg 3: from 130, accel to 100, then full decel to 220 (rest) at end -->
  <path d="M500 130 L560 100 L660 100 L720 220" fill="none" stroke="#5b8def" stroke-width="2.2"/>

  <!-- annotations at corners -->
  <circle cx="260" cy="110" r="4" fill="#e0736b"/>
  <text x="266" y="106" font-size="11" fill="#e0736b">CNCAEndSpeed &gt; 0 (blend)</text>
  <circle cx="500" cy="130" r="4" fill="#e0736b"/>
  <text x="506" y="126" font-size="11" fill="#e0736b">CNCAEndSpeed &gt; 0 (blend)</text>
  <circle cx="720" cy="220" r="4" fill="#e0736b"/>
  <text x="615" y="208" font-size="11" fill="#e0736b">CNCAEndSpeed = 0 (stop)</text>

  <!-- caption -->
  <text x="410" y="272" text-anchor="middle" font-size="11" fill="#5b6b7b">A non-zero CNCAEndSpeed lets segments blend at a corner; the last segment is forced to 0 to bring the path to rest.</text>
</svg>
