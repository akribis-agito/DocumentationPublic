<svg xmlns="http://www.w3.org/2000/svg" width="820" height="210" viewBox="0 0 820 210" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- host pushes -->
  <rect x="12" y="78" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="87" y="103" text-anchor="middle">Host pushes</text>
  <text x="87" y="121" text-anchor="middle" font-size="11">lines / arcs (CNCAPushSeg)</text>

  <!-- segment queue -->
  <rect x="222" y="78" width="160" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="302" y="103" text-anchor="middle">Segment queue</text>
  <text x="302" y="121" text-anchor="middle" font-size="11">executed in order</text>

  <!-- path profiler -->
  <rect x="442" y="78" width="160" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="522" y="103" text-anchor="middle">Path profiler</text>
  <text x="522" y="121" text-anchor="middle" font-size="11">path velocity profile</text>

  <!-- member axes -->
  <rect x="662" y="40" width="146" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="735" y="62" text-anchor="middle">Axis A reference</text>
  <rect x="662" y="128" width="146" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="735" y="156" text-anchor="middle">Axis B reference</text>

  <!-- arrows -->
  <line x1="162" y1="108" x2="220" y2="108" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="382" y1="108" x2="440" y2="108" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="602" y1="100" x2="660" y2="66" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="602" y1="116" x2="660" y2="150" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
