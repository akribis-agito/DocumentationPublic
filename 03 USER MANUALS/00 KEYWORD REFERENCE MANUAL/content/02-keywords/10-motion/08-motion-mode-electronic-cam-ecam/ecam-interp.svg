<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <!-- title -->
  <text x="410" y="22" text-anchor="middle" font-weight="bold">ECAM linear interpolation between two cam-table entries</text>

  <!-- axes -->
  <line x1="80" y1="220" x2="760" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="80" y1="60" x2="80" y2="220" stroke="#5b6b7b" stroke-width="1"/>
  <text x="420" y="252" text-anchor="middle" font-size="11">master position</text>
  <text x="50" y="140" text-anchor="middle" font-size="11" transform="rotate(-90 50 140)">follower reference</text>

  <!-- tick marks for two adjacent master positions -->
  <line x1="220" y1="220" x2="220" y2="225" stroke="#5b6b7b"/>
  <line x1="540" y1="220" x2="540" y2="225" stroke="#5b6b7b"/>
  <text x="220" y="240" text-anchor="middle" font-size="11">m[i]</text>
  <text x="540" y="240" text-anchor="middle" font-size="11">m[i] + ECAMGap</text>
  <text x="380" y="240" text-anchor="middle" font-size="11">current master</text>
  <line x1="380" y1="220" x2="380" y2="225" stroke="#e0736b"/>

  <!-- table entry points -->
  <circle cx="220" cy="180" r="5" fill="#5b8def"/>
  <circle cx="540" cy="90" r="5" fill="#5b8def"/>
  <text x="220" y="172" font-size="11" fill="#5b6b7b">GenData[i]</text>
  <text x="540" y="82" font-size="11" fill="#5b6b7b">GenData[i+1]</text>

  <!-- interpolated line segment between the two -->
  <line x1="220" y1="180" x2="540" y2="90" stroke="#5b8def" stroke-width="2"/>

  <!-- interpolation pointer -->
  <line x1="380" y1="220" x2="380" y2="135" stroke="#e0736b" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="380" y1="135" x2="80" y2="135" stroke="#e0736b" stroke-width="1.4" stroke-dasharray="4 3"/>
  <circle cx="380" cy="135" r="5" fill="#e0736b"/>
  <text x="395" y="132" font-size="11" fill="#e0736b">interpolated</text>
  <text x="395" y="146" font-size="11" fill="#e0736b">follower reference</text>

  <!-- caption -->
  <text x="410" y="272" text-anchor="middle" font-size="11" fill="#5b6b7b">PosRef = C + GenData[i] + frac &#215; (GenData[i+1] &#8722; GenData[i]),  frac = (master &#8722; m[i]) / abs(ECAMGap)</text>
</svg>
