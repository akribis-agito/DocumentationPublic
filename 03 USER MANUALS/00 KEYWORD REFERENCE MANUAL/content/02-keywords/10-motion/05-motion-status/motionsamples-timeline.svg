<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="MotionSamples timing relations: index 1 spans Begin to profile end; index 2 spans Begin to the start of settling; index 4 is index 2 minus index 1, the settling delay; index 3 is index 2 plus InTargetTime, from Begin until InTargetStat reaches 4.">
  <title>MotionSamples timing relations</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">MotionSamples timing relations (controller cycles)</text>

  <!-- timeline -->
  <line x1="40" y1="60" x2="610" y2="60" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="40" y="50" fill="#5b6b7b" font-size="11">Begin</text>

  <!-- event ticks -->
  <line x1="40"  y1="52" x2="40"  y2="68" stroke="#5b6b7b"/>
  <line x1="340" y1="52" x2="340" y2="68" stroke="#5b6b7b"/>
  <line x1="440" y1="52" x2="440" y2="68" stroke="#5b6b7b"/>
  <line x1="560" y1="52" x2="560" y2="68" stroke="#5b6b7b"/>

  <text x="340" y="50" text-anchor="middle" fill="#5b6b7b" font-size="11">profile ends</text>
  <text x="440" y="86" text-anchor="middle" fill="#5b6b7b" font-size="11">starts settling</text>
  <text x="560" y="50" text-anchor="middle" fill="#5b6b7b" font-size="11">settled (Stat=4)</text>

  <!-- [1] profile time -->
  <line x1="40" y1="110" x2="340" y2="110" stroke="#5b8def" stroke-width="2"/>
  <text x="190" y="104" text-anchor="middle" fill="#5b8def">[1] motion profile time</text>

  <!-- [4] settle time -->
  <line x1="340" y1="135" x2="440" y2="135" stroke="#e0736b" stroke-width="2"/>
  <text x="390" y="129" text-anchor="middle" fill="#e0736b" font-size="11">[4] = [2] - [1]</text>

  <!-- [2] start to settle start -->
  <line x1="40" y1="160" x2="440" y2="160" stroke="#5b8def" stroke-width="2"/>
  <text x="240" y="154" text-anchor="middle" fill="#5b8def">[2] start until settling begins</text>

  <!-- [3] start to settled -->
  <line x1="40" y1="190" x2="560" y2="190" stroke="#5b8def" stroke-width="2"/>
  <text x="300" y="206" text-anchor="middle" fill="#5b8def">[3] = [2] + InTargetTime  (start until settled)</text>
</svg>
