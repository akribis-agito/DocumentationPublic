<svg xmlns="http://www.w3.org/2000/svg" width="840" height="410" viewBox="0 0 840 410" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="MotionStat bits per MotionMode: bits 0, 3 to 6, 9 and 16 are common to every mode; remaining bits are mode-gated to PTP-repetitive, ECAM, FIFO, CNCA or CNCB, Vector, Spline buffer, and Jog.">
  <title>MotionStat bits set per MotionMode</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="22" font-size="14" font-weight="bold">MotionStat bits set per MotionMode</text>
  <text x="20" y="40" fill="#5b6b7b" font-size="11">Bits 0, 3, 4, 5, 6, 9 and 16 apply to every motion. Other bits are mode-gated.</text>

  <!-- Common row -->
  <rect x="20" y="60" width="200" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="80" text-anchor="middle" font-weight="bold">Common (any mode)</text>
  <text x="120" y="96" text-anchor="middle" font-size="11" fill="#5b6b7b">always evaluated</text>

  <rect x="240" y="60" width="130" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="305" y="80" text-anchor="middle" font-size="12">bit 0 in-motion</text>
  <text x="305" y="96" text-anchor="middle" font-size="11" fill="#5b6b7b">profiler active</text>

  <rect x="380" y="60" width="130" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="445" y="80" text-anchor="middle" font-size="12">bit 3 stop-req</text>
  <text x="445" y="96" text-anchor="middle" font-size="11" fill="#5b6b7b">Stop pending</text>

  <rect x="520" y="60" width="130" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="585" y="80" text-anchor="middle" font-size="12">bits 4 / 5</text>
  <text x="585" y="96" text-anchor="middle" font-size="11" fill="#5b6b7b">accel / decel</text>

  <rect x="660" y="60" width="140" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="730" y="80" text-anchor="middle" font-size="12">bit 6 smooth tail</text>
  <text x="730" y="96" text-anchor="middle" font-size="11" fill="#5b6b7b">jerk-shaped end</text>

  <rect x="240" y="114" width="200" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="134" text-anchor="middle" font-size="12">bit 9 wait-input</text>
  <text x="340" y="150" text-anchor="middle" font-size="11" fill="#5b6b7b">BeginDInOn dwell</text>

  <rect x="450" y="114" width="200" height="44" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="550" y="134" text-anchor="middle" font-size="12">bit 16 fault stop</text>
  <text x="550" y="150" text-anchor="middle" font-size="11" fill="#5b6b7b">stop-with-motor-off</text>

  <!-- mode-gated rows -->
  <rect x="20" y="174" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="197" text-anchor="middle" font-weight="bold">PTP-repetitive (mode 2)</text>
  <rect x="240" y="174" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="197" text-anchor="middle" font-size="12">bit 1 dwell between reps</text>
  <rect x="450" y="174" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="550" y="197" text-anchor="middle" font-size="12">bit 2 ending (StopRep)</text>

  <rect x="20" y="220" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="243" text-anchor="middle" font-weight="bold">ECAM (modes 7, 8)</text>
  <rect x="240" y="220" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="243" text-anchor="middle" font-size="12">bit 7 ending (StopECAM)</text>

  <rect x="20" y="266" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="289" text-anchor="middle" font-weight="bold">FIFO (mode 9)</text>
  <rect x="240" y="266" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="289" text-anchor="middle" font-size="12">bit 8 ending (StopFIFO)</text>

  <rect x="20" y="312" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="335" text-anchor="middle" font-weight="bold">CNCA / CNCB (11, 17)</text>
  <rect x="240" y="312" width="290" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="385" y="335" text-anchor="middle" font-size="12">bits 10 / 11 / 12 CNCA member / active / ending</text>
  <rect x="540" y="312" width="290" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="685" y="335" text-anchor="middle" font-size="12">bits 13 / 14 / 15 CNCB member / active / ending</text>

  <rect x="20" y="358" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="120" y="381" text-anchor="middle" font-weight="bold">Vector (mode 16)</text>
  <rect x="240" y="358" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="381" text-anchor="middle" font-size="12">bit 18 ending (StopVec)</text>
  <rect x="450" y="358" width="200" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="550" y="381" text-anchor="middle" font-size="12">bit 19 vector member</text>

  <rect x="660" y="174" width="140" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="730" y="197" text-anchor="middle" font-size="12">Spline (mode 18)</text>
  <rect x="660" y="220" width="140" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="730" y="243" text-anchor="middle" font-size="12">bit 17 (StopBuff)</text>
  <rect x="660" y="266" width="140" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="730" y="285" text-anchor="middle" font-size="12">Jog only</text>
  <text x="730" y="298" text-anchor="middle" font-size="11" fill="#5b6b7b">bit 20 soft-limit end</text>
</svg>
