<svg xmlns="http://www.w3.org/2000/svg" width="760" height="170" font-family="sans-serif" font-size="11">
  <style>
    .bit { fill: #f5f5f5; stroke: #888; }
    .set { fill: #cfe8ff; stroke: #4a90d9; }
    .num { fill: #333; text-anchor: middle; }
    .lbl { fill: #222; text-anchor: middle; }
    .grp { fill: #555; text-anchor: middle; font-size: 10px; }
  </style>
  <text x="10" y="16" fill="#222" font-size="13">MotionStat &#8212; 32-bit field (only bits 0&#8211;20 defined; bits 21&#8211;31 reserved)</text>

  <!-- Row 1: bits 0-10 -->
  <g>
    <rect class="set" x="10"  y="30" width="64" height="26"/>
    <rect class="bit" x="74"  y="30" width="64" height="26"/>
    <rect class="bit" x="138" y="30" width="64" height="26"/>
    <rect class="bit" x="202" y="30" width="64" height="26"/>
    <rect class="bit" x="266" y="30" width="64" height="26"/>
    <rect class="bit" x="330" y="30" width="64" height="26"/>
    <rect class="bit" x="394" y="30" width="64" height="26"/>
    <rect class="bit" x="458" y="30" width="64" height="26"/>
    <rect class="bit" x="522" y="30" width="64" height="26"/>
    <rect class="bit" x="586" y="30" width="64" height="26"/>
    <rect class="bit" x="650" y="30" width="64" height="26"/>
    <text class="num" x="42"  y="47">0</text>
    <text class="num" x="106" y="47">1</text>
    <text class="num" x="170" y="47">2</text>
    <text class="num" x="234" y="47">3</text>
    <text class="num" x="298" y="47">4</text>
    <text class="num" x="362" y="47">5</text>
    <text class="num" x="426" y="47">6</text>
    <text class="num" x="490" y="47">7</text>
    <text class="num" x="554" y="47">8</text>
    <text class="num" x="618" y="47">9</text>
    <text class="num" x="682" y="47">10</text>
    <text class="lbl" x="42"  y="70">in motion</text>
    <text class="lbl" x="106" y="70">dwelling</text>
    <text class="lbl" x="170" y="70">rep. end</text>
    <text class="lbl" x="234" y="70">stop req</text>
    <text class="lbl" x="298" y="70">accel</text>
    <text class="lbl" x="362" y="70">decel</text>
    <text class="lbl" x="426" y="70">smooth</text>
    <text class="lbl" x="490" y="70">ECAM stop</text>
    <text class="lbl" x="554" y="70">FIFO stop</text>
    <text class="lbl" x="618" y="70">wait input</text>
    <text class="lbl" x="682" y="70">CNCA mbr</text>
  </g>

  <!-- Row 2: bits 11-20 -->
  <g>
    <rect class="bit" x="10"  y="100" width="64" height="26"/>
    <rect class="bit" x="74"  y="100" width="64" height="26"/>
    <rect class="bit" x="138" y="100" width="64" height="26"/>
    <rect class="bit" x="202" y="100" width="64" height="26"/>
    <rect class="bit" x="266" y="100" width="64" height="26"/>
    <rect class="bit" x="330" y="100" width="64" height="26"/>
    <rect class="bit" x="394" y="100" width="64" height="26"/>
    <rect class="bit" x="458" y="100" width="64" height="26"/>
    <rect class="bit" x="522" y="100" width="64" height="26"/>
    <rect class="bit" x="586" y="100" width="64" height="26"/>
    <text class="num" x="42"  y="117">11</text>
    <text class="num" x="106" y="117">12</text>
    <text class="num" x="170" y="117">13</text>
    <text class="num" x="234" y="117">14</text>
    <text class="num" x="298" y="117">15</text>
    <text class="num" x="362" y="117">16</text>
    <text class="num" x="426" y="117">17</text>
    <text class="num" x="490" y="117">18</text>
    <text class="num" x="554" y="117">19</text>
    <text class="num" x="618" y="117">20</text>
    <text class="lbl" x="42"  y="140">CNCA now</text>
    <text class="lbl" x="106" y="140">CNCA stop</text>
    <text class="lbl" x="170" y="140">CNCB mbr</text>
    <text class="lbl" x="234" y="140">CNCB now</text>
    <text class="lbl" x="298" y="140">CNCB stop</text>
    <text class="lbl" x="362" y="140">ctrl stop</text>
    <text class="lbl" x="426" y="140">buff stop</text>
    <text class="lbl" x="490" y="140">vec stop</text>
    <text class="lbl" x="554" y="140">vec mbr</text>
    <text class="lbl" x="618" y="140">jog s/w lim</text>
  </g>
  <text x="586" y="160" fill="#a05a00" font-size="10">bit 20: v5 only</text>
</svg>
