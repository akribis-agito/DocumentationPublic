<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold">Error-mapping position-correction pipeline</text>

  <!-- raw position -->
  <rect x="20" y="70" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="90" y="93" text-anchor="middle" font-weight="bold">PosBeforeMap</text>
  <text x="90" y="113" text-anchor="middle" font-size="11">raw feedback</text>

  <!-- lookup -->
  <rect x="220" y="62" width="150" height="72" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="295" y="84" text-anchor="middle" font-weight="bold">Table lookup</text>
  <text x="295" y="103" text-anchor="middle" font-size="11">MapTable indexed by</text>
  <text x="295" y="119" text-anchor="middle" font-size="11">position grid</text>

  <!-- interpolate -->
  <rect x="430" y="62" width="150" height="72" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="505" y="84" text-anchor="middle" font-weight="bold">Interpolate</text>
  <text x="505" y="103" text-anchor="middle" font-size="11">+ ramp / offset</text>
  <text x="505" y="119" text-anchor="middle" font-size="11">= correction</text>

  <!-- corrected pos -->
  <rect x="630" y="70" width="110" height="56" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="685" y="93" text-anchor="middle" font-weight="bold">Pos</text>
  <text x="685" y="113" text-anchor="middle" font-size="11">corrected</text>

  <!-- flow arrows -->
  <line x1="160" y1="98" x2="216" y2="98" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="370" y1="98" x2="426" y2="98" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="580" y1="98" x2="626" y2="98" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- raw also feeds the sum to form Pos -->
  <path d="M90,126 L90,190 L685,190 L685,128" fill="none" stroke="#5b6b7b" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="380" y="208" text-anchor="middle" font-size="11" fill="#5b6b7b">Pos = PosBeforeMap &#43; correction</text>

  <!-- config grid annotation -->
  <text x="295" y="156" text-anchor="middle" font-size="10.5" fill="#5b6b7b">grid: MapStartPos, MapPosGap, MapLength</text>
  <text x="295" y="170" text-anchor="middle" font-size="10.5" fill="#5b6b7b">source: MapEncoder &#183; enable: MapType</text>
</svg>
