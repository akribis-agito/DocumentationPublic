<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold">User-program engine: cooperative multi-thread scheduler</text>

  <!-- Scheduler -->
  <rect x="270" y="50" width="180" height="64" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="360" y="76" text-anchor="middle" font-weight="bold">Scheduler</text>
  <text x="360" y="94" text-anchor="middle" font-size="11">runs one line per pass,</text>
  <text x="360" y="108" text-anchor="middle" font-size="11">biased by ProgPriority</text>

  <!-- Threads row -->
  <rect x="40" y="170" width="180" height="120" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="130" y="192" text-anchor="middle" font-weight="bold">Thread 1 (main task)</text>
  <text x="130" y="212" text-anchor="middle" font-size="11">program pointer</text>
  <text x="130" y="230" text-anchor="middle" font-size="11">call stack</text>
  <text x="130" y="248" text-anchor="middle" font-size="11">numeric stack</text>
  <text x="130" y="270" text-anchor="middle" font-size="11">services events</text>

  <rect x="270" y="170" width="180" height="120" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="192" text-anchor="middle" font-weight="bold">Thread 2 (task)</text>
  <text x="360" y="212" text-anchor="middle" font-size="11">program pointer</text>
  <text x="360" y="230" text-anchor="middle" font-size="11">call stack</text>
  <text x="360" y="248" text-anchor="middle" font-size="11">numeric stack</text>

  <rect x="500" y="170" width="180" height="120" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="590" y="192" text-anchor="middle" font-weight="bold">Thread n (task)</text>
  <text x="590" y="212" text-anchor="middle" font-size="11">program pointer</text>
  <text x="590" y="230" text-anchor="middle" font-size="11">call stack</text>
  <text x="590" y="248" text-anchor="middle" font-size="11">numeric stack</text>
  <text x="590" y="270" text-anchor="middle" font-size="10.5" fill="#777">up to 8 (12 on master)</text>

  <!-- scheduler to threads arrows -->
  <path d="M310,114 L150,168" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M360,114 L360,168" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M410,114 L570,168" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Control inputs -->
  <rect x="40" y="330" width="300" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="190" y="354" text-anchor="middle" font-weight="bold">Run / halt / reset</text>
  <text x="190" y="374" text-anchor="middle" font-size="11">ProgRun, ProgHalt, ProgReset,</text>
  <text x="190" y="388" text-anchor="middle" font-size="11">ProgSingle, ProgBreaks (debug)</text>

  <rect x="380" y="330" width="300" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="530" y="354" text-anchor="middle" font-weight="bold">Events (thread 1 only)</text>
  <text x="530" y="374" text-anchor="middle" font-size="11">ProgEventOn / ProgEventEn detect a</text>
  <text x="530" y="388" text-anchor="middle" font-size="11">condition, then call an event task</text>

  <path d="M190,330 L190,292" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M510,330 L150,292" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
