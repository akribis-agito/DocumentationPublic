<svg xmlns="http://www.w3.org/2000/svg" width="780" height="280" viewBox="0 0 780 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="ProgEvent lifecycle: a triggered event moves from Waiting (state 0) to Pending (state 1) when its condition is met, then to In service (state 2) when scanned; after the handler returns it is re-armed. All three of ProgEventOn, ProgEventGEn, and ProgEventEn for the event must be 1 to run.">
  <title>ProgEvent arming timeline and gates</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="20" y="22" font-weight="bold">User-program event lifecycle (per event)</text>

  <!-- three state boxes -->
  <rect x="40" y="60" width="180" height="60" rx="8" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="130" y="86" text-anchor="middle" font-weight="bold">Waiting for trigger</text>
  <text x="130" y="106" text-anchor="middle" font-size="11">ProgEventStat = 0</text>

  <rect x="300" y="60" width="180" height="60" rx="8" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="390" y="86" text-anchor="middle" font-weight="bold">Pending for service</text>
  <text x="390" y="106" text-anchor="middle" font-size="11">ProgEventStat = 1</text>

  <rect x="560" y="60" width="180" height="60" rx="8" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="650" y="86" text-anchor="middle" font-weight="bold">In service</text>
  <text x="650" y="106" text-anchor="middle" font-size="11">ProgEventStat = 2</text>

  <!-- arrows -->
  <line x1="220" y1="90" x2="300" y2="90" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="260" y="80" text-anchor="middle" font-size="11">condition met</text>
  <text x="260" y="108" text-anchor="middle" font-size="10" fill="#5b6b7b">(sense)</text>

  <line x1="480" y1="90" x2="560" y2="90" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="520" y="80" text-anchor="middle" font-size="11">scanned 1..5,</text>
  <text x="520" y="108" text-anchor="middle" font-size="10" fill="#5b6b7b">lowest # first</text>

  <!-- return arrow back -->
  <path d="M 650 120 C 650 200 130 200 130 120" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="390" y="210" text-anchor="middle" font-size="11">Return — re-armed for next occurrence</text>

  <!-- gates row -->
  <rect x="20" y="226" width="740" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="36" y="244" font-size="11"><tspan font-weight="bold">All 3 must be 1 to run handler:</tspan></text>
  <text x="36" y="262" font-size="11">ProgEventOn (sense+serve all) &#160;&#215;&#160; ProgEventGEn (serve all) &#160;&#215;&#160; ProgEventEn[n] (serve event n)</text>

  <!-- ProgEventOn=0 callout -->
  <text x="40" y="148" font-size="11" fill="#5b6b7b">ProgEventOn = 0: all events forced back here, pending discarded, sensing stops</text>
</svg>
