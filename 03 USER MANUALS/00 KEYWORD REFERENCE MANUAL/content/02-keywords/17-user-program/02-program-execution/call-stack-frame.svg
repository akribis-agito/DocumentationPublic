<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="sans-serif" font-size="13">
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">Call stack of one thread during a function call</text>

  <!-- stack cells, bottom of drawing = bottom of stack -->
  <!-- input args -->
  <rect x="160" y="250" width="240" height="30" fill="#dff0e0" stroke="#333"/>
  <text x="280" y="270" text-anchor="middle">input argument 1 (pushed first)</text>

  <rect x="160" y="220" width="240" height="30" fill="#dff0e0" stroke="#333"/>
  <text x="280" y="240" text-anchor="middle">input argument 2</text>

  <rect x="160" y="190" width="240" height="30" fill="#dff0e0" stroke="#333"/>
  <text x="280" y="210" text-anchor="middle">last input / output args</text>

  <!-- return address -->
  <rect x="160" y="160" width="240" height="30" fill="#fde9c8" stroke="#333"/>
  <text x="280" y="180" text-anchor="middle">return address (frame location)</text>

  <!-- caller frame -->
  <rect x="160" y="130" width="240" height="30" fill="#e3e0f0" stroke="#333"/>
  <text x="280" y="150" text-anchor="middle">caller's frame location (top)</text>

  <!-- arrows / labels -->
  <text x="150" y="180" text-anchor="end">frame</text>
  <line x1="405" y1="175" x2="450" y2="175" stroke="#333"/>
  <text x="455" y="172">ProgArgThis[1] = frame - 1</text>
  <text x="455" y="200">ProgArgThis[2] = frame - 2</text>

  <text x="280" y="305" text-anchor="middle" font-size="11">grows upward; ProgPushArg adds input args before the call</text>
</svg>
