<svg xmlns="http://www.w3.org/2000/svg" width="780" height="260" viewBox="0 0 780 260" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="20" y="20" font-weight="bold">PStat streaming — batch sent every PStatInterval ms over PStatPort while PStatOn=1</text>

  <!-- time axis -->
  <line x1="40" y1="80" x2="740" y2="80" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="752" y="84" font-size="11">t</text>

  <!-- tick marks at intervals -->
  <line x1="80"  y1="74" x2="80"  y2="86" stroke="#5b6b7b"/>
  <line x1="230" y1="74" x2="230" y2="86" stroke="#5b6b7b"/>
  <line x1="380" y1="74" x2="380" y2="86" stroke="#5b6b7b"/>
  <line x1="530" y1="74" x2="530" y2="86" stroke="#5b6b7b"/>
  <line x1="680" y1="74" x2="680" y2="86" stroke="#5b6b7b"/>

  <text x="80"  y="100" text-anchor="middle" font-size="11">0</text>
  <text x="230" y="100" text-anchor="middle" font-size="11">+ PStatInterval</text>
  <text x="380" y="100" text-anchor="middle" font-size="11">+ 2 x PStatInterval</text>
  <text x="530" y="100" text-anchor="middle" font-size="11">+ 3 x PStatInterval</text>
  <text x="680" y="100" text-anchor="middle" font-size="11">. . .</text>

  <!-- batches as small boxes above ticks -->
  <g>
    <rect x="62" y="46" width="36" height="24" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="80" y="63" text-anchor="middle" font-size="11">batch</text>
    <rect x="212" y="46" width="36" height="24" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="230" y="63" text-anchor="middle" font-size="11">batch</text>
    <rect x="362" y="46" width="36" height="24" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="380" y="63" text-anchor="middle" font-size="11">batch</text>
    <rect x="512" y="46" width="36" height="24" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="530" y="63" text-anchor="middle" font-size="11">batch</text>
  </g>

  <!-- expanded batch contents -->
  <text x="20" y="140" font-weight="bold" font-size="12">One batch carries the current value of each non-zero PStatParams entry, in index order</text>

  <rect x="40"  y="156" width="100" height="48" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="90" y="178" text-anchor="middle" font-size="12">value of</text>
  <text x="90" y="194" text-anchor="middle" font-size="12">PStatParams[1]</text>

  <rect x="146" y="156" width="100" height="48" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="196" y="178" text-anchor="middle" font-size="12">value of</text>
  <text x="196" y="194" text-anchor="middle" font-size="12">PStatParams[2]</text>

  <rect x="252" y="156" width="100" height="48" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="302" y="178" text-anchor="middle" font-size="12">value of</text>
  <text x="302" y="194" text-anchor="middle" font-size="12">PStatParams[3]</text>

  <text x="380" y="186" text-anchor="middle">. . .</text>

  <rect x="430" y="156" width="120" height="48" rx="4" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="490" y="178" text-anchor="middle" font-size="12">value of</text>
  <text x="490" y="194" text-anchor="middle" font-size="12">PStatParams[20]</text>

  <text x="285" y="232" text-anchor="middle" font-size="11" fill="#5b6b7b">slots whose PStatParams entry is 0 are skipped; up to 20 parameters per batch</text>
</svg>
