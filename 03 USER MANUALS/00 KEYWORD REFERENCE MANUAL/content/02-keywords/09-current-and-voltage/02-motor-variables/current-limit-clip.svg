<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="280" y="22" text-anchor="middle" font-weight="bold">CurrRef clamping at the current limits</text>

  <!-- Axes -->
  <line x1="60" y1="240" x2="540" y2="240" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="546" y="244" fill="#5b6b7b">time</text>

  <line x1="60" y1="240" x2="60" y2="50" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="52" y="48" text-anchor="end" fill="#5b6b7b">CurrRef</text>

  <!-- 0 reference -->
  <line x1="60" y1="180" x2="540" y2="180" stroke="#c0c8d0" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="50" y="184" text-anchor="end" font-size="11" fill="#7a8693">0</text>

  <!-- PeakCL upper limit -->
  <line x1="60" y1="90" x2="540" y2="90" stroke="#e0736b" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="540" y="84" text-anchor="end" fill="#a04030" font-size="11">+ PeakCL</text>

  <!-- ContCL line (lower than PeakCL, after I^2t) -->
  <line x1="60" y1="120" x2="540" y2="120" stroke="#e0a06b" stroke-width="1.0" stroke-dasharray="2,3"/>
  <text x="540" y="115" text-anchor="end" fill="#a06030" font-size="11">+ ContCL (I^2t reduced)</text>

  <!-- PeakCL lower limit -->
  <line x1="60" y1="270" x2="540" y2="270" stroke="#e0736b" stroke-width="0.6" stroke-dasharray="5,4"/>

  <!-- Demanded curve (intent) - dashed -->
  <path d="M60,180 Q140,180 180,80 T320,60 Q380,120 420,180 T540,180" fill="none" stroke="#5b8def" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="320" y="50" text-anchor="middle" fill="#5b8def" font-size="11">unclamped command (intent)</text>

  <!-- Actual delivered CurrRef - clipped at PeakCL -->
  <path d="M60,180 Q140,180 180,90 L320,90 Q380,120 420,180 T540,180" fill="none" stroke="#3a6dd0" stroke-width="2"/>
  <text x="220" y="105" fill="#3a6dd0" font-size="11">clamped at PeakCL</text>

  <!-- Saturation arrows -->
  <path d="M250,68 L250,87" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="258" y="78" fill="#a04030" font-size="11">StatReg bit 21 set</text>

  <text x="60" y="262" font-size="11" fill="#a04030">- PeakCL</text>
</svg>
