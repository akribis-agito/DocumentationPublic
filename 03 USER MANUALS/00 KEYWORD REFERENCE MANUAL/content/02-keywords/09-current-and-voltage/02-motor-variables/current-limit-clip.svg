<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="A demanded current command above PeakCL is clamped to PeakCL, and StatReg bit 21 is set while the clamp is active.">
  <title>CurrRef clamping at the current limits</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e0736b"/>
    </marker>
  </defs>

  <text x="280" y="22" text-anchor="middle" font-weight="bold">CurrRef clamping at the current limits</text>

  <!-- y-axis (CurrRef) at x=60, zero baseline at y=170 -->
  <line x1="60" y1="260" x2="60" y2="50" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="52" y="48" text-anchor="end" fill="#5b6b7b">CurrRef</text>

  <!-- time axis at y=170 (zero current) -->
  <line x1="60" y1="170" x2="520" y2="170" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="528" y="174" fill="#5b6b7b">time</text>
  <text x="52" y="174" text-anchor="end" font-size="11" fill="#7a8693">0</text>

  <!-- + PeakCL upper limit -->
  <line x1="60" y1="80" x2="540" y2="80" stroke="#e0736b" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="540" y="74" text-anchor="end" fill="#a04030" font-size="11">+ PeakCL</text>

  <!-- + ContCL (I^2t reduced) -->
  <line x1="60" y1="110" x2="540" y2="110" stroke="#e0a06b" stroke-width="1.0" stroke-dasharray="2,3"/>
  <text x="540" y="104" text-anchor="end" fill="#a06030" font-size="11">+ ContCL (I&#178;t reduced)</text>

  <!-- - PeakCL lower limit, mirrored across 170 (170 + 90 = 260) -->
  <line x1="60" y1="260" x2="540" y2="260" stroke="#e0736b" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="540" y="254" text-anchor="end" fill="#a04030" font-size="11">- PeakCL</text>

  <!-- Demanded (intent) - dashed blue, peaks above +PeakCL but clear of the title -->
  <path d="M60,170 Q150,170 200,62 Q250,56 300,58 Q360,62 420,170 Q470,220 540,170" fill="none" stroke="#5b8def" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="320" y="44" text-anchor="middle" fill="#5b8def" font-size="11">unclamped command (intent)</text>

  <!-- Actual delivered CurrRef - clipped at +PeakCL -->
  <path d="M60,170 Q140,170 180,80 L320,80 Q380,120 420,170 T540,170" fill="none" stroke="#3a6dd0" stroke-width="2"/>
  <text x="250" y="98" fill="#3a6dd0" font-size="11">clamped at + PeakCL</text>

  <!-- Saturation indicator arrow -->
  <path d="M250,60 L250,77" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrowred)"/>
  <text x="258" y="68" fill="#a04030" font-size="11">StatReg bit 21 set while clamping</text>
</svg>
