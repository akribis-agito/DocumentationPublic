<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Forward path turns Iq and Id commands into Va, Vb, Vc; feedback path turns measured Ia, Ib back into Id, Iq via Clarke and Park.">
  <title>abc to dq transform chain</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
  </defs>

  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold">abc &#8596; dq transform chain</text>

  <!-- reference (forward) path: IqRef/IdRef -> Vq/Vd -> Va/Vb/Vc -->
  <text x="75" y="62" text-anchor="middle" font-size="11" fill="#1f2933">command</text>
  <rect x="20" y="72" width="110" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="75" y="92" text-anchor="middle">IqRef, IdRef</text>
  <text x="75" y="108" text-anchor="middle" font-size="11">(IdRef = 0)</text>

  <rect x="190" y="72" width="110" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="245" y="92" text-anchor="middle">dq PI</text>
  <text x="245" y="108" text-anchor="middle" font-size="11">&#8594; Vq, Vd</text>

  <rect x="360" y="72" width="120" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="420" y="92" text-anchor="middle">Inverse Park</text>
  <text x="420" y="108" text-anchor="middle" font-size="11">(angle &#952;)</text>

  <rect x="540" y="72" width="110" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="595" y="98" text-anchor="middle">Va, Vb, Vc</text>

  <rect x="710" y="72" width="90" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="755" y="98" text-anchor="middle">to motor</text>

  <line x1="130" y1="95" x2="186" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="300" y1="95" x2="356" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="480" y1="95" x2="536" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="650" y1="95" x2="706" y2="95" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- feedback path: Ia/Ib -> Clarke/Park -> Id/Iq -->
  <text x="75" y="190" text-anchor="middle" font-size="11" fill="#1f2933">feedback</text>
  <rect x="20" y="200" width="110" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="75" y="226" text-anchor="middle">Id, Iq</text>

  <rect x="190" y="200" width="120" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="250" y="220" text-anchor="middle">Clarke / Park</text>
  <text x="250" y="236" text-anchor="middle" font-size="11">(angle &#952;)</text>

  <rect x="370" y="200" width="110" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="425" y="226" text-anchor="middle">Ia, Ib</text>

  <rect x="540" y="200" width="110" height="46" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="595" y="220" text-anchor="middle">measure</text>
  <text x="595" y="236" text-anchor="middle" font-size="11">phase currents</text>

  <line x1="540" y1="223" x2="484" y2="223" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
  <line x1="370" y1="223" x2="314" y2="223" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
  <line x1="190" y1="223" x2="134" y2="223" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
</svg>
