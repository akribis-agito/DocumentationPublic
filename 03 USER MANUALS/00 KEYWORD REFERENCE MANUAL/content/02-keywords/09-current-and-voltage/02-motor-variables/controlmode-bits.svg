<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="bold">ControlMode bit map (bits 0-3)</text>

  <!-- four bit boxes -->
  <g>
    <rect x="40"  y="60" width="130" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="105" y="80" text-anchor="middle" font-weight="bold">bit 0 (0x1)</text>
    <text x="105" y="100" text-anchor="middle" font-size="11">SVM voltage limit</text>
    <text x="105" y="114" text-anchor="middle" font-size="10" fill="#666">enhanced speed range</text>

    <rect x="190" y="60" width="130" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="255" y="80" text-anchor="middle" font-weight="bold">bit 1 (0x2)</text>
    <text x="255" y="100" text-anchor="middle" font-size="11">control domain</text>
    <text x="255" y="114" text-anchor="middle" font-size="10" fill="#666">0 = dq (vector), 1 = abc</text>

    <rect x="340" y="60" width="130" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="405" y="80" text-anchor="middle" font-weight="bold">bit 2 (0x4)</text>
    <text x="405" y="100" text-anchor="middle" font-size="11">current loop bypass</text>
    <text x="405" y="114" text-anchor="middle" font-size="10" fill="#666">0 = PI loop, 1 = bypass</text>

    <rect x="490" y="60" width="130" height="60" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
    <text x="555" y="80" text-anchor="middle" font-weight="bold">bit 3 (0x8)</text>
    <text x="555" y="100" text-anchor="middle" font-size="11">I&#178;t action</text>
    <text x="555" y="114" text-anchor="middle" font-size="10" fill="#666">0 = clamp, 1 = disable</text>
  </g>

  <!-- default value example -->
  <text x="40"  y="160" font-size="12" fill="#222"><tspan font-weight="bold">Default ControlMode = 1</tspan> &#8594; bit 0 set, bits 1-3 cleared.</text>
  <text x="40"  y="180" font-size="12" fill="#222">Example: ControlMode = 5 (bits 0 + 2) &#8594; enhanced speed range + current loop bypassed.</text>
  <text x="40"  y="200" font-size="12" fill="#222">Mask the value with &amp; against 0x1 / 0x2 / 0x4 / 0x8 to test each bit.</text>
</svg>
