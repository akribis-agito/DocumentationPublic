<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="410" y="24" text-anchor="middle" font-size="15" font-weight="bold">Reference-to-voltage signal path</text>

  <!-- forward path -->
  <rect x="20" y="72" width="120" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="80" y="92" text-anchor="middle">Current</text>
  <text x="80" y="108" text-anchor="middle">reference</text>

  <rect x="190" y="72" width="130" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="255" y="92" text-anchor="middle">Commutation</text>
  <text x="255" y="108" text-anchor="middle" font-size="11">IqRef / IaRef</text>

  <circle cx="390" cy="95" r="15" fill="#fff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="390" y="100" text-anchor="middle" font-size="15">&#8722;</text>

  <rect x="450" y="72" width="120" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="510" y="98" text-anchor="middle">Current PI</text>

  <rect x="630" y="72" width="160" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="710" y="92" text-anchor="middle">Va, Vb, Vc</text>
  <text x="710" y="108" text-anchor="middle" font-size="11">&#8594; SVPWM duty</text>

  <line x1="140" y1="95" x2="188" y2="95" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="320" y1="95" x2="373" y2="95" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="405" y1="95" x2="448" y2="95" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <text x="427" y="87" text-anchor="middle" font-size="11">err</text>
  <line x1="570" y1="95" x2="628" y2="95" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- feedback -->
  <rect x="450" y="200" width="160" height="46" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="530" y="220" text-anchor="middle">Ia, Ib (measured)</text>
  <text x="530" y="236" text-anchor="middle" font-size="11">Clarke / Park &#8594; Iq, Id</text>

  <line x1="710" y1="118" x2="710" y2="223" stroke="#e0736b"/>
  <line x1="710" y1="223" x2="612" y2="223" stroke="#e0736b" marker-end="url(#arrow)"/>
  <line x1="450" y1="223" x2="390" y2="223" stroke="#e0736b"/>
  <line x1="390" y1="223" x2="390" y2="112" stroke="#e0736b" marker-end="url(#arrow)"/>
  <text x="300" y="217" text-anchor="middle" font-size="11" fill="#e0736b">feedback</text>
</svg>
