<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="860" height="430" fill="#ffffff"/>
  <text x="430" y="24" text-anchor="middle" font-size="16" font-weight="bold">Current-loop signal path (abc &#8596; dq)</text>

  <!-- CurrRef / CurrDir -->
  <rect x="20" y="60" width="150" height="48" rx="6" fill="#eef4ff" stroke="#3366cc"/>
  <text x="95" y="80" text-anchor="middle">CurrRef (limited)</text>
  <text x="95" y="98" text-anchor="middle" font-size="11">&#215; CurrDir sign &#8594; CurrRefFinal</text>

  <!-- Commutation / inverse transform -->
  <rect x="210" y="60" width="170" height="48" rx="6" fill="#eef4ff" stroke="#3366cc"/>
  <text x="295" y="80" text-anchor="middle">Commutation</text>
  <text x="295" y="98" text-anchor="middle" font-size="11">IqRef=CurrRefFinal, IdRef=0</text>

  <!-- References -->
  <rect x="420" y="60" width="150" height="48" rx="6" fill="#e9f7ec" stroke="#2e9e4f"/>
  <text x="495" y="80" text-anchor="middle">IaRef, IbRef</text>
  <text x="495" y="98" text-anchor="middle" font-size="11">(or IqRef, IdRef)</text>

  <!-- Summing junction -->
  <circle cx="640" cy="84" r="20" fill="#fff4e5" stroke="#cc7a00"/>
  <text x="640" y="80" text-anchor="middle" font-size="15">&#8722;</text>
  <text x="640" y="120" text-anchor="middle" font-size="11">error</text>

  <!-- Error -->
  <rect x="700" y="60" width="140" height="48" rx="6" fill="#e9f7ec" stroke="#2e9e4f"/>
  <text x="770" y="80" text-anchor="middle">IaErr, IbErr</text>
  <text x="770" y="98" text-anchor="middle" font-size="11">(or IqErr, IdErr)</text>

  <!-- PI loop -->
  <rect x="700" y="190" width="140" height="56" rx="6" fill="#eef4ff" stroke="#3366cc"/>
  <text x="770" y="212" text-anchor="middle">Current PI</text>
  <text x="770" y="230" text-anchor="middle" font-size="11">CurrGain, CurrKi</text>

  <!-- Voltage outputs -->
  <rect x="420" y="190" width="200" height="56" rx="6" fill="#fdeef0" stroke="#cc3355"/>
  <text x="520" y="208" text-anchor="middle">Va, Vb, Vc</text>
  <text x="520" y="226" text-anchor="middle" font-size="11">(Vd,Vq &#8594; inverse Park &#8594; Va,Vb)</text>
  <text x="520" y="240" text-anchor="middle" font-size="11">enhanced speed range + saturation</text>

  <!-- SVM / PWM -->
  <rect x="210" y="190" width="160" height="56" rx="6" fill="#eef4ff" stroke="#3366cc"/>
  <text x="290" y="218" text-anchor="middle">SVM &#8594; PWM duty</text>

  <!-- Motor + ADC feedback -->
  <rect x="20" y="190" width="150" height="56" rx="6" fill="#f3f0fb" stroke="#7755bb"/>
  <text x="95" y="212" text-anchor="middle">Motor phases</text>
  <text x="95" y="230" text-anchor="middle" font-size="11">ADC &#8594; Ia, Ib, Ic</text>

  <!-- Measured currents feeding sum -->
  <rect x="420" y="320" width="200" height="48" rx="6" fill="#e9f7ec" stroke="#2e9e4f"/>
  <text x="520" y="340" text-anchor="middle">Ia, Ib (measured)</text>
  <text x="520" y="358" text-anchor="middle" font-size="11">Clarke/Park &#8594; Iq, Id</text>

  <!-- arrows -->
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <g stroke="#444" stroke-width="1.6" fill="none" marker-end="url(#ar)">
    <line x1="170" y1="84" x2="208" y2="84"/>
    <line x1="380" y1="84" x2="418" y2="84"/>
    <line x1="570" y1="84" x2="618" y2="84"/>
    <line x1="660" y1="84" x2="698" y2="84"/>
    <line x1="770" y1="108" x2="770" y2="188"/>
    <line x1="700" y1="218" x2="622" y2="218"/>
    <line x1="420" y1="218" x2="372" y2="218"/>
    <line x1="210" y1="218" x2="172" y2="218"/>
    <line x1="95" y1="246" x2="95" y2="290"/>
    <line x1="95" y1="290" x2="520" y2="290"/>
    <line x1="520" y1="290" x2="520" y2="318"/>
    <line x1="520" y1="320" x2="560" y2="120" stroke-dasharray="4 3"/>
  </g>
  <text x="300" y="284" font-size="11" fill="#666">feedback</text>
</svg>
