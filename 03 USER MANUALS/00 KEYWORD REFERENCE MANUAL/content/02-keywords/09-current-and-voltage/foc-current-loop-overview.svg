<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Field-oriented current loop: current reference enters a summing node, drives the dq PI, inverse Park produces Va, Vb, Vc, SVPWM and amplifier drive the motor, phase currents are measured and transformed back to Iq, Id feedback; the bus voltage supplies the power stage.">
  <title>Field-oriented current loop overview</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f2933"/></marker>
  </defs>

  <text x="440" y="26" text-anchor="middle" font-size="15" font-weight="bold">Field-oriented current loop</text>

  <!-- forward path -->
  <rect x="20" y="64" width="120" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="80" y="84" text-anchor="middle">Current</text>
  <text x="80" y="100" text-anchor="middle">reference</text>

  <circle cx="190" cy="88" r="15" fill="#fff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="190" y="93" text-anchor="middle" font-size="15">&#8722;</text>

  <rect x="240" y="64" width="120" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="300" y="84" text-anchor="middle">dq current</text>
  <text x="300" y="100" text-anchor="middle">PI</text>

  <rect x="430" y="64" width="120" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="490" y="84" text-anchor="middle">Inverse Park</text>
  <text x="490" y="102" text-anchor="middle" font-size="11">Vq, Vd &#8594; Va, Vb, Vc</text>

  <rect x="620" y="64" width="110" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="675" y="84" text-anchor="middle">SVPWM</text>
  <text x="675" y="100" text-anchor="middle">+ amplifier</text>

  <rect x="780" y="64" width="80" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="820" y="92" text-anchor="middle">Motor</text>

  <line x1="140" y1="88" x2="173" y2="88" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="205" y1="88" x2="236" y2="88" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="222" y="80" text-anchor="middle" font-size="11">Iq, Id err</text>
  <line x1="360" y1="88" x2="426" y2="88" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="394" y="80" text-anchor="middle" font-size="11">Vq, Vd</text>
  <line x1="550" y1="88" x2="616" y2="88" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="730" y1="88" x2="776" y2="88" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- feedback path -->
  <rect x="620" y="200" width="110" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="675" y="220" text-anchor="middle">Measure</text>
  <text x="675" y="236" text-anchor="middle">Ia, Ib</text>

  <rect x="430" y="200" width="120" height="48" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="490" y="220" text-anchor="middle">Clarke / Park</text>
  <text x="490" y="236" text-anchor="middle">&#8594; Iq, Id</text>

  <line x1="820" y1="112" x2="820" y2="224" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="820" y1="224" x2="732" y2="224" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
  <line x1="620" y1="224" x2="552" y2="224" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
  <line x1="430" y1="224" x2="190" y2="224" stroke="#1f2933" stroke-width="1.4"/>
  <line x1="190" y1="224" x2="190" y2="105" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrowred)"/>
  <text x="310" y="217" text-anchor="middle" font-size="11" fill="#1f2933">Iq, Id feedback</text>

  <!-- bus voltage context -->
  <rect x="20" y="290" width="120" height="38" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.2"/>
  <text x="80" y="313" text-anchor="middle">Bus voltage</text>
  <path d="M 140 309 L 585 309 L 585 170 L 675 170 L 675 114" fill="none" stroke="#1f2933" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="350" y="304" text-anchor="middle" font-size="11" fill="#1f2933">supplies the power stage</text>
</svg>
