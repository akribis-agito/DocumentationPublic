<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="440" y="26" text-anchor="middle" font-size="15" font-weight="bold">Field-oriented current loop</text>

  <!-- forward path -->
  <rect x="20" y="64" width="120" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="80" y="84" text-anchor="middle">Current</text>
  <text x="80" y="100" text-anchor="middle">reference</text>

  <circle cx="190" cy="88" r="15" fill="#fff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="190" y="93" text-anchor="middle" font-size="15">&#8722;</text>

  <rect x="240" y="64" width="120" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="300" y="84" text-anchor="middle">dq current</text>
  <text x="300" y="100" text-anchor="middle">PI</text>

  <rect x="430" y="64" width="120" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="490" y="84" text-anchor="middle">Inverse Park</text>
  <text x="490" y="100" text-anchor="middle">Vq,Vd &#8594; Va,Vb,Vc</text>

  <rect x="620" y="64" width="110" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="675" y="84" text-anchor="middle">SVPWM</text>
  <text x="675" y="100" text-anchor="middle">+ amplifier</text>

  <rect x="780" y="64" width="80" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="820" y="92" text-anchor="middle">Motor</text>

  <line x1="140" y1="88" x2="173" y2="88" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="205" y1="88" x2="238" y2="88" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <text x="222" y="80" text-anchor="middle" font-size="11">Iq,Id err</text>
  <line x1="360" y1="88" x2="428" y2="88" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <text x="394" y="80" text-anchor="middle" font-size="11">Vq,Vd</text>
  <line x1="550" y1="88" x2="618" y2="88" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="730" y1="88" x2="778" y2="88" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- feedback path -->
  <rect x="620" y="200" width="110" height="48" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="675" y="220" text-anchor="middle">Measure</text>
  <text x="675" y="236" text-anchor="middle">Ia, Ib</text>

  <rect x="430" y="200" width="120" height="48" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="490" y="220" text-anchor="middle">Clarke / Park</text>
  <text x="490" y="236" text-anchor="middle">&#8594; Iq, Id</text>

  <line x1="800" y1="112" x2="800" y2="224" stroke="#e0736b"/>
  <line x1="800" y1="224" x2="732" y2="224" stroke="#e0736b" marker-end="url(#arrow)"/>
  <line x1="620" y1="224" x2="552" y2="224" stroke="#e0736b" marker-end="url(#arrow)"/>
  <line x1="430" y1="224" x2="190" y2="224" stroke="#e0736b"/>
  <line x1="190" y1="224" x2="190" y2="105" stroke="#e0736b" marker-end="url(#arrow)"/>
  <text x="300" y="217" text-anchor="middle" font-size="11" fill="#e0736b">Iq, Id feedback</text>

  <!-- bus voltage context -->
  <rect x="620" y="290" width="110" height="38" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="675" y="313" text-anchor="middle">Bus voltage</text>
  <line x1="675" y1="290" x2="675" y2="250" stroke="#5b6b7b" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="540" y="313" text-anchor="middle" font-size="11" fill="#5b6b7b">supplies the power stage</text>
</svg>
