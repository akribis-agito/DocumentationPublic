<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="15" font-weight="bold">Regeneration hysteresis vs bus voltage</text>

  <!-- Axes -->
  <line x1="80" y1="270" x2="520" y2="270" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="270" x2="80" y2="60" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="305" text-anchor="middle">VBus (mV)</text>
  <text x="30" y="120" text-anchor="middle" transform="rotate(-90 30 120)">Regen resistor</text>

  <!-- ON / OFF level guides -->
  <text x="84" y="100" fill="#888">ON</text>
  <text x="84" y="245" fill="#888">OFF</text>
  <line x1="80" y1="95" x2="520" y2="95" stroke="#ddd" stroke-dasharray="3,3"/>
  <line x1="80" y1="240" x2="520" y2="240" stroke="#ddd" stroke-dasharray="3,3"/>

  <!-- Threshold verticals -->
  <line x1="250" y1="60" x2="250" y2="285" stroke="#2a7" stroke-dasharray="4,4"/>
  <text x="250" y="298" text-anchor="middle" fill="#2a7">RegenOff</text>
  <line x1="400" y1="60" x2="400" y2="285" stroke="#c33" stroke-dasharray="4,4"/>
  <text x="400" y="298" text-anchor="middle" fill="#c33">RegenOn</text>

  <!-- Hysteresis loop: rising path (low to ON at RegenOn) -->
  <polyline points="120,240 400,240 400,95 510,95" fill="none" stroke="#c33" stroke-width="2.5"/>
  <!-- Falling path (high to OFF at RegenOff) -->
  <polyline points="510,95 250,95 250,240 120,240" fill="none" stroke="#2a7" stroke-width="2.5"/>

  <!-- arrows indicating direction -->
  <text x="300" y="232" fill="#c33">rising VBus &#8594; turns ON at RegenOn</text>
  <text x="150" y="88" fill="#2a7">falling VBus &#8594; turns OFF at RegenOff</text>

  <text x="300" y="60" text-anchor="middle" fill="#555" font-size="12">RegenOn &gt; RegenOff gives the dead-band that prevents chatter</text>
</svg>
