<svg xmlns="http://www.w3.org/2000/svg" width="780" height="280" viewBox="0 0 780 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="390" y="26" text-anchor="middle" font-size="15" font-weight="bold">Where compensation adds into the current reference</text>

  <!-- main path -->
  <rect x="20" y="96" width="120" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="80" y="116" text-anchor="middle">Loop output</text>
  <text x="80" y="132" text-anchor="middle" font-size="11">+ feedforward</text>

  <circle cx="240" cy="119" r="16" fill="#fff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="240" y="124" text-anchor="middle" font-size="15">+</text>

  <circle cx="430" cy="119" r="16" fill="#fff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="430" y="124" text-anchor="middle" font-size="15">+</text>

  <rect x="560" y="96" width="120" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="620" y="116" text-anchor="middle">Current limit</text>
  <text x="620" y="132" text-anchor="middle" font-size="11">&#8594; reference</text>

  <line x1="140" y1="119" x2="222" y2="119" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="256" y1="119" x2="412" y2="119" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="446" y1="119" x2="558" y2="119" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- loop-side compensation injected at first sum -->
  <rect x="160" y="200" width="160" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="240" y="220" text-anchor="middle" font-size="11">Loop-side compensation</text>
  <text x="240" y="236" text-anchor="middle" font-size="11">(TorqComp)</text>
  <line x1="240" y1="200" x2="240" y2="137" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- motor-side compensation injected at second sum -->
  <rect x="350" y="200" width="160" height="46" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="430" y="220" text-anchor="middle" font-size="11">Motor-side offset +</text>
  <text x="430" y="236" text-anchor="middle" font-size="11">angle table (UPMVelTable)</text>
  <line x1="430" y1="200" x2="430" y2="137" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <text x="240" y="76" text-anchor="middle" font-size="11" fill="#5b6b7b">in position / velocity loop</text>
  <text x="430" y="76" text-anchor="middle" font-size="11" fill="#5b6b7b">in current loop</text>
</svg>
