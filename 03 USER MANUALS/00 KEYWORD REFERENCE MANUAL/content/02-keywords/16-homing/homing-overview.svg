<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Typical homing sequence: approach the switch, hit it, back off to clear it, find the encoder index, set the position to define the origin, and end with HomingStat equal to 100. Any timeout, fault, or wrong end-of-motion reason aborts the run.">
  <title>Typical homing sequence</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="20" y="26" font-size="15" font-weight="bold">A typical homing sequence</text>
  <text x="20" y="44" fill="#555" font-size="11">HomingOn starts the steps defined in HomingDef; HomingStat / HomingStep track progress</text>

  <!-- step boxes -->
  <rect x="20" y="70" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="80" y="94" text-anchor="middle" font-weight="bold">Approach</text>
  <text x="80" y="112" text-anchor="middle" font-size="11">jog toward switch</text>

  <rect x="170" y="70" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="230" y="94" text-anchor="middle" font-weight="bold">Hit switch</text>
  <text x="230" y="112" text-anchor="middle" font-size="11">limit / home input</text>

  <rect x="320" y="70" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="380" y="94" text-anchor="middle" font-weight="bold">Back off</text>
  <text x="380" y="112" text-anchor="middle" font-size="11">clear the switch</text>

  <rect x="470" y="70" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="530" y="94" text-anchor="middle" font-weight="bold">Find index</text>
  <text x="530" y="112" text-anchor="middle" font-size="11">jog to encoder index</text>

  <rect x="320" y="180" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="380" y="204" text-anchor="middle" font-weight="bold">Set position</text>
  <text x="380" y="222" text-anchor="middle" font-size="11">define the origin</text>

  <rect x="470" y="180" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="530" y="204" text-anchor="middle" font-weight="bold">End homing</text>
  <text x="530" y="222" text-anchor="middle" font-size="11">HomingStat = 100</text>

  <!-- abort -->
  <rect x="20" y="180" width="200" height="60" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="120" y="204" text-anchor="middle" font-weight="bold">Abort on error</text>
  <text x="120" y="222" text-anchor="middle" font-size="11">HomingStat &lt; 0, HomingOn = 0</text>

  <!-- arrows across top -->
  <line x1="140" y1="100" x2="168" y2="100" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="290" y1="100" x2="318" y2="100" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="440" y1="100" x2="468" y2="100" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <!-- down to set position -->
  <line x1="530" y1="130" x2="400" y2="178" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <!-- set position to end -->
  <line x1="440" y1="210" x2="468" y2="210" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <!-- error path from steps to abort -->
  <line x1="220" y1="130" x2="150" y2="178" stroke="#e0736b" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="160" y="160" fill="#e0736b" font-size="11">timeout / fault / wrong reason</text>

  <text x="20" y="286" fill="#555" font-size="11">Steps run in order; each waits for its completion condition before the engine advances. A step that times out, sees the</text>
  <text x="20" y="302" fill="#555" font-size="11">wrong end-of-motion reason, or hits a fault aborts the run. The mix and order of steps is fully defined by HomingDef.</text>
</svg>
