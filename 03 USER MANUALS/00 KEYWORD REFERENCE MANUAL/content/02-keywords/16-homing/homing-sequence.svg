<svg xmlns="http://www.w3.org/2000/svg" width="780" height="460" viewBox="0 0 780 460" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="HomingDef step execution per cycle: when HomingOn is set to 1 the step index starts at 1; on the first cycle of each step the engine checks preconditions, loads kinematics, and starts the action; on later cycles it evaluates the stop reason, timeout, and fault state. If the completion condition is met the step index advances (ending homing leaves HomingStat equal to 100); if an error is detected the run aborts with HomingOn equal to 0 and HomingStat set to a negative code; HomingStat and HomingStep are published each cycle.">
  <title>HomingDef step execution per cycle</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="390" y="26" text-anchor="middle" font-size="15" font-weight="bold">HomingDef step execution (per step, each controller cycle)</text>

  <!-- HomingOn -->
  <rect x="310" y="44" width="160" height="34" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="390" y="66" text-anchor="middle" font-size="12">HomingOn = 1 &#8594; step = 1</text>

  <!-- First cycle decision -->
  <polygon points="390,96 480,128 390,160 300,128" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="390" y="124" text-anchor="middle" font-size="12">First cycle</text>
  <text x="390" y="140" text-anchor="middle" font-size="12">of this step?</text>

  <!-- Yes path: start preconditions -->
  <rect x="520" y="104" width="240" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="640" y="124" text-anchor="middle" font-size="12">Check preconditions, load</text>
  <text x="640" y="142" text-anchor="middle" font-size="12">kinematics, start the action</text>

  <!-- Evaluate step -->
  <rect x="300" y="184" width="180" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="390" y="204" text-anchor="middle" font-size="12">Evaluate step:</text>
  <text x="390" y="222" text-anchor="middle" font-size="12">stop reason, timeout, fault</text>

  <!-- Completion decision -->
  <polygon points="390,248 490,290 390,332 290,290" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="390" y="286" text-anchor="middle" font-size="12">Completion</text>
  <text x="390" y="302" text-anchor="middle" font-size="12">condition?</text>

  <!-- Advance -->
  <rect x="520" y="266" width="240" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="640" y="286" text-anchor="middle" font-size="12">step = step + 1</text>
  <text x="640" y="304" text-anchor="middle" font-size="12">(end homing &#8594; HomingStat = 100)</text>

  <!-- Abort -->
  <rect x="20" y="266" width="240" height="48" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="140" y="286" text-anchor="middle" font-size="12">Abort: HomingOn = 0,</text>
  <text x="140" y="304" text-anchor="middle" font-size="12">HomingStat = negative code</text>

  <!-- Publish -->
  <rect x="290" y="368" width="200" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="390" y="392" text-anchor="middle" font-size="12">Publish HomingStat and HomingStep</text>

  <!-- arrows -->
  <line x1="390" y1="78" x2="390" y2="94" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- First cycle? yes -> start -->
  <line x1="480" y1="128" x2="518" y2="128" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="498" y="120" font-size="11" fill="#5b6b7b">yes</text>

  <!-- start -> Evaluate (down then in) -->
  <path d="M640,152 C640,180 540,180 482,200" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- First cycle? no -> Evaluate (down through the center) -->
  <path d="M390,160 L390,182" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="400" y="174" font-size="11" fill="#5b6b7b">no &#8212; later cycle</text>

  <!-- Evaluate -> Completion -->
  <line x1="390" y1="232" x2="390" y2="246" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Completion met -> Advance -->
  <line x1="490" y1="290" x2="518" y2="290" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="504" y="282" font-size="11" fill="#5b6b7b">met</text>

  <!-- Completion error -> Abort -->
  <line x1="290" y1="290" x2="262" y2="290" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="276" y="282" text-anchor="end" font-size="11" fill="#5b6b7b">error</text>

  <!-- Completion not met -> back to top (wait next cycle) -->
  <path d="M390,332 C390,348 240,348 240,160 C240,128 290,128 300,128" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="240" y="356" font-size="11" fill="#5b6b7b">not met &#8212; wait next cycle</text>

  <!-- Advance -> Publish -->
  <path d="M640,314 C640,360 540,386 492,388" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Abort -> Publish -->
  <path d="M140,314 C140,360 240,386 288,388" fill="none" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Publish -> back to top of next cycle -->
  <text x="390" y="430" text-anchor="middle" font-size="11" fill="#5b6b7b">repeats every controller cycle while HomingOn = 1</text>
</svg>
