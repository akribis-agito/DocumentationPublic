<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="General-purpose arrays: the GenData family is non-axis free scratch storage not linked to any feature (recommended for user programs and debugging); the UserParam family is per-axis and feature-related with some entries used internally (avoid for user programs). Both families are saved to flash and are accessible by the user program and host.">
  <title>General-purpose arrays</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold">General-purpose arrays</text>

  <!-- user program / host -->
  <rect x="270" y="50" width="180" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="73" text-anchor="middle" font-weight="bold">User program / host</text>
  <text x="360" y="91" text-anchor="middle" font-size="11">read and write</text>

  <!-- GenData family -->
  <rect x="40" y="160" width="290" height="110" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="185" y="184" text-anchor="middle" font-weight="bold">GenData family</text>
  <text x="185" y="204" text-anchor="middle" font-size="11">non-axis, free scratch storage</text>
  <text x="185" y="222" text-anchor="middle" font-size="11">not linked to any feature</text>
  <text x="185" y="244" text-anchor="middle" font-size="10.5" fill="#5b6b7b">GenData / GenDataF</text>
  <text x="185" y="258" text-anchor="middle" font-size="10.5" fill="#5b6b7b">GenDataD / GenDataLL</text>

  <!-- UserParam family -->
  <rect x="390" y="160" width="290" height="110" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="535" y="184" text-anchor="middle" font-weight="bold">UserParam family</text>
  <text x="535" y="204" text-anchor="middle" font-size="11">per-axis, feature-related</text>
  <text x="535" y="222" text-anchor="middle" font-size="11">some entries used internally</text>
  <text x="535" y="244" text-anchor="middle" font-size="10.5" fill="#5b6b7b">UserParam / UserParamF</text>
  <text x="535" y="258" text-anchor="middle" font-size="10.5" fill="#5b6b7b">UserParamD / UserParamLL</text>

  <!-- arrows -->
  <line x1="320" y1="100" x2="210" y2="156" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="510" y2="156" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="185" y="288" text-anchor="middle" font-size="10.5" fill="#5b6b7b">recommended for user programs / debugging</text>
  <text x="535" y="288" text-anchor="middle" font-size="10.5" fill="#5b6b7b">avoid for user programs (feature-reserved)</text>

  <!-- both saved to flash note -->
  <text x="360" y="128" text-anchor="middle" font-size="11" fill="#5b6b7b">both families are saved to flash</text>
</svg>
