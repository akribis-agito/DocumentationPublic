<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="bold">Controller architecture</text>

  <!-- Host / PCSuite -->
  <rect x="30" y="60" width="150" height="80" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="92" text-anchor="middle" font-weight="bold">Host / PCSuite</text>
  <text x="105" y="112" text-anchor="middle" font-size="11" fill="#444">commission, tune,</text>
  <text x="105" y="128" text-anchor="middle" font-size="11" fill="#444">monitor</text>

  <!-- Controller -->
  <rect x="270" y="45" width="200" height="250" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="370" y="68" text-anchor="middle" font-weight="bold">Controller</text>

  <rect x="290" y="82" width="160" height="40" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="370" y="100" text-anchor="middle" font-size="12">Parameters (keywords)</text>
  <text x="370" y="115" text-anchor="middle" font-size="10" fill="#666">Save / Load to flash</text>

  <rect x="290" y="132" width="160" height="40" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="370" y="150" text-anchor="middle" font-size="12">User program</text>
  <text x="370" y="165" text-anchor="middle" font-size="10" fill="#666">AutoExec at start-up</text>

  <rect x="290" y="182" width="160" height="40" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="370" y="200" text-anchor="middle" font-size="12">Status / identity</text>
  <text x="370" y="215" text-anchor="middle" font-size="10" fill="#666">read-only health, version</text>

  <rect x="290" y="232" width="160" height="44" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="370" y="250" text-anchor="middle" font-size="12">Motion control</text>
  <text x="370" y="265" text-anchor="middle" font-size="10" fill="#666">axes / control loops</text>

  <!-- Standalone vs Central-i -->
  <rect x="520" y="70" width="100" height="70" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="570" y="98" text-anchor="middle" font-size="12" font-weight="bold">Standalone</text>
  <text x="570" y="116" text-anchor="middle" font-size="10" fill="#444">on-board axes</text>

  <rect x="520" y="200" width="100" height="90" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="570" y="226" text-anchor="middle" font-size="12" font-weight="bold">Central-i</text>
  <text x="570" y="244" text-anchor="middle" font-size="10" fill="#444">master drives</text>
  <text x="570" y="259" text-anchor="middle" font-size="10" fill="#444">remote amplifier</text>
  <text x="570" y="274" text-anchor="middle" font-size="10" fill="#444">units over link</text>

  <!-- arrows -->
  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="180" y1="92" x2="266" y2="92"/>
    <line x1="266" y1="108" x2="180" y2="108"/>
    <line x1="470" y1="100" x2="516" y2="100"/>
    <line x1="470" y1="245" x2="516" y2="240"/>
  </g>
  <text x="223" y="86" text-anchor="middle" font-size="10" fill="#5b6b7b">commands</text>
  <text x="223" y="122" text-anchor="middle" font-size="10" fill="#5b6b7b">status</text>
</svg>
