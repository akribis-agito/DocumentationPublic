<svg xmlns="http://www.w3.org/2000/svg" width="620" height="220" viewBox="0 0 620 220" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="310" y="22" text-anchor="middle" font-size="14" font-weight="bold">Save / Load / Reset flow</text>

  <!-- Working params (RAM) -->
  <rect x="40" y="80" width="180" height="80" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="130" y="112" text-anchor="middle" font-weight="bold">Working parameters</text>
  <text x="130" y="132" text-anchor="middle" font-size="10" fill="#444">live, in RAM</text>

  <!-- Flash -->
  <rect x="400" y="80" width="180" height="80" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="490" y="112" text-anchor="middle" font-weight="bold">Flash (non-volatile)</text>
  <text x="490" y="132" text-anchor="middle" font-size="10" fill="#444">survives power cycle</text>

  <!-- Save arrow -->
  <line x1="220" y1="105" x2="396" y2="105" stroke="#5b6b7b" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="308" y="98" text-anchor="middle" font-size="11" fill="#5b6b7b">Save</text>

  <!-- Load arrow -->
  <line x1="396" y1="135" x2="220" y2="135" stroke="#5b6b7b" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="308" y="152" text-anchor="middle" font-size="11" fill="#5b6b7b">Load (also at power-up)</text>

  <!-- Reset -->
  <rect x="230" y="178" width="160" height="34" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="310" y="200" text-anchor="middle" font-size="11">Reset: reboot, reload from flash</text>
  <line x1="490" y1="160" x2="390" y2="186" stroke="#5b6b7b" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
</svg>
