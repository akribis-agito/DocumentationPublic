<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" role="img" aria-label="Communication interfaces to the controller: CAN bus (CANAddr, CANBaud), Serial RS-232 / USB (RSBaud, ChainAddress) optionally chained to RS-485 multi-drop units, and Ethernet TCP/IP (EthernetIP, EthernetMAC, EthernetPort). Host can read or write keywords over any active interface." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Communication interfaces</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="bold">Communication interfaces</text>

  <!-- Controller on the right -->
  <rect x="430" y="70" width="180" height="200" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="520" y="96" text-anchor="middle" font-weight="bold">Controller</text>
  <text x="520" y="116" text-anchor="middle" font-size="10" fill="#444">host can read / write</text>
  <text x="520" y="131" text-anchor="middle" font-size="10" fill="#444">keywords over any</text>
  <text x="520" y="146" text-anchor="middle" font-size="10" fill="#444">active interface</text>

  <!-- CAN -->
  <rect x="30" y="55" width="160" height="50" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="110" y="76" text-anchor="middle" font-weight="bold" font-size="12">CAN bus</text>
  <text x="110" y="92" text-anchor="middle" font-size="10" fill="#666">CANAddr, CANBaud</text>

  <!-- Serial / RS-485 chain -->
  <rect x="30" y="130" width="160" height="50" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="110" y="151" text-anchor="middle" font-weight="bold" font-size="12">Serial RS-232 / USB</text>
  <text x="110" y="167" text-anchor="middle" font-size="10" fill="#666">RSBaud, ChainAddress</text>

  <!-- RS-485 chained units -->
  <rect x="220" y="130" width="58" height="50" rx="6" fill="#f4f7fa" stroke="#8a929b" stroke-width="1"/>
  <text x="249" y="158" text-anchor="middle" font-size="10">unit</text>
  <rect x="300" y="130" width="58" height="50" rx="6" fill="#f4f7fa" stroke="#8a929b" stroke-width="1"/>
  <text x="329" y="158" text-anchor="middle" font-size="10">unit</text>

  <!-- Ethernet -->
  <rect x="30" y="205" width="160" height="60" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="110" y="226" text-anchor="middle" font-weight="bold" font-size="12">Ethernet (TCP/IP)</text>
  <text x="110" y="242" text-anchor="middle" font-size="10" fill="#666">EthernetIP, EthernetMAC,</text>
  <text x="110" y="256" text-anchor="middle" font-size="10" fill="#666">EthernetPort</text>

  <!-- arrows to controller -->
  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="80" x2="426" y2="120"/>
    <line x1="358" y1="155" x2="426" y2="165"/>
    <line x1="190" y1="235" x2="426" y2="200"/>
  </g>
  <!-- RS-485 daisy chain -->
  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="190" y1="155" x2="216" y2="155"/>
    <line x1="278" y1="155" x2="296" y2="155"/>
  </g>
  <text x="280" y="123" text-anchor="middle" font-size="10" fill="#5b6b7b">addressed multi-drop chain</text>
</svg>
