<svg xmlns="http://www.w3.org/2000/svg" width="560" height="250" viewBox="0 0 560 250" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="250" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="15" font-weight="bold">AllStat: two selectors choose the reply</text>

  <!-- Axis mask -->
  <rect x="30" y="50" width="220" height="70" rx="6" fill="#eef4fb" stroke="#3b6ea5"/>
  <text x="140" y="70" text-anchor="middle" font-weight="bold">Array index = axis mask</text>
  <text x="140" y="90" text-anchor="middle">bit 0 &#8594; axis 1</text>
  <text x="140" y="108" text-anchor="middle">bit 1 &#8594; axis 2 &#8230;</text>

  <!-- Group mask -->
  <rect x="310" y="50" width="220" height="70" rx="6" fill="#f3eefb" stroke="#7a4fa5"/>
  <text x="420" y="70" text-anchor="middle" font-weight="bold">Value = group mask</text>
  <text x="420" y="90" text-anchor="middle">bit 0 &#8594; basic group</text>
  <text x="420" y="108" text-anchor="middle">bit 5 &#8594; less-important &#8230;</text>

  <!-- arrows -->
  <line x1="140" y1="120" x2="220" y2="165" stroke="#555" stroke-width="1.5"/>
  <line x1="420" y1="120" x2="340" y2="165" stroke="#555" stroke-width="1.5"/>

  <!-- loop box -->
  <rect x="120" y="165" width="320" height="55" rx="6" fill="#f7f7f7" stroke="#888"/>
  <text x="280" y="186" text-anchor="middle">For each selected axis &#215; each selected group,</text>
  <text x="280" y="204" text-anchor="middle">append that group's property values to the reply</text>

  <text x="280" y="240" text-anchor="middle" font-size="11" fill="#666">Reply length depends on which axes and groups were requested.</text>
</svg>
