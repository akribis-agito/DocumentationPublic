<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280" role="img" aria-label="AllStat uses two selectors: array index picks the axis mask, value picks the group mask. The controller iterates and appends each selected group's properties to the reply." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>AllStat selectors</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="bold">AllStat: two selectors choose the reply</text>

  <!-- Axis mask -->
  <rect x="30" y="60" width="240" height="80" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="150" y="82" text-anchor="middle" font-weight="bold">Array index = axis mask</text>
  <text x="150" y="104" text-anchor="middle" font-size="11">bit 0 &#8594; axis 1</text>
  <text x="150" y="120" text-anchor="middle" font-size="11">bit 1 &#8594; axis 2, etc.</text>

  <!-- Group mask -->
  <rect x="330" y="60" width="240" height="80" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="450" y="82" text-anchor="middle" font-weight="bold">Value = group mask</text>
  <text x="450" y="104" text-anchor="middle" font-size="11">bit 0 &#8594; basic group</text>
  <text x="450" y="120" text-anchor="middle" font-size="11">bit 5 &#8594; less-important group, etc.</text>

  <!-- Arrows down into loop -->
  <line x1="150" y1="142" x2="230" y2="178" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="450" y1="142" x2="370" y2="178" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Loop / iteration block -->
  <rect x="120" y="184" width="360" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="300" y="206" text-anchor="middle">For each selected axis &#215; each selected group,</text>
  <text x="300" y="226" text-anchor="middle">append that group's property values to the reply</text>

  <text x="300" y="266" text-anchor="middle" font-size="11" fill="#5b6b7b">Reply length depends on which axes and groups were requested.</text>
</svg>
