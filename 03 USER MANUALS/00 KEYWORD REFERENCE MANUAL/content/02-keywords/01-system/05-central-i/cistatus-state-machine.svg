<svg xmlns="http://www.w3.org/2000/svg" width="560" height="200" font-family="Segoe UI,Arial,sans-serif" font-size="12">
  <text x="10" y="18" font-size="13" font-weight="bold">CIStatus[1] — connection state machine</text>
  <!-- nodes -->
  <g>
    <rect x="20"  y="60" width="120" height="42" rx="6" fill="#eef2f5" stroke="#8a929b"/>
    <text x="80"  y="80" text-anchor="middle">Disabled</text>
    <text x="80"  y="95" text-anchor="middle" font-size="10" fill="#7b8794">value 0</text>

    <rect x="200" y="60" width="120" height="42" rx="6" fill="#fff3d6" stroke="#d9a441"/>
    <text x="260" y="80" text-anchor="middle">In process</text>
    <text x="260" y="95" text-anchor="middle" font-size="10" fill="#9a6700">value 1</text>

    <rect x="380" y="60" width="120" height="42" rx="6" fill="#e7f8ee" stroke="#0f7a3d"/>
    <text x="440" y="80" text-anchor="middle">Connected</text>
    <text x="440" y="95" text-anchor="middle" font-size="10" fill="#0f7a3d">value 3</text>

    <rect x="200" y="140" width="120" height="42" rx="6" fill="#f6c9c2" stroke="#c0392b"/>
    <text x="260" y="160" text-anchor="middle">Fault</text>
    <text x="260" y="175" text-anchor="middle" font-size="10" fill="#c0392b">value 2</text>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#5a6573"/></marker>
  </defs>
  <g stroke="#5a6573" stroke-width="1.4" fill="none" marker-end="url(#a)">
    <line x1="140" y1="81" x2="198" y2="81"/>           <!-- Disabled->In process -->
    <line x1="320" y1="81" x2="378" y2="81"/>           <!-- In process->Connected -->
    <line x1="260" y1="102" x2="260" y2="138"/>          <!-- In process->Fault -->
    <path d="M440,102 C440,150 330,168 322,162"/>       <!-- Connected->Fault -->
    <path d="M200,170 C120,170 80,140 80,104"/>         <!-- Fault->Disabled (disconnect) -->
  </g>
  <text x="150" y="74" font-size="9" fill="#5a6573">CIConnect</text>
  <text x="330" y="74" font-size="9" fill="#5a6573">link up</text>
  <text x="266" y="124" font-size="9" fill="#c0392b">error</text>
  <text x="360" y="140" font-size="9" fill="#c0392b">error</text>
  <text x="95" y="135" font-size="9" fill="#5a6573">CIDisconnect</text>
</svg>
