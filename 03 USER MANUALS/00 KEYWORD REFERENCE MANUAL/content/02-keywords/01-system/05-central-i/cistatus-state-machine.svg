<svg xmlns="http://www.w3.org/2000/svg" width="600" height="240" viewBox="0 0 600 240" role="img" aria-label="CIStatus[1] transitions: Disabled (0) goes to In process (1) on CIConnect, to Connected (3) once the link is up. Any error moves to Fault (2); CIDisconnect returns to Disabled." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>CIStatus[1] connection state machine</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="300" y="22" text-anchor="middle" font-size="14" font-weight="bold">CIStatus[1] &#8212; connection state machine</text>

  <!-- States in top row -->
  <rect x="30"  y="60" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="100" y="84" text-anchor="middle" font-weight="bold">Disabled</text>
  <text x="100" y="104" text-anchor="middle" font-size="11" fill="#5b6b7b">value 0</text>

  <rect x="230" y="60" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="300" y="84" text-anchor="middle" font-weight="bold">In process</text>
  <text x="300" y="104" text-anchor="middle" font-size="11" fill="#5b6b7b">value 1</text>

  <rect x="430" y="60" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="500" y="84" text-anchor="middle" font-weight="bold">Connected</text>
  <text x="500" y="104" text-anchor="middle" font-size="11" fill="#5b6b7b">value 3</text>

  <!-- Fault below -->
  <rect x="230" y="160" width="140" height="56" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="300" y="184" text-anchor="middle" font-weight="bold" fill="#9c3b33">Fault</text>
  <text x="300" y="204" text-anchor="middle" font-size="11" fill="#9c3b33">value 2</text>

  <!-- Forward arrows -->
  <line x1="170" y1="88" x2="228" y2="88" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="199" y="80" text-anchor="middle" font-size="10" fill="#5b6b7b">CIConnect</text>

  <line x1="370" y1="88" x2="428" y2="88" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="399" y="80" text-anchor="middle" font-size="10" fill="#5b6b7b">link up</text>

  <!-- Error transitions to Fault -->
  <line x1="300" y1="116" x2="300" y2="158" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="338" y="140" text-anchor="middle" font-size="10" fill="#c0392b">error</text>
  <line x1="465" y1="116" x2="370" y2="170" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="430" y="158" text-anchor="middle" font-size="10" fill="#c0392b">error</text>

  <!-- Fault back to Disabled via CIDisconnect -->
  <path d="M230,200 C140,200 100,170 100,118" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="120" y="160" text-anchor="middle" font-size="10" fill="#5b6b7b">CIDisconnect</text>
</svg>
