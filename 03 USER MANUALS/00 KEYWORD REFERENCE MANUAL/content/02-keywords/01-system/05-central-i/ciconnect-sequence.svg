<svg xmlns="http://www.w3.org/2000/svg" width="680" height="270" viewBox="0 0 680 270" role="img" aria-label="CIConnect drives a remote port from Reset through Get-device and Configure into Sync (connected). On any error the port lands in Error, and CIDisconnect returns it to Disconnected." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>CIConnect connection sequence</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="bold">CIConnect &#8212; connection sequence (master side)</text>

  <!-- Top row: Reset -> Get device -> Configure -> Sync -->
  <rect x="20"  y="60" width="130" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="85"  y="82" text-anchor="middle" font-weight="bold">Reset</text>
  <text x="85"  y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">reset remote, link up</text>

  <rect x="180" y="60" width="130" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="245" y="82" text-anchor="middle" font-weight="bold">Get device</text>
  <text x="245" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">read type / version</text>

  <rect x="340" y="60" width="130" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="405" y="82" text-anchor="middle" font-weight="bold">Configure</text>
  <text x="405" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">timing, sync mailbox</text>

  <rect x="500" y="60" width="160" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="580" y="82" text-anchor="middle" font-weight="bold">Sync (connected)</text>
  <text x="580" y="100" text-anchor="middle" font-size="11" fill="#5b6b7b">CIStatus[1] = 3</text>

  <line x1="150" y1="85" x2="178" y2="85" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="310" y1="85" x2="338" y2="85" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="470" y1="85" x2="498" y2="85" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Bottom row: Disconnected (left) and Error (centered under Configure) -->
  <rect x="20"  y="180" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="95"  y="202" text-anchor="middle" font-weight="bold">Disconnected</text>
  <text x="95"  y="220" text-anchor="middle" font-size="11" fill="#5b6b7b">CIStatus[1] = 0</text>

  <rect x="340" y="180" width="160" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="420" y="202" text-anchor="middle" font-weight="bold" fill="#9c3b33">Error</text>
  <text x="420" y="220" text-anchor="middle" font-size="11" fill="#9c3b33">CIStatus[1] = 2, code in [6]</text>

  <!-- Error transitions: from Get device, Configure, Sync -->
  <line x1="245" y1="110" x2="380" y2="178" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="405" y1="110" x2="420" y2="178" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="580" y1="110" x2="498" y2="184" stroke="#e0736b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="320" y="148" text-anchor="middle" font-size="10" fill="#c0392b">device mismatch / link error</text>

  <!-- CIDisconnect: from any of the upper states to Disconnected -->
  <line x1="85"  y1="110" x2="95"  y2="178" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="55" y="148" text-anchor="middle" font-size="10" fill="#5b6b7b">CIDisconnect</text>
</svg>
