<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>

  <!-- Encoders in -->
  <rect x="20" y="40" width="120" height="34" fill="#eef3fb" stroke="#3b6ea5"/>
  <text x="80" y="62" text-anchor="middle">Motor A encoder</text>
  <rect x="20" y="286" width="120" height="34" fill="#eef3fb" stroke="#3b6ea5"/>
  <text x="80" y="308" text-anchor="middle">Motor B encoder</text>

  <!-- Transform to common / differential -->
  <rect x="200" y="150" width="150" height="60" fill="#f3f0fa" stroke="#6a4fa5"/>
  <text x="275" y="174" text-anchor="middle">Transform</text>
  <text x="275" y="192" text-anchor="middle">mean / difference</text>

  <line x1="140" y1="57" x2="200" y2="165" stroke="#555"/>
  <line x1="140" y1="303" x2="200" y2="195" stroke="#555"/>

  <!-- Common-mode loop -->
  <rect x="400" y="40" width="200" height="44" fill="#eafaef" stroke="#3b8a4f"/>
  <text x="500" y="60" text-anchor="middle">Common (linear) loop</text>
  <text x="500" y="77" text-anchor="middle">follows your move command</text>

  <!-- Differential-mode loop -->
  <rect x="400" y="276" width="200" height="44" fill="#fdf0ec" stroke="#a5503b"/>
  <text x="500" y="296" text-anchor="middle">Differential (yaw) loop</text>
  <text x="500" y="313" text-anchor="middle">holds beam square (GantryYawRef)</text>

  <line x1="350" y1="168" x2="400" y2="62" stroke="#555"/>
  <line x1="350" y1="192" x2="400" y2="298" stroke="#555"/>

  <!-- Recombine -->
  <rect x="400" y="150" width="150" height="60" fill="#f3f0fa" stroke="#6a4fa5"/>
  <text x="475" y="174" text-anchor="middle">Recombine to</text>
  <text x="475" y="192" text-anchor="middle">motor currents</text>

  <line x1="500" y1="84" x2="490" y2="150" stroke="#555"/>
  <line x1="500" y1="276" x2="490" y2="210" stroke="#555"/>

  <!-- Outputs -->
  <text x="565" y="140" text-anchor="middle">A = linear + yaw</text>
  <text x="565" y="232" text-anchor="middle">B = linear - yaw</text>
</svg>
