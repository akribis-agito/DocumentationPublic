<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Dual-loop gantry control: the linear position loop closes on the load feedback selected by GantryFdbkSrc; the inner velocity loop uses the mean of the two motor encoders (GantryAuxFdbk); the yaw loop runs on the motor encoder difference; the resulting motor currents are linear plus yaw on side A and linear minus yaw on side B.">
  <title>Dual-loop gantry control</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <!-- Load feedback -->
  <rect x="20" y="40" width="160" height="56" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="100" y="63" text-anchor="middle">Load feedback</text>
  <text x="100" y="81" text-anchor="middle" fill="#5b6b7b" font-size="11">selected by GantryFdbkSrc</text>

  <!-- Motor encoders -->
  <rect x="20" y="230" width="160" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="100" y="253" text-anchor="middle">Two motor encoders</text>
  <text x="100" y="271" text-anchor="middle" fill="#5b6b7b" font-size="11">mean = GantryAuxFdbk</text>

  <!-- Linear position loop -->
  <rect x="250" y="40" width="180" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="63" text-anchor="middle">Linear position loop</text>
  <text x="340" y="81" text-anchor="middle" fill="#5b6b7b" font-size="11">closed on load feedback</text>

  <!-- Inner velocity loop -->
  <rect x="250" y="150" width="180" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="173" text-anchor="middle">Inner velocity loop</text>
  <text x="340" y="191" text-anchor="middle" fill="#5b6b7b" font-size="11">GantryAuxVel &#215; factor</text>

  <!-- Yaw loop -->
  <rect x="250" y="258" width="180" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="281" text-anchor="middle">Yaw (differential) loop</text>
  <text x="340" y="299" text-anchor="middle" fill="#5b6b7b" font-size="11">from motor encoders</text>

  <!-- Output -->
  <rect x="510" y="150" width="190" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="605" y="173" text-anchor="middle">Motor currents</text>
  <text x="605" y="191" text-anchor="middle" fill="#5b6b7b" font-size="11">A = linear + yaw, B = linear &#8722; yaw</text>

  <line x1="180" y1="68" x2="250" y2="68" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="180" y1="250" x2="250" y2="186" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="180" y1="262" x2="250" y2="286" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="96" x2="340" y2="150" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="178" x2="510" y2="178" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="286" x2="470" y2="286" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="470" y1="286" x2="470" y2="206" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="470" y1="206" x2="510" y2="195" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
