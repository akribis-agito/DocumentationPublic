<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
  </defs>

  <text x="20" y="22" font-weight="bold">IdenResults — one frequency point of the identified frequency response</text>

  <!-- magnitude plot -->
  <g transform="translate(40,50)">
    <rect x="0" y="0" width="320" height="200" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="160" y="-8" text-anchor="middle" font-weight="bold" font-size="12">Magnitude vs frequency (dB)</text>
    <!-- axes -->
    <line x1="30" y1="170" x2="300" y2="170" stroke="#5b6b7b"/>
    <line x1="30" y1="20" x2="30" y2="170" stroke="#5b6b7b"/>
    <text x="160" y="190" text-anchor="middle" font-size="11">frequency (log)</text>
    <text x="14" y="95" text-anchor="middle" font-size="11" transform="rotate(-90 14 95)">|H| dB</text>
    <!-- mag curve -->
    <path d="M 40 60 C 90 60 140 65 180 80 C 220 100 260 145 295 165" fill="none" stroke="#e0736b" stroke-width="1.6"/>
    <!-- single sample point -->
    <circle cx="180" cy="80" r="5" fill="#e0736b"/>
    <line x1="180" y1="80" x2="180" y2="170" stroke="#5b6b7b" stroke-dasharray="3,3"/>
    <text x="184" y="76" font-size="11">IdenResults[5] (dB)</text>
    <text x="184" y="180" font-size="11">f = InjectFreq</text>
  </g>

  <!-- phase plot -->
  <g transform="translate(420,50)">
    <rect x="0" y="0" width="320" height="200" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <text x="160" y="-8" text-anchor="middle" font-weight="bold" font-size="12">Phase vs frequency (deg)</text>
    <line x1="30" y1="100" x2="300" y2="100" stroke="#5b6b7b"/>
    <line x1="30" y1="20" x2="30" y2="180" stroke="#5b6b7b"/>
    <text x="160" y="190" text-anchor="middle" font-size="11">frequency (log)</text>
    <text x="14" y="95" text-anchor="middle" font-size="11" transform="rotate(-90 14 95)">phase</text>
    <!-- phase curve -->
    <path d="M 40 100 C 80 100 130 110 180 130 C 230 150 270 165 295 170" fill="none" stroke="#e0736b" stroke-width="1.6"/>
    <circle cx="180" cy="130" r="5" fill="#e0736b"/>
    <line x1="180" y1="130" x2="180" y2="180" stroke="#5b6b7b" stroke-dasharray="3,3"/>
    <text x="184" y="126" font-size="11">IdenResults[6] (deg/100)</text>
    <text x="184" y="194" font-size="11">f = InjectFreq</text>
  </g>

  <!-- legend -->
  <text x="20" y="284" font-weight="bold" font-size="12">Each CalcIden run produces one point</text>
  <text x="20" y="302" font-size="11">IdenResults[1..2] = real/imag(H), [5] = |H| dB, [6] = phase (deg/100), [7]/[8] = output/input amplitude at f = InjectFreq.</text>
  <text x="20" y="316" font-size="11">PCSuite sweeps InjectFreq and concatenates these points into the full Bode plot used by tuning and filter design.</text>
</svg>
