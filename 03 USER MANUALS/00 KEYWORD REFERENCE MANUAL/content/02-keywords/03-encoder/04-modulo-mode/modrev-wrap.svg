<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" font-family="sans-serif" font-size="12">
  <rect width="560" height="280" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="14" font-weight="bold">ModRev modulo wrap of Pos (ModRev = 3000)</text>

  <!-- axes -->
  <line x1="60" y1="240" x2="520" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="240" x2="60" y2="50" stroke="#333" stroke-width="1.5"/>
  <text x="290" y="270" text-anchor="middle">time (control cycles, continuous positive rotation)</text>
  <text x="20" y="150" text-anchor="middle" transform="rotate(-90 20 150)">Pos</text>

  <!-- ModRev level and zero -->
  <line x1="60" y1="70" x2="520" y2="70" stroke="#bbb" stroke-dasharray="4 3"/>
  <text x="524" y="74">ModRev (3000) = wrap line</text>
  <text x="524" y="244">0</text>

  <!-- sawtooth: rises 0..ModRev then drops back to 0 (high-side wrap subtracts ModRev) -->
  <polyline points="60,240 160,70 160,240 260,70 260,240 360,70 360,240 460,70 460,240 520,138"
            fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="150" y="48" fill="#1565c0">Pos = 2999</text>

  <!-- wrap arrows -->
  <text x="170" y="160" fill="#c62828">wrap: Pos -= ModRev</text>
  <text x="170" y="176" fill="#c62828">(reference frame shifts too)</text>

  <text x="60" y="172" font-size="11" fill="#555">At each wrap PosRef, AbsTrgt, PDPos, MasterPos and the</text>
  <text x="60" y="186" font-size="11" fill="#555">shaped/filtered references all shift by ModRev, so</text>
  <text x="60" y="200" font-size="11" fill="#555">PosErr = PosRef - Pos is preserved across the boundary.</text>
</svg>
