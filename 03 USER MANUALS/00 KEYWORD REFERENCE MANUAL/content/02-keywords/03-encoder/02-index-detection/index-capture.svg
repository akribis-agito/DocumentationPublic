<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="bold">Index (reference mark) capture</text>

  <rect x="20" y="60" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="95" y="86" text-anchor="middle" font-weight="bold">Index pulse</text>
  <text x="95" y="104" text-anchor="middle" font-size="10" fill="#444">on encoder Z channel</text>

  <rect x="220" y="60" width="170" height="60" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="305" y="86" text-anchor="middle" font-size="12" font-weight="bold">Polled each cycle</text>
  <text x="305" y="104" text-anchor="middle" font-size="10" fill="#666">move slowly so pulse is seen</text>

  <rect x="440" y="45" width="180" height="42" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="530" y="71" text-anchor="middle" font-size="12">IndexPos = feedback position</text>

  <rect x="440" y="100" width="180" height="42" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="530" y="126" text-anchor="middle" font-size="12">IndexStat = 1 (detected)</text>

  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="170" y1="90" x2="216" y2="90"/>
    <line x1="390" y1="84" x2="436" y2="68"/>
    <line x1="390" y1="96" x2="436" y2="118"/>
  </g>
</svg>
