<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Absolute-encoder register transaction shown as two parallel sequences. Read (EncAbsWRType = 0): set EncAbsAddr, write EncAbsSendCmd, wait for the response, then read the result from EncAbsRData. Write (EncAbsWRType = 1): set EncAbsAddr and EncAbsWData, write EncAbsSendCmd, then wait for completion.">
  <title>Absolute-encoder register transaction</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold">Absolute-encoder register transaction</text>

  <!-- Read column -->
  <text x="180" y="58" text-anchor="middle" font-weight="bold">Read (EncAbsWRType = 0)</text>

  <rect x="40" y="70"  width="280" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="180" y="93" text-anchor="middle">EncAbsWRType = 0</text>

  <rect x="40" y="118" width="280" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="180" y="141" text-anchor="middle">EncAbsAddr = register address</text>

  <rect x="40" y="166" width="280" height="36" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="180" y="189" text-anchor="middle">write EncAbsSendCmd (read command)</text>

  <rect x="40" y="214" width="280" height="36" rx="6" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
  <text x="180" y="237" text-anchor="middle">firmware waits for the response</text>

  <rect x="40" y="262" width="280" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="180" y="285" text-anchor="middle">read result from EncAbsRData</text>

  <!-- Write column -->
  <text x="540" y="58" text-anchor="middle" font-weight="bold">Write (EncAbsWRType = 1)</text>

  <rect x="400" y="70"  width="280" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="540" y="93" text-anchor="middle">EncAbsWRType = 1</text>

  <rect x="400" y="118" width="280" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="540" y="141" text-anchor="middle">EncAbsAddr = register address</text>

  <rect x="400" y="166" width="280" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="540" y="189" text-anchor="middle">EncAbsWData = value to write</text>

  <rect x="400" y="214" width="280" height="36" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="540" y="237" text-anchor="middle">write EncAbsSendCmd (write command)</text>

  <rect x="400" y="262" width="280" height="36" rx="6" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
  <text x="540" y="285" text-anchor="middle">firmware waits for completion</text>

  <!-- arrows between steps -->
  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="180" y1="106" x2="180" y2="114"/>
    <line x1="180" y1="154" x2="180" y2="162"/>
    <line x1="180" y1="202" x2="180" y2="210"/>
    <line x1="180" y1="250" x2="180" y2="258"/>
    <line x1="540" y1="106" x2="540" y2="114"/>
    <line x1="540" y1="154" x2="540" y2="162"/>
    <line x1="540" y1="202" x2="540" y2="210"/>
    <line x1="540" y1="250" x2="540" y2="258"/>
  </g>

  <text x="360" y="332" text-anchor="middle" font-size="11" fill="#555">Address, data and type set up the transaction; writing EncAbsSendCmd executes it.</text>
</svg>
