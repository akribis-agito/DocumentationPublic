<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="720" height="340" fill="#ffffff"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold">Absolute-encoder register transaction</text>

  <!-- Read column -->
  <text x="180" y="56" text-anchor="middle" font-weight="bold">Read (EncAbsWRType = 0)</text>
  <rect x="40" y="70"  width="280" height="34" rx="5" fill="#eef3fb" stroke="#3b6fb5"/>
  <text x="180" y="92" text-anchor="middle">EncAbsWRType = 0</text>
  <rect x="40" y="116" width="280" height="34" rx="5" fill="#eef3fb" stroke="#3b6fb5"/>
  <text x="180" y="138" text-anchor="middle">EncAbsAddr = register address</text>
  <rect x="40" y="162" width="280" height="34" rx="5" fill="#dbe9d6" stroke="#4a8f3c"/>
  <text x="180" y="184" text-anchor="middle">EncAbsSendCmd  (read command)</text>
  <rect x="40" y="208" width="280" height="34" rx="5" fill="#f5eede" stroke="#b58b3b"/>
  <text x="180" y="230" text-anchor="middle">firmware waits for the response</text>
  <rect x="40" y="254" width="280" height="34" rx="5" fill="#f1e4ef" stroke="#9b4f93"/>
  <text x="180" y="276" text-anchor="middle">read result from EncAbsRData</text>

  <!-- Write column -->
  <text x="540" y="56" text-anchor="middle" font-weight="bold">Write (EncAbsWRType = 1)</text>
  <rect x="400" y="70"  width="280" height="34" rx="5" fill="#eef3fb" stroke="#3b6fb5"/>
  <text x="540" y="92" text-anchor="middle">EncAbsWRType = 1</text>
  <rect x="400" y="116" width="280" height="34" rx="5" fill="#eef3fb" stroke="#3b6fb5"/>
  <text x="540" y="138" text-anchor="middle">EncAbsAddr = register address</text>
  <rect x="400" y="162" width="280" height="34" rx="5" fill="#eef3fb" stroke="#3b6fb5"/>
  <text x="540" y="184" text-anchor="middle">EncAbsWData = value to write</text>
  <rect x="400" y="208" width="280" height="34" rx="5" fill="#dbe9d6" stroke="#4a8f3c"/>
  <text x="540" y="230" text-anchor="middle">EncAbsSendCmd  (write command)</text>
  <rect x="400" y="254" width="280" height="34" rx="5" fill="#f5eede" stroke="#b58b3b"/>
  <text x="540" y="276" text-anchor="middle">firmware waits for completion</text>

  <!-- arrows -->
  <g stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="180" y1="104" x2="180" y2="116"/>
    <line x1="180" y1="150" x2="180" y2="162"/>
    <line x1="180" y1="196" x2="180" y2="208"/>
    <line x1="180" y1="242" x2="180" y2="254"/>
    <line x1="540" y1="104" x2="540" y2="116"/>
    <line x1="540" y1="150" x2="540" y2="162"/>
    <line x1="540" y1="196" x2="540" y2="208"/>
    <line x1="540" y1="242" x2="540" y2="254"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#666"/>
    </marker>
  </defs>

  <text x="360" y="314" text-anchor="middle" fill="#555">Address, data and type set the transaction; EncAbsSendCmd executes it.</text>
</svg>
