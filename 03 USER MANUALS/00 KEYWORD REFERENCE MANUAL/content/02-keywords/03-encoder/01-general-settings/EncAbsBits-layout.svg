<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" font-family="sans-serif" font-size="13">
  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="bold">Absolute-encoder word (EncAbsBits wide)</text>

  <!-- whole word bracket -->
  <rect x="40" y="50" width="560" height="46" fill="none" stroke="#444" stroke-width="1"/>

  <!-- multi-turn -->
  <rect x="40" y="50" width="300" height="46" fill="#cfe3f7" stroke="#444"/>
  <text x="190" y="78" text-anchor="middle">multi-turn count (high bits)</text>

  <!-- single-turn kept -->
  <rect x="340" y="50" width="180" height="46" fill="#d8f0d8" stroke="#444"/>
  <text x="430" y="78" text-anchor="middle">single-turn position</text>

  <!-- masked low bits -->
  <rect x="520" y="50" width="80" height="46" fill="#eee" stroke="#444"/>
  <text x="560" y="74" text-anchor="middle" font-size="11">EncAbsMB</text>
  <text x="560" y="89" text-anchor="middle" font-size="11">(discarded)</text>

  <!-- bit position labels -->
  <text x="40" y="118" text-anchor="middle" font-size="11">MSB</text>
  <text x="520" y="118" text-anchor="middle" font-size="11">low bits</text>
  <text x="600" y="118" text-anchor="middle" font-size="11">LSB</text>

  <!-- arrow: meaningful word -->
  <line x1="40" y1="140" x2="520" y2="140" stroke="#1a7" stroke-width="1.5"/>
  <text x="280" y="158" text-anchor="middle" fill="#1a7">kept after right-shift by EncAbsMB</text>

  <text x="40" y="186" font-size="12">Rollover modulus ReadingCycle = 2^(EncAbsBits &#8722; EncAbsMB)</text>
</svg>
