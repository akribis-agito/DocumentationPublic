<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Virtual encoder behaves as a signal generator (not a feedback source): a source variable (VEncSrc, e.g. another axis Pos) is scaled by VEncFact/VEncFactDen and delayed by VEncDelay, then emitted as either quadrature A/B or pulse-and-direction (VEncType) to a downstream device. Enabled by VEncOn.">
  <title>Virtual encoder: a signal generator (not a feedback source)</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="bold">Virtual encoder: a signal generator (not a feedback source)</text>

  <!-- source -->
  <rect x="20" y="70" width="140" height="64" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="90" y="96" text-anchor="middle" font-weight="bold">Source variable</text>
  <text x="90" y="114" text-anchor="middle" font-size="10" fill="#444">VEncSrc</text>
  <text x="90" y="128" text-anchor="middle" font-size="10" fill="#444">e.g. another axis Pos</text>

  <!-- scale -->
  <rect x="210" y="70" width="150" height="64" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="285" y="92" text-anchor="middle" font-size="12" font-weight="bold">Scale &amp; track</text>
  <text x="285" y="110" text-anchor="middle" font-size="10" fill="#666">VEncFact / VEncFactDen</text>
  <text x="285" y="124" text-anchor="middle" font-size="10" fill="#666">VEncDelay</text>

  <!-- output -->
  <rect x="410" y="60" width="170" height="84" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="495" y="84" text-anchor="middle" font-weight="bold">Emitted output</text>
  <text x="495" y="102" text-anchor="middle" font-size="10" fill="#444">VEncType:</text>
  <text x="495" y="116" text-anchor="middle" font-size="10" fill="#444">quadrature (A/B) or</text>
  <text x="495" y="130" text-anchor="middle" font-size="10" fill="#444">pulse + direction</text>

  <!-- downstream -->
  <rect x="620" y="78" width="60" height="48" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="650" y="100" text-anchor="middle" font-size="10">down-</text>
  <text x="650" y="114" text-anchor="middle" font-size="10">stream</text>

  <!-- arrows -->
  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="160" y1="102" x2="206" y2="102"/>
    <line x1="360" y1="102" x2="406" y2="102"/>
    <line x1="580" y1="102" x2="616" y2="102"/>
  </g>
  <text x="350" y="180" text-anchor="middle" font-size="11" fill="#666">Enabled by VEncOn. Produces an output signal; it does not replace the axis's own Pos feedback.</text>
</svg>
