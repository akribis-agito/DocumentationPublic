<svg xmlns="http://www.w3.org/2000/svg" width="660" height="180" viewBox="0 0 660 180" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Encoder emulation output: axis feedback counts are scaled and shaped by EmulRat, EmulFilter and EmulIndexType to produce an A/B/Z quadrature output for a downstream device.">
  <title>Encoder emulation output</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="330" y="22" text-anchor="middle" font-size="14" font-weight="bold">Encoder emulation output</text>

  <rect x="20" y="60" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="95" y="86" text-anchor="middle" font-weight="bold">Axis feedback</text>
  <text x="95" y="104" text-anchor="middle" font-size="10" fill="#444">encoder counts</text>

  <rect x="220" y="60" width="190" height="60" rx="6" fill="#ffffff" stroke="#8a929b" stroke-width="1"/>
  <text x="315" y="83" text-anchor="middle" font-size="12" font-weight="bold">Scale &amp; shape</text>
  <text x="315" y="101" text-anchor="middle" font-size="10" fill="#666">EmulRat, EmulFilter,</text>
  <text x="315" y="114" text-anchor="middle" font-size="10" fill="#666">EmulIndexType</text>

  <rect x="460" y="50" width="180" height="80" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="550" y="76" text-anchor="middle" font-weight="bold">A/B/Z output</text>
  <text x="550" y="94" text-anchor="middle" font-size="10" fill="#444">quadrature to a</text>
  <text x="550" y="108" text-anchor="middle" font-size="10" fill="#444">downstream device</text>

  <g stroke="#5b6b7b" stroke-width="1.4" fill="none" marker-end="url(#arrow)">
    <line x1="170" y1="90" x2="216" y2="90"/>
    <line x1="410" y1="90" x2="456" y2="90"/>
  </g>
</svg>
