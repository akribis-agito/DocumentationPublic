<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b8def"/>
    </marker>
  </defs>

  <!-- internal units -->
  <rect x="20" y="110" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="95" y="135" text-anchor="middle">Controller internal</text>
  <text x="95" y="153" text-anchor="middle">units (counts)</text>

  <!-- factor -->
  <rect x="290" y="110" width="140" height="60" rx="6" fill="#fdecea" stroke="#e0736b"/>
  <text x="360" y="135" text-anchor="middle">Scale factor</text>
  <text x="360" y="153" text-anchor="middle">...UnitFct</text>

  <!-- engineering unit -->
  <rect x="550" y="110" width="150" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="625" y="135" text-anchor="middle">Engineering unit</text>
  <text x="625" y="153" text-anchor="middle">(labelled ...UnitUnt)</text>

  <line x1="170" y1="140" x2="288" y2="140" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="140" x2="548" y2="140" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- group selects which keywords -->
  <rect x="245" y="220" width="230" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def"/>
  <text x="360" y="244" text-anchor="middle">...UnitGrp lists the keywords</text>
  <text x="360" y="262" text-anchor="middle">this conversion applies to</text>
  <line x1="360" y1="220" x2="360" y2="172" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- master enable -->
  <rect x="245" y="20" width="230" height="40" rx="6" fill="#fdecea" stroke="#e0736b"/>
  <text x="360" y="45" text-anchor="middle">UserUnitsEn = 1 (master enable)</text>
  <line x1="360" y1="60" x2="360" y2="108" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
