<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="20" y="26" font-size="15" font-weight="bold">Following-error trip &#8211; |PosErr| or |VelErr| crosses the active limit</text>

  <!-- axes -->
  <line x1="70" y1="60" x2="70" y2="240" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="70" y1="240" x2="660" y2="240" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <text x="58" y="58" text-anchor="end" font-weight="bold">|error|</text>
  <text x="660" y="258" text-anchor="end" font-weight="bold">time</text>

  <!-- closed-loop limit -->
  <line x1="70" y1="170" x2="650" y2="170" stroke="#e0736b" stroke-dasharray="6 4" stroke-width="1.4"/>
  <text x="660" y="174" fill="#b35047" font-size="12">MaxPosErr / MaxVelErr</text>

  <!-- open-loop limit (higher) -->
  <line x1="70" y1="100" x2="650" y2="100" stroke="#b07f3b" stroke-dasharray="4 3" stroke-width="1.2"/>
  <text x="660" y="104" fill="#8c6427" font-size="12">MaxPosErrOL / MaxVelErrOL</text>

  <!-- error trace: grows, exceeds threshold, then trip -->
  <path d="M70,225 C 150,220 200,210 240,195 C 290,185 330,178 380,172 L 380,172"
        fill="none" stroke="#2c6ed5" stroke-width="2"/>
  <!-- after trip drops vertically (axis off) -->
  <circle cx="380" cy="170" r="4" fill="#e0736b"/>
  <line x1="380" y1="170" x2="380" y2="240" stroke="#e0736b" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="392" y="164" fill="#b35047">cross limit &#8594; same sample: axis off</text>

  <!-- trip outcomes table -->
  <g transform="translate(20,260)">
    <text x="0" y="0" font-weight="bold">Active limit / fault by loop state:</text>
    <text x="0" y="20" fill="#333">Closed loop:   |PosErr| &gt; MaxPosErr &#8594; ConFlt 1020;   |VelErr| &gt; MaxVelErr &#8594; ConFlt 1021</text>
    <text x="0" y="40" fill="#333">Open loop / injection at CurrRef/ForceRef:   &#8594; ConFlt 1055 (pos)  /  ConFlt 1056 (vel)</text>
  </g>
</svg>
