<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" font-family="sans-serif">
  <text x="10" y="22" font-size="15" font-weight="bold">Motor-stuck detection (per control sample)</text>

  <!-- condition A -->
  <rect x="20" y="50" width="220" height="34" fill="#e6f0ff" stroke="#333"/>
  <text x="30" y="72" font-size="12">|Vel[3]| &#8804; StuckVel</text>
  <!-- condition B -->
  <rect x="20" y="100" width="220" height="34" fill="#e6f0ff" stroke="#333"/>
  <text x="30" y="122" font-size="12">|MotorCurr| &#8805; StuckCurr</text>

  <!-- AND -->
  <rect x="290" y="68" width="60" height="48" fill="#fff2cc" stroke="#333"/>
  <text x="320" y="97" font-size="14" text-anchor="middle">AND</text>
  <line x1="240" y1="67" x2="290" y2="80" stroke="#333"/>
  <line x1="240" y1="117" x2="290" y2="104" stroke="#333"/>

  <!-- counter -->
  <rect x="390" y="64" width="120" height="56" fill="#e2ffe2" stroke="#333"/>
  <text x="450" y="86" font-size="12" text-anchor="middle">true: counter++</text>
  <text x="450" y="106" font-size="12" text-anchor="middle">false: counter=0</text>
  <line x1="350" y1="92" x2="390" y2="92" stroke="#333"/>

  <!-- compare -->
  <rect x="390" y="150" width="220" height="34" fill="#ffd9d9" stroke="#333"/>
  <text x="400" y="172" font-size="12">counter &#8805; StuckTime &#8594; CON_FLT_MOTOR_STUCK</text>
  <line x1="450" y1="120" x2="450" y2="150" stroke="#333"/>

  <text x="20" y="205" font-size="11" fill="#555">Bypassed for stepper, Current-Only, Force, auto-phasing and motor-learn modes.</text>
</svg>
