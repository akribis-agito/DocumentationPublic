<svg xmlns="http://www.w3.org/2000/svg" width="660" height="240" viewBox="0 0 660 240" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Motor-stuck detection per control sample: when |Vel[3]| is below StuckVel AND |MotorCurr| is at or above StuckCurr, a counter increments; any false sample resets it to zero. When the counter reaches StuckTime the motor is turned off with ConFlt 1007. Detection is bypassed for stepper and for current-only, force, phasing and learn modes.">
  <title>Motor-stuck detection (per control sample)</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="20" y="26" font-size="15" font-weight="bold">Motor-stuck detection (per control sample)</text>

  <!-- condition A -->
  <rect x="20" y="50" width="230" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="135" y="75" text-anchor="middle">|Vel[3]| &#8804; StuckVel</text>

  <!-- condition B -->
  <rect x="20" y="110" width="230" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="135" y="135" text-anchor="middle">|MotorCurr| &#8805; StuckCurr</text>

  <!-- AND -->
  <rect x="300" y="78" width="70" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="335" y="105" text-anchor="middle" font-weight="bold">AND</text>
  <line x1="250" y1="70" x2="298" y2="90" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="250" y1="130" x2="298" y2="110" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- counter -->
  <rect x="410" y="72" width="170" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="495" y="96" text-anchor="middle">true: counter + 1</text>
  <text x="495" y="116" text-anchor="middle">false: counter = 0</text>
  <line x1="370" y1="100" x2="408" y2="100" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- trip -->
  <rect x="300" y="170" width="280" height="44" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="440" y="197" text-anchor="middle">counter &#8805; StuckTime &#8594; motor off, ConFlt 1007</text>
  <line x1="495" y1="128" x2="495" y2="168" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <text x="20" y="198" fill="#555" font-size="11">Bypassed for stepper and</text>
  <text x="20" y="214" fill="#555" font-size="11">current-only / force / phasing / learn modes.</text>
</svg>
