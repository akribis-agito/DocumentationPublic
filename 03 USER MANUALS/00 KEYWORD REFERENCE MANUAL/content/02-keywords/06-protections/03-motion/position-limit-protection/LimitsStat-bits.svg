<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <text x="20" y="26" font-size="15" font-weight="bold">LimitsStat bit layout (32-bit)</text>

  <!-- unused -->
  <rect x="20" y="54" width="360" height="44" rx="6" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
  <text x="200" y="81" text-anchor="middle" fill="#555">bits 2&#8211;31 (unused, 0)</text>

  <!-- bit 1 -->
  <rect x="380" y="54" width="60" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="410" y="81" text-anchor="middle">bit 1</text>
  <!-- bit 0 -->
  <rect x="440" y="54" width="60" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="470" y="81" text-anchor="middle">bit 0</text>

  <!-- labels -->
  <text x="410" y="120" text-anchor="middle" font-weight="bold">FLS</text>
  <text x="410" y="138" text-anchor="middle" fill="#555">0x0002</text>
  <text x="470" y="120" text-anchor="middle" font-weight="bold">RLS</text>
  <text x="470" y="138" text-anchor="middle" fill="#555">0x0001</text>

  <text x="20" y="120" fill="#555" font-size="11">FLS = forward limit switch active</text>
  <text x="20" y="138" fill="#555" font-size="11">RLS = reverse limit switch active</text>
</svg>
