<svg xmlns="http://www.w3.org/2000/svg" width="720" height="370" viewBox="0 0 720 370" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="Static brake timing for BrakeMode = 3 with three signal lanes (command, brake, motor). When the enable command rises, the brake is released first and the motor is armed after BrakeRelTime. When the command falls, the motor stays enabled for BrakeLockTime so the brake can engage before the motor is turned off. Fail-safe convention: de-energized equals engaged.">
  <title>Static brake timing &#8211; BrakeMode = 3 (automatic by motor-on)</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="20" y="26" font-size="15" font-weight="bold">Static brake timing &#8211; BrakeMode = 3 (automatic by motor-on)</text>

  <!-- Three lanes: command, brake, motor -->
  <g font-size="12" fill="#333">
    <text x="20" y="78" font-weight="bold">command (MotorOn)</text>
    <text x="20" y="158" font-weight="bold">brake</text>
    <text x="20" y="238" font-weight="bold">motor</text>
  </g>

  <!-- Lane 1: command -->
  <line x1="180" y1="80" x2="700" y2="80" stroke="#bcc7d6"/>
  <line x1="180" y1="60" x2="180" y2="80" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="180" y1="60" x2="500" y2="60" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="500" y1="60" x2="500" y2="80" stroke="#2c6ed5" stroke-width="2"/>
  <text x="340" y="54" text-anchor="middle" fill="#2c6ed5" font-size="11">on</text>
  <text x="200" y="98" text-anchor="middle" font-size="11" fill="#555">enable</text>
  <text x="500" y="98" text-anchor="middle" font-size="11" fill="#555">disable</text>

  <!-- Lane 2: brake (released/engaged). De-energized = engaged. Show "released" raised. -->
  <line x1="180" y1="160" x2="700" y2="160" stroke="#bcc7d6"/>
  <!-- start: engaged (low) -->
  <line x1="180" y1="160" x2="180" y2="160" stroke="#2c6ed5" stroke-width="2"/>
  <!-- immediately on enable, brake released -->
  <line x1="180" y1="160" x2="180" y2="140" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="180" y1="140" x2="500" y2="140" stroke="#2c6ed5" stroke-width="2"/>
  <!-- on disable, brake engaged -->
  <line x1="500" y1="140" x2="500" y2="160" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="500" y1="160" x2="700" y2="160" stroke="#2c6ed5" stroke-width="2"/>
  <text x="340" y="134" text-anchor="middle" fill="#2c6ed5" font-size="11">released (energized)</text>
  <text x="600" y="178" text-anchor="middle" fill="#2c6ed5" font-size="11">engaged (de&#8209;energized)</text>

  <!-- Lane 3: motor armed (delayed by BrakeRelTime; turned off after BrakeLockTime) -->
  <line x1="180" y1="240" x2="700" y2="240" stroke="#bcc7d6"/>
  <line x1="180" y1="240" x2="280" y2="240" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="280" y1="240" x2="280" y2="220" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="280" y1="220" x2="580" y2="220" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="580" y1="220" x2="580" y2="240" stroke="#2c6ed5" stroke-width="2"/>
  <line x1="580" y1="240" x2="700" y2="240" stroke="#2c6ed5" stroke-width="2"/>
  <text x="430" y="214" text-anchor="middle" fill="#2c6ed5" font-size="11">motor enabled / motion allowed</text>

  <!-- BrakeRelTime bracket (between brake released and motion allowed) -->
  <line x1="180" y1="260" x2="280" y2="260" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="180" y1="256" x2="180" y2="264" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="280" y1="256" x2="280" y2="264" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="230" y="278" text-anchor="middle" font-weight="bold" fill="#333">BrakeRelTime</text>
  <text x="230" y="292" text-anchor="middle" font-size="11" fill="#555">(brake opens before motion)</text>

  <!-- BrakeLockTime bracket (between disable command and motor off) -->
  <line x1="500" y1="260" x2="580" y2="260" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="500" y1="256" x2="500" y2="264" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="580" y1="256" x2="580" y2="264" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="540" y="278" text-anchor="middle" font-weight="bold" fill="#333">BrakeLockTime</text>
  <text x="540" y="292" text-anchor="middle" font-size="11" fill="#555">(brake holds before motor off)</text>

  <!-- vertical guides at key events -->
  <line x1="180" y1="40" x2="180" y2="320" stroke="#9fb4cc" stroke-dasharray="3 3"/>
  <line x1="280" y1="220" x2="280" y2="320" stroke="#9fb4cc" stroke-dasharray="3 3"/>
  <line x1="500" y1="40" x2="500" y2="320" stroke="#9fb4cc" stroke-dasharray="3 3"/>
  <line x1="580" y1="220" x2="580" y2="320" stroke="#9fb4cc" stroke-dasharray="3 3"/>

  <text x="20" y="338" fill="#555" font-size="11">Fail-safe convention: de-energized = engaged (holding). Lock request is mirrored in StatReg bit 29.</text>
  <text x="20" y="356" fill="#555" font-size="11">Other BrakeMode values (0, 1, 2, 4) skip these timed waits; see Staticbrake page for the full mode table.</text>
</svg>
