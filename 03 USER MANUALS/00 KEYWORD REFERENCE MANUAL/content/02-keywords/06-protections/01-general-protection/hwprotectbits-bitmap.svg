<svg xmlns="http://www.w3.org/2000/svg" width="820" height="290" viewBox="0 0 820 290" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="HWProtectBits and ProtectMask 16-bit layout for standalone amplifiers; bits 0-7 are core hardware protections, bits 8-15 are model-dependent reuse; ProtectMask uses the same bit positions where 1 disables that protection.">
  <title>HWProtectBits / ProtectMask &#8211; standalone bit layout</title>
  <text x="20" y="26" font-size="15" font-weight="bold">HWProtectBits / ProtectMask &#8211; standalone bit layout</text>
  <text x="20" y="46" fill="#555" font-size="11">Hardware protection signals; the lower 16 bits are meaningful. ProtectMask uses the same bit positions.</text>

  <!-- 16 cells, bit 15 on the left, bit 0 on the right; cell 48x70 with bit-# at top and label inside -->
  <g>
    <rect x="40"  y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="88"  y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="136" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="184" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="232" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="280" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="328" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="376" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="424" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="472" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="520" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="568" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="616" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="664" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="712" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="760" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  </g>

  <!-- bit numbers inside cells, top (15 .. 0 left to right) -->
  <g font-size="11" text-anchor="middle" fill="#333">
    <text x="64"  y="84">15</text>
    <text x="112" y="84">14</text>
    <text x="160" y="84">13</text>
    <text x="208" y="84">12</text>
    <text x="256" y="84">11</text>
    <text x="304" y="84">10</text>
    <text x="352" y="84">9</text>
    <text x="400" y="84">8</text>
    <text x="448" y="84">7</text>
    <text x="496" y="84">6</text>
    <text x="544" y="84">5</text>
    <text x="592" y="84">4</text>
    <text x="640" y="84">3</text>
    <text x="688" y="84">2</text>
    <text x="736" y="84">1</text>
    <text x="784" y="84">0</text>
  </g>

  <!-- divider line inside each cell between bit# and label -->
  <g stroke="#cdd6e2" stroke-width="0.8">
    <line x1="40"  y1="92" x2="808" y2="92"/>
  </g>

  <!-- short labels INSIDE the cells (bit 0 rightmost) -->
  <g font-size="9" text-anchor="middle" fill="#333">
    <text x="64"  y="118">PwBC</text>
    <text x="112" y="118">PwAC</text>
    <text x="160" y="118">5Viso</text>
    <text x="208" y="118">IPM</text>
    <text x="256" y="118">LogAC</text>
    <text x="304" y="118">5Vflt</text>
    <text x="352" y="118">AmpTyp</text>
    <text x="400" y="118">OvrCrC</text>
    <text x="448" y="118">WDog</text>
    <text x="496" y="118">STO2</text>
    <text x="544" y="118">OvrCrB</text>
    <text x="592" y="118">OvrCrA</text>
    <text x="640" y="118">AuxEnc</text>
    <text x="688" y="118">MnEnc</text>
    <text x="736" y="118">OverV</text>
    <text x="784" y="118">STO1</text>
  </g>

  <!-- band label below the bit row -->
  <text x="232" y="156" text-anchor="middle" font-size="11" fill="#555">bits 15&#8211;8 (model-dependent reuse)</text>
  <text x="616" y="156" text-anchor="middle" font-size="11" fill="#555">bits 7&#8211;0 (core hardware protections)</text>

  <text x="40" y="186" font-size="11" fill="#555">Each bit set = that hardware protection condition is active.</text>
  <text x="40" y="204" font-size="11" fill="#555">Bits 8&#8211;15 (lighter cells) are reused for different signals depending on the drive model; see the keyword tables.</text>

  <text x="40" y="232" font-size="13" font-weight="bold">ProtectMask semantics</text>
  <text x="40" y="250" font-size="11" fill="#333">ProtectMask bit = 1  &#8594;  protection is DISABLED (masked out, will not fault).</text>
  <text x="40" y="268" font-size="11" fill="#333">ProtectMask bit = 0  &#8594;  protection is ENABLED (default; condition disables the axis).</text>
  <text x="40" y="284" font-size="11" fill="#777">Non-maskable critical protections remain forced on regardless of ProtectMask.</text>
</svg>
