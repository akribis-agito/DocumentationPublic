<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="HWProtectBits and ProtectMask 16-bit layout for standalone amplifiers; bits 0-7 are core hardware protections, bits 8-15 are model-dependent reuse; ProtectMask uses the same bit positions where 1 disables that protection.">
  <title>HWProtectBits / ProtectMask &#8211; standalone bit layout</title>
  <text x="20" y="26" font-size="15" font-weight="bold">HWProtectBits / ProtectMask &#8211; standalone bit layout</text>
  <text x="20" y="46" fill="#555" font-size="11">Hardware protection signals; the lower 16 bits are meaningful. ProtectMask uses the same bit positions.</text>

  <!-- 16 cells, bit 15 on the left, bit 0 on the right -->
  <g>
    <rect x="40"  y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="84"  y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="128" y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="172" y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="216" y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="260" y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="304" y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="348" y="64" width="44" height="40" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="392" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="436" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="480" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="524" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="568" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="612" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="656" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="700" y="64" width="44" height="40" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
  </g>

  <!-- bit numbers (15 .. 0 left to right) -->
  <g font-size="12" text-anchor="middle" fill="#333">
    <text x="62"  y="89">15</text>
    <text x="106" y="89">14</text>
    <text x="150" y="89">13</text>
    <text x="194" y="89">12</text>
    <text x="238" y="89">11</text>
    <text x="282" y="89">10</text>
    <text x="326" y="89">9</text>
    <text x="370" y="89">8</text>
    <text x="414" y="89">7</text>
    <text x="458" y="89">6</text>
    <text x="502" y="89">5</text>
    <text x="546" y="89">4</text>
    <text x="590" y="89">3</text>
    <text x="634" y="89">2</text>
    <text x="678" y="89">1</text>
    <text x="722" y="89">0</text>
  </g>

  <!-- short labels under cells (bit 0 rightmost) -->
  <g font-size="9" text-anchor="middle" fill="#444">
    <text x="62"  y="122">PwBC</text>
    <text x="106" y="122">PwAC</text>
    <text x="150" y="122">5Viso</text>
    <text x="194" y="122">IPM</text>
    <text x="238" y="122">LogicAC</text>
    <text x="282" y="122">5Vflt</text>
    <text x="326" y="122">AmpType</text>
    <text x="370" y="122">OvrCurrC</text>
    <text x="414" y="122">WDog</text>
    <text x="458" y="122">STO2</text>
    <text x="502" y="122">OvrCurrB</text>
    <text x="546" y="122">OvrCurrA</text>
    <text x="590" y="122">AuxEnc</text>
    <text x="634" y="122">MainEnc</text>
    <text x="678" y="122">OverV</text>
    <text x="722" y="122">STO1</text>
  </g>

  <text x="40" y="156" font-size="11" fill="#555">Each bit set = that hardware protection condition is active.</text>
  <text x="40" y="174" font-size="11" fill="#555">Bits 8&#8211;15 (lighter cells) are reused for different signals depending on the drive model; see the keyword tables.</text>

  <text x="40" y="206" font-size="13" font-weight="bold">ProtectMask semantics</text>
  <text x="40" y="226" font-size="11" fill="#333">ProtectMask bit = 1  &#8594;  protection is DISABLED (masked out, will not fault).</text>
  <text x="40" y="244" font-size="11" fill="#333">ProtectMask bit = 0  &#8594;  protection is ENABLED (default; condition disables the axis).</text>
  <text x="40" y="262" font-size="11" fill="#777">Non-maskable critical protections remain forced on regardless of ProtectMask.</text>
</svg>
