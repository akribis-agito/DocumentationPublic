<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="HWProtectBits 16-bit layout for the Central-i (v5) drive family. Bits 0-2 are unused; bits 3-15 carry power, peripheral and safety signals from the remote amplifier folded in by the master.">
  <title>HWProtectBits &#8211; Central-i (v5) bit layout</title>
  <text x="20" y="26" font-size="15" font-weight="bold">HWProtectBits &#8211; Central-i (v5) bit layout</text>
  <text x="20" y="46" fill="#555" font-size="11">Bits extracted from the remote amplifier&#8217;s status word; lower bits 3&#8211;6 carry power/peripheral flags folded in by the master.</text>

  <!-- 16 cells, bit 15 on the left, bit 0 on the right; cell 48x70 with bit-# at top and label inside -->
  <g>
    <rect x="40"  y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="88"  y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="136" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="184" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="232" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="280" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="328" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="376" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="424" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="472" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="520" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="568" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="616" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="664" y="64" width="48" height="70" rx="4" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
    <rect x="712" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
    <rect x="760" y="64" width="48" height="70" rx="4" fill="#f4f7fb" stroke="#9fb4cc" stroke-width="1.2"/>
  </g>

  <!-- bit numbers inside cells, top (15 .. 0 left to right) -->
  <g font-size="11" text-anchor="middle" fill="#333">
    <text x="64"  y="84">15</text>
    <text x="112" y="84">14</text>
    <text x="160" y="84">13</text>
    <text x="208" y="84">12</text>
    <text x="256" y="84">11</text>
    <text x="304" y="84">10</text>
    <text x="352" y="84">9</text>
    <text x="400" y="84">8</text>
    <text x="448" y="84">7</text>
    <text x="496" y="84">6</text>
    <text x="544" y="84">5</text>
    <text x="592" y="84">4</text>
    <text x="640" y="84">3</text>
    <text x="688" y="84">2</text>
    <text x="736" y="84">1</text>
    <text x="784" y="84">0</text>
  </g>

  <!-- divider line inside each cell between bit# and label -->
  <g stroke="#cdd6e2" stroke-width="0.8">
    <line x1="40"  y1="92" x2="808" y2="92"/>
  </g>

  <!-- short labels INSIDE the cells (bit 0 rightmost) -->
  <g font-size="9" text-anchor="middle" fill="#333">
    <text x="64"  y="118">WDog</text>
    <text x="112" y="118">5Viso</text>
    <text x="160" y="118">IPM</text>
    <text x="208" y="118">OvrCur</text>
    <text x="256" y="118">AuxEnc</text>
    <text x="304" y="118">MnEnc</text>
    <text x="352" y="118">STO2</text>
    <text x="400" y="118">STO1</text>
    <text x="448" y="118">Inrush</text>
    <text x="496" y="118">LogAB</text>
    <text x="544" y="118">PwrAC</text>
    <text x="592" y="118">PwrBC</text>
    <text x="640" y="118">5Vflt</text>
    <text x="688" y="118">icNQ</text>
    <text x="736" y="118">&#8211;</text>
    <text x="784" y="118">&#8211;</text>
  </g>

  <text x="40" y="158" font-size="11" fill="#555">Bit 2 (icNQ) is the sine/cosine encoder error; bits 0&#8211;1 are reserved (encoder indexes, not included). Power-phase bits 4&#8211;5 are gated by PowerSupply so an unused phase is not reported.</text>
  <text x="40" y="178" font-size="11" fill="#555">ProtectMask uses the same bit positions: mask bit = 1 disables that protection. Non-maskable critical protections remain forced on.</text>
  <text x="40" y="198" font-size="11" fill="#555">Watchdog (bit 15), IPM fault (bit 13) and over-current (bit 12) are typically non-maskable; check Agito documentation for your specific build.</text>
</svg>
