<svg xmlns="http://www.w3.org/2000/svg" width="780" height="280" viewBox="0 0 780 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" role="img" aria-label="I2t tripping mechanism: motor current is squared then low-pass filtered with a time constant derived from PeakCL, ContCL and PeakTime. The filtered value is compared to ContCL squared with 10 percent hysteresis. By default it limits current to ContCL; if configured, it disables the axis with ConFlt code 1044.">
  <title>I&#178;t tripping mechanism &#8211; thermal model of motor current</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="20" y="26" font-size="15" font-weight="bold">I&#178;t tripping mechanism &#8211; thermal model of motor current</text>

  <!-- Stage 1: MotorCurr input -->
  <rect x="20" y="80" width="110" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="75" y="100" text-anchor="middle">motor current</text>
  <text x="75" y="118" text-anchor="middle" fill="#555" font-size="12">measured each cycle</text>

  <!-- Stage 2: square -->
  <rect x="170" y="80" width="90" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="215" y="100" text-anchor="middle">square</text>
  <text x="215" y="118" text-anchor="middle" fill="#555" font-size="12">( &#183; )&#178;</text>

  <!-- Stage 3: LPF -->
  <rect x="300" y="80" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="375" y="100" text-anchor="middle">first-order low-pass</text>
  <text x="375" y="118" text-anchor="middle" fill="#555" font-size="12">&#964; from PeakCL / ContCL / PeakTime</text>

  <!-- Stage 4: compare -->
  <rect x="490" y="80" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="565" y="100" text-anchor="middle">compare to ContCL&#178;</text>
  <text x="565" y="118" text-anchor="middle" fill="#555" font-size="12">engage / release (10% hyst.)</text>

  <!-- Stage 5a: limitation outcome -->
  <rect x="680" y="40" width="90" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="725" y="60" text-anchor="middle">limit current</text>
  <text x="725" y="78" text-anchor="middle" fill="#555" font-size="12">clamp to ContCL</text>

  <!-- Stage 5b: trip outcome -->
  <rect x="680" y="120" width="90" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="725" y="140" text-anchor="middle">disable axis</text>
  <text x="725" y="158" text-anchor="middle" fill="#b35047" font-size="12">ConFlt code 1044</text>

  <!-- arrows -->
  <line x1="130" y1="105" x2="166" y2="105" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="260" y1="105" x2="296" y2="105" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="450" y1="105" x2="486" y2="105" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- split arrow from compare to two outcomes -->
  <path d="M640,100 L660,100 L660,65 L676,65" fill="none" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <path d="M640,110 L660,110 L660,145 L676,145" fill="none" stroke="#5b6b7b" marker-end="url(#arrow)"/>

  <!-- branch labels -->
  <text x="668" y="58" fill="#555" font-size="11">default</text>
  <text x="668" y="173" fill="#b35047" font-size="11">if configured to trip</text>

  <!-- intermediate signal labels -->
  <text x="148" y="98" fill="#555" font-size="11">I</text>
  <text x="280" y="98" fill="#555" font-size="11">I&#178;</text>
  <text x="468" y="98" fill="#555" font-size="11">I&#178;_filt</text>

  <!-- bottom legend / formula -->
  <g transform="translate(20,200)">
    <text x="0" y="0" font-weight="bold">Behaviour</text>
    <text x="0" y="20" fill="#333">I&#178;_filt rises while motor current exceeds ContCL; the engage threshold is reached after PeakTime if held at PeakCL.</text>
    <text x="0" y="38" fill="#333">Engage: I&#178;_filt &gt; ContCL&#178;. Release: I&#178;_filt &lt; 0.90 &#215; ContCL&#178; (10% hysteresis prevents chatter).</text>
    <text x="0" y="56" fill="#333">While engaged, StatReg bit 25 (&quot;power limit&quot;) is set and current is clamped to the continuous level.</text>
  </g>
</svg>
