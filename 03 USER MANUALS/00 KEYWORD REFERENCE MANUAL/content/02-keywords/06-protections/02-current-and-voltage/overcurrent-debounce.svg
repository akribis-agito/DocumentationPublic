<svg xmlns="http://www.w3.org/2000/svg" width="700" height="290" viewBox="0 0 700 290" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="20" y="26" font-size="15" font-weight="bold">Over-current debounce &#8211; 4 consecutive samples (&#8776; 0.25 ms)</text>

  <!-- axes -->
  <line x1="70" y1="60" x2="70" y2="200" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <line x1="70" y1="200" x2="660" y2="200" stroke="#5b6b7b" marker-end="url(#arrow)"/>
  <text x="58" y="58" text-anchor="end" font-weight="bold">|current|</text>
  <text x="660" y="218" text-anchor="end" font-weight="bold">samples</text>

  <!-- limit line -->
  <line x1="70" y1="100" x2="650" y2="100" stroke="#e0736b" stroke-dasharray="6 4" stroke-width="1.4"/>
  <text x="660" y="104" fill="#b35047" font-size="12">limit</text>

  <!-- sample columns: 9 samples -->
  <!-- samples 1-2 below, sample 3-6 above, sample 7+ tripped -->
  <g font-size="11" text-anchor="middle" fill="#333">
    <!-- sample 1 -->
    <rect x="90"  y="150" width="32" height="50" fill="#eaf2fb" stroke="#5b8def"/>
    <text x="106" y="218">1</text>
    <text x="106" y="146" font-size="10" fill="#666">cnt=0</text>
    <!-- sample 2 -->
    <rect x="130" y="140" width="32" height="60" fill="#eaf2fb" stroke="#5b8def"/>
    <text x="146" y="218">2</text>
    <text x="146" y="136" font-size="10" fill="#666">cnt=0</text>
    <!-- sample 3 (over) -->
    <rect x="170" y="80" width="32" height="120" fill="#fdecea" stroke="#e0736b"/>
    <text x="186" y="218">3</text>
    <text x="186" y="76" font-size="10" fill="#b35047">cnt=1</text>
    <!-- sample 4 (over) -->
    <rect x="210" y="78" width="32" height="122" fill="#fdecea" stroke="#e0736b"/>
    <text x="226" y="218">4</text>
    <text x="226" y="74" font-size="10" fill="#b35047">cnt=2</text>
    <!-- sample 5 (back below: counter resets!) -->
    <rect x="250" y="145" width="32" height="55" fill="#eaf2fb" stroke="#5b8def"/>
    <text x="266" y="218">5</text>
    <text x="266" y="141" font-size="10" fill="#666">cnt=0</text>
    <!-- sample 6 (over) -->
    <rect x="290" y="85" width="32" height="115" fill="#fdecea" stroke="#e0736b"/>
    <text x="306" y="218">6</text>
    <text x="306" y="81" font-size="10" fill="#b35047">cnt=1</text>
    <!-- sample 7 (over) -->
    <rect x="330" y="82" width="32" height="118" fill="#fdecea" stroke="#e0736b"/>
    <text x="346" y="218">7</text>
    <text x="346" y="78" font-size="10" fill="#b35047">cnt=2</text>
    <!-- sample 8 (over) -->
    <rect x="370" y="80" width="32" height="120" fill="#fdecea" stroke="#e0736b"/>
    <text x="386" y="218">8</text>
    <text x="386" y="76" font-size="10" fill="#b35047">cnt=3</text>
    <!-- sample 9 (over -> trip) -->
    <rect x="410" y="78" width="32" height="122" fill="#fdecea" stroke="#e0736b"/>
    <text x="426" y="218">9</text>
    <text x="426" y="74" font-size="10" fill="#b35047">cnt=4</text>
  </g>

  <!-- trip arrow -->
  <line x1="426" y1="62" x2="500" y2="62" stroke="#e0736b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="500" y="44" width="170" height="40" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="585" y="68" text-anchor="middle" fill="#b35047">trip &#8594; axis disabled</text>

  <text x="20" y="248" fill="#555" font-size="11">Each control sample compares the absolute current against the limit. The counter increments on an over-limit</text>
  <text x="20" y="264" fill="#555" font-size="11">sample and resets to 0 on any below-limit sample. Only an unbroken run of 4 consecutive over-limit samples trips.</text>
  <text x="20" y="280" fill="#555" font-size="11">MaxMotorCurr &#8594; ConFlt 1016; MaxPhaseCurr &#8594; ConFlt 1013/1014/1015 (phase A/B/C).</text>
</svg>
