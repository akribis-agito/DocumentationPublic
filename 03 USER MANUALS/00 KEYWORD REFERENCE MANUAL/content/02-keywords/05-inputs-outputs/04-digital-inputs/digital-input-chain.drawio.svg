<svg xmlns="http://www.w3.org/2000/svg" width="900" height="150" viewBox="0 0 900 150" role="img" aria-label="Digital input chain: raw signal at the pin passes through DInFilt debounce, DInLog polarity, then DInPort holds the debounced, polarity-corrected state. Edge detection (rising or falling) drives assigned functions selected by DInMode." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Digital input chain</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <rect x="10" y="48" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="70" y="70" text-anchor="middle">Digital in pin</text>
  <text x="70" y="86" text-anchor="middle" font-size="11" fill="#5b6b7b">raw signal</text>

  <rect x="160" y="48" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="220" y="70" text-anchor="middle">Debounce</text>
  <text x="220" y="86" text-anchor="middle" font-size="11" fill="#5b6b7b">DInFilt</text>

  <rect x="310" y="48" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="370" y="70" text-anchor="middle">Polarity</text>
  <text x="370" y="86" text-anchor="middle" font-size="11" fill="#5b6b7b">DInLog</text>

  <rect x="460" y="48" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="520" y="78" text-anchor="middle">DInPort</text>

  <rect x="610" y="48" width="130" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="675" y="70" text-anchor="middle">Edge detect</text>
  <text x="675" y="86" text-anchor="middle" font-size="11" fill="#5b6b7b">rising / falling</text>

  <rect x="770" y="48" width="120" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="830" y="70" text-anchor="middle" fill="#9c3b33">Function</text>
  <text x="830" y="86" text-anchor="middle" font-size="11" fill="#9c3b33">DInMode</text>

  <path d="M130,73 L158,73" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M280,73 L308,73" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M430,73 L458,73" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M580,73 L608,73" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M740,73 L768,73" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="520" y="125" text-anchor="middle" font-size="11" fill="#5b6b7b">DInPort holds the debounced, polarity-corrected state; assigned functions act on its edges.</text>
</svg>
