<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-label="DInMode dispatch. Current and previous DInPort values feed edge detection per input bit. An active-functions table (rebuilt on DInMode write) lists function code, input mask, and target axis. Function actions are grouped into motor on/off, mode switch, limits/brake/fault, and motion control." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>DInMode function dispatch</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="380" y="22" text-anchor="middle" font-size="15" font-weight="bold">DInMode function dispatch</text>

  <!-- DInPort word -->
  <rect x="20" y="60" width="140" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="90" y="84" text-anchor="middle">DInPort (this cycle)</text>
  <text x="90" y="102" text-anchor="middle" font-size="11" fill="#5b6b7b">debounced + inverted</text>
  <text x="90" y="116" text-anchor="middle" font-size="11" fill="#5b6b7b">input word</text>

  <rect x="20" y="160" width="140" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="90" y="184" text-anchor="middle">DInPort (previous)</text>
  <text x="90" y="202" text-anchor="middle" font-size="11" fill="#5b6b7b">retained for edge</text>
  <text x="90" y="216" text-anchor="middle" font-size="11" fill="#5b6b7b">detection</text>

  <!-- XOR / edge detect -->
  <rect x="210" y="110" width="140" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="280" y="134" text-anchor="middle">Edge detect</text>
  <text x="280" y="152" text-anchor="middle" font-size="11" fill="#5b6b7b">rising and falling</text>
  <text x="280" y="166" text-anchor="middle" font-size="11" fill="#5b6b7b">per input bit</text>

  <line x1="160" y1="90" x2="210" y2="130" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="160" y1="190" x2="210" y2="150" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Active table -->
  <rect x="400" y="60" width="170" height="100" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="485" y="84" text-anchor="middle" font-weight="bold">Active functions table</text>
  <text x="485" y="104" text-anchor="middle" font-size="11" fill="#5b6b7b">function code +</text>
  <text x="485" y="118" text-anchor="middle" font-size="11" fill="#5b6b7b">input bit mask +</text>
  <text x="485" y="132" text-anchor="middle" font-size="11" fill="#5b6b7b">target axis</text>
  <text x="485" y="148" text-anchor="middle" font-size="11" fill="#5b6b7b">(rebuilt on DInMode write)</text>

  <line x1="350" y1="140" x2="400" y2="110" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Function actions -->
  <rect x="610" y="40" width="135" height="42" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="678" y="58" text-anchor="middle" font-size="11">MotorOn / off</text>
  <text x="678" y="74" text-anchor="middle" font-size="11" fill="#5b6b7b">codes 2, 24, 26</text>

  <rect x="610" y="90" width="135" height="42" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="678" y="108" text-anchor="middle" font-size="11">Mode switch</text>
  <text x="678" y="124" text-anchor="middle" font-size="11" fill="#5b6b7b">codes 16, 17, 18, 22</text>

  <rect x="610" y="140" width="135" height="42" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="678" y="158" text-anchor="middle" font-size="11">Limits, brake, fault</text>
  <text x="678" y="174" text-anchor="middle" font-size="11" fill="#5b6b7b">codes 9, 10, 12, 13, 24</text>

  <rect x="610" y="190" width="135" height="42" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="678" y="208" text-anchor="middle" font-size="11">Motion control</text>
  <text x="678" y="224" text-anchor="middle" font-size="11" fill="#5b6b7b">codes 3, 4, 5, 8, 20, 25</text>

  <line x1="570" y1="100" x2="610" y2="62" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="570" y1="108" x2="610" y2="110" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="570" y1="116" x2="610" y2="158" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="570" y1="124" x2="610" y2="206" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <text x="380" y="252" text-anchor="middle" font-size="11" fill="#5b6b7b">Up to 20 special functions may be active; values 16/17 are level-checked while motor is off.</text>
  <text x="380" y="270" text-anchor="middle" font-size="11" fill="#5b6b7b">Functionality codes 0/1 (general input, dedicated HW) take no software action in the dispatch.</text>
  <text x="380" y="290" text-anchor="middle" font-size="11" fill="#5b6b7b">Inputs feeding special functions are sampled in groups once every 16 control interrupts.</text>
</svg>
