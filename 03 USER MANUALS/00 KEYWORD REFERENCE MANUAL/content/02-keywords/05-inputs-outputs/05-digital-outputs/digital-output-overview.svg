<svg xmlns="http://www.w3.org/2000/svg" width="880" height="220" viewBox="0 0 880 220" role="img" aria-label="Digital output overview. Three control sources (manual DOutPort, software DOutMode, hardware DOutSelect) feed DOutLog polarity and DOutType sink/source selection, which together drive the digital output pin. Setting DOutSelect non-zero bypasses DOutPort and DOutLog." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Digital output overview</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <!-- three control sources feeding DOutPort -->
  <rect x="10" y="20" width="230" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="125" y="44" text-anchor="middle">Manual value (DOutPort)</text>

  <rect x="10" y="80" width="230" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="125" y="104" text-anchor="middle">Software function (DOutMode)</text>

  <rect x="10" y="140" width="230" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="125" y="164" text-anchor="middle">Hardware function (DOutSelect)</text>

  <!-- polarity -->
  <rect x="300" y="80" width="120" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="360" y="98" text-anchor="middle">Polarity</text>
  <text x="360" y="114" text-anchor="middle" font-size="11" fill="#5b6b7b">DOutLog</text>

  <!-- type -->
  <rect x="470" y="80" width="140" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="540" y="98" text-anchor="middle">Sink / source</text>
  <text x="540" y="114" text-anchor="middle" font-size="11" fill="#5b6b7b">DOutType</text>

  <!-- pin -->
  <rect x="680" y="80" width="120" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="740" y="104" text-anchor="middle">Digital out pin</text>

  <!-- arrows from sources to polarity -->
  <path d="M240,40 L270,40 L270,96 L298,96" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M240,100 L298,100" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M240,160 L270,160 L270,104 L298,104" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <path d="M420,100 L468,100" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M610,100 L678,100" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="440" y="205" text-anchor="middle" font-size="11" fill="#5b6b7b">A hardware function (DOutSelect &#8800; 0) bypasses DOutPort and DOutLog and drives the pin directly.</text>
</svg>
