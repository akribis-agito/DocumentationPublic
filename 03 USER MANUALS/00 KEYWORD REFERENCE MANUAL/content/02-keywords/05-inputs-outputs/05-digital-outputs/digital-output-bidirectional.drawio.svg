<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380" role="img" aria-label="Bi-directional digital pin. BiDirConfig selects direction. As output: DOutPort bit (or DOutMode software function) feeds a multiplexer, then through DOutLog polarity, then drives the bi-directional chip. As input: the pin's value is read by the input circuit and fed back as DInPort. The same physical pin acts as either input or output based on BiDirConfig." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Bi-directional digital I/O signal path</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="430" y="22" text-anchor="middle" font-size="14" font-weight="bold">Bi-directional digital I/O signal path</text>
  <text x="430" y="40" text-anchor="middle" font-size="11" fill="#5b6b7b">BiDirConfig selects direction for the shared pin</text>

  <!-- BiDirConfig at the top -->
  <rect x="340" y="56" width="180" height="36" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="430" y="80" text-anchor="middle" font-weight="bold" fill="#9c3b33">BiDirConfig (direction)</text>

  <!-- OUTPUT CHAIN (left half) -->
  <text x="180" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#33455a">Output path</text>

  <rect x="20"  y="130" width="160" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="100" y="155" text-anchor="middle">DOutPort bit</text>

  <rect x="20"  y="184" width="160" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="100" y="209" text-anchor="middle">DOutMode</text>

  <rect x="220" y="150" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="280" y="178" text-anchor="middle" font-weight="bold">Multiplexer</text>
  <text x="280" y="196" text-anchor="middle" font-size="11" fill="#5b6b7b">one source wins</text>

  <line x1="180" y1="150" x2="218" y2="170" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="180" y1="204" x2="218" y2="190" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="380" y="150" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="440" y="178" text-anchor="middle" font-weight="bold">DOutLog</text>
  <text x="440" y="196" text-anchor="middle" font-size="11" fill="#5b6b7b">polarity (XOR)</text>

  <line x1="340" y1="180" x2="378" y2="180" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Bi-directional chip in the middle -->
  <rect x="540" y="130" width="140" height="100" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="610" y="158" text-anchor="middle" font-weight="bold" fill="#9c3b33">Bi-directional chip</text>
  <text x="610" y="178" text-anchor="middle" font-size="11" fill="#9c3b33">drives the pin when</text>
  <text x="610" y="194" text-anchor="middle" font-size="11" fill="#9c3b33">configured as output;</text>
  <text x="610" y="210" text-anchor="middle" font-size="11" fill="#9c3b33">senses it as input</text>

  <line x1="500" y1="180" x2="538" y2="180" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- BiDirConfig down-arrow to bi-dir chip -->
  <line x1="430" y1="92" x2="580" y2="128" stroke="#e0736b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Pin on the right -->
  <rect x="720" y="150" width="120" height="60" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="780" y="178" text-anchor="middle" font-weight="bold">Pin</text>
  <text x="780" y="196" text-anchor="middle" font-size="11" fill="#5b6b7b">shared I / O</text>

  <line x1="680" y1="180" x2="718" y2="180" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- INPUT PATH back (below) -->
  <text x="430" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#33455a">Input path (when BiDirConfig = input)</text>

  <rect x="540" y="280" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="610" y="304" text-anchor="middle">Input circuit</text>
  <text x="610" y="322" text-anchor="middle" font-size="11" fill="#5b6b7b">read &amp; condition</text>

  <line x1="780" y1="210" x2="780" y2="308" stroke="#5b6b7b" stroke-width="1.4"/>
  <line x1="780" y1="308" x2="682" y2="308" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="340" y="280" width="160" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="420" y="304" text-anchor="middle">DInPort bit</text>
  <text x="420" y="322" text-anchor="middle" font-size="11" fill="#5b6b7b">read by host / functions</text>

  <line x1="540" y1="308" x2="502" y2="308" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="430" y="362" text-anchor="middle" font-size="11" fill="#5b6b7b">The output stage tristates while the pin is configured as input.</text>
</svg>
