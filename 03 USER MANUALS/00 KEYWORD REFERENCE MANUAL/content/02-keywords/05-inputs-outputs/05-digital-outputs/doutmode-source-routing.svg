<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="390" y="22" text-anchor="middle" font-size="15" font-weight="bold">DOutMode source routing</text>
  <text x="390" y="40" text-anchor="middle" font-size="11" fill="#5b6b7b">Each output's selected status drives one bit of DOutPort, which then passes through DOutLog and DOutType.</text>

  <!-- Status sources (left column) -->
  <rect x="20" y="70" width="170" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="92" text-anchor="middle" font-size="11">MotorOn (code 2)</text>

  <rect x="20" y="116" width="170" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="138" text-anchor="middle" font-size="11">MotionStat (codes 3-6)</text>

  <rect x="20" y="162" width="170" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="184" text-anchor="middle" font-size="11">InTargetStat (code 8)</text>

  <rect x="20" y="208" width="170" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="230" text-anchor="middle" font-size="11">ConFlt, LimitsStat (9, 12, 18, 19)</text>

  <rect x="20" y="254" width="170" height="36" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="105" y="276" text-anchor="middle" font-size="11">StatReg / HomingStat / ForceInTStat</text>

  <!-- Functionality table -->
  <rect x="240" y="100" width="200" height="160" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="340" y="124" text-anchor="middle" font-weight="bold">Functionality table</text>
  <text x="340" y="146" text-anchor="middle" font-size="11" fill="#5b6b7b">per output (1..N):</text>
  <text x="340" y="164" text-anchor="middle" font-size="11" fill="#5b6b7b">function code + source axis</text>
  <text x="340" y="182" text-anchor="middle" font-size="11" fill="#5b6b7b">+ set / clear mask</text>
  <text x="340" y="208" text-anchor="middle" font-size="11" fill="#5b6b7b">rebuilt atomically</text>
  <text x="340" y="226" text-anchor="middle" font-size="11" fill="#5b6b7b">on DOutMode write</text>
  <text x="340" y="248" text-anchor="middle" font-size="11" fill="#5b6b7b">up to 18 active functions</text>

  <line x1="190" y1="88" x2="240" y2="130" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="134" x2="240" y2="160" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="180" x2="240" y2="180" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="226" x2="240" y2="200" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="272" x2="240" y2="230" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DOutPort + downstream -->
  <rect x="490" y="100" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="565" y="124" text-anchor="middle">DOutPort bit</text>
  <text x="565" y="142" text-anchor="middle" font-size="11" fill="#5b6b7b">set or cleared each cycle</text>

  <rect x="490" y="170" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="565" y="194" text-anchor="middle">DOutLog (XOR)</text>
  <text x="565" y="212" text-anchor="middle" font-size="11" fill="#5b6b7b">per-bit polarity</text>

  <rect x="490" y="240" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="565" y="264" text-anchor="middle">DOutType</text>
  <text x="565" y="282" text-anchor="middle" font-size="11" fill="#5b6b7b">sink / source split</text>

  <rect x="680" y="200" width="80" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="720" y="230" text-anchor="middle">Pin</text>

  <line x1="440" y1="180" x2="490" y2="130" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="565" y1="150" x2="565" y2="170" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="565" y1="220" x2="565" y2="240" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="265" x2="680" y2="225" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Bottom -->
  <text x="390" y="305" text-anchor="middle" font-size="11" fill="#5b6b7b">A manual DOutPort write is overwritten the next cycle if DOutMode for that output is non-zero.</text>
</svg>
