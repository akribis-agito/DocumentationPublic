<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-label="Single-ended digital output signal path. Three control sources (DOutPort bit, DOutMode software function, DOutSelect hardware function) feed a multiplexer; the selected bit passes through DOutLog polarity, then DOutType selects a sink or a source output stage, finally driving the digital output pin." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Digital output, single-ended signal path</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-size="14" font-weight="bold">Digital output &#8212; single-ended signal path</text>
  <text x="410" y="40" text-anchor="middle" font-size="11" fill="#5b6b7b">three control sources select one drive value, then polarity and stage select the pin behaviour</text>

  <!-- Three sources -->
  <rect x="20"  y="60" width="180" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="110" y="80" text-anchor="middle">DOutPort bit</text>
  <text x="110" y="96" text-anchor="middle" font-size="11" fill="#5b6b7b">manual value</text>

  <rect x="20"  y="124" width="180" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="110" y="144" text-anchor="middle">DOutMode</text>
  <text x="110" y="160" text-anchor="middle" font-size="11" fill="#5b6b7b">software function</text>

  <rect x="20"  y="188" width="180" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="110" y="208" text-anchor="middle">DOutSelect</text>
  <text x="110" y="224" text-anchor="middle" font-size="11" fill="#5b6b7b">hardware function</text>

  <!-- Multiplexer -->
  <rect x="240" y="100" width="140" height="100" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="310" y="138" text-anchor="middle" font-weight="bold">Multiplexer</text>
  <text x="310" y="158" text-anchor="middle" font-size="11" fill="#5b6b7b">one source wins</text>
  <text x="310" y="174" text-anchor="middle" font-size="11" fill="#5b6b7b">per output bit</text>

  <line x1="200" y1="82"  x2="238" y2="118" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="200" y1="146" x2="238" y2="150" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="200" y1="210" x2="238" y2="182" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DOutLog polarity -->
  <rect x="420" y="124" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="490" y="148" text-anchor="middle">DOutLog</text>
  <text x="490" y="166" text-anchor="middle" font-size="11" fill="#5b6b7b">per-bit polarity (XOR)</text>

  <line x1="380" y1="150" x2="418" y2="150" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- DOutType selector -->
  <rect x="600" y="124" width="140" height="56" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="670" y="148" text-anchor="middle">DOutType</text>
  <text x="670" y="166" text-anchor="middle" font-size="11" fill="#5b6b7b">sink / source stage</text>

  <line x1="560" y1="150" x2="598" y2="150" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Pin -->
  <rect x="600" y="220" width="140" height="50" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="670" y="244" text-anchor="middle" fill="#9c3b33">Digital output pin</text>
  <text x="670" y="260" text-anchor="middle" font-size="11" fill="#9c3b33">single-ended</text>

  <line x1="670" y1="180" x2="670" y2="218" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="410" y="298" text-anchor="middle" font-size="11" fill="#5b6b7b">DOutSelect (hardware) bypasses DOutPort and DOutLog and drives the stage directly.</text>
</svg>
