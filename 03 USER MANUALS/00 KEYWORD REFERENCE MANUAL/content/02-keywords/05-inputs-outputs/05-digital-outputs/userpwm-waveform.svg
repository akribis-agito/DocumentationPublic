<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img" aria-label="UserPWM duty cycle examples. Two pulse-width-modulated traces shown: UserPWM = 1024 produces 25% duty, UserPWM = 2048 produces 50% duty. The period T is set by UserPWMDiv; UserPWM = 4095 is approximately always on, 0 is always off." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>UserPWM duty and period</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="340" y="22" text-anchor="middle" font-size="15" font-weight="bold">UserPWM duty and period</text>

  <!-- 25% duty trace -->
  <text x="50" y="60" text-anchor="start" font-weight="bold">UserPWM = 1024  (25% duty)</text>
  <line x1="50" y1="110" x2="50" y2="70" stroke="#5b8def" stroke-width="2"/>
  <line x1="50" y1="70" x2="120" y2="70" stroke="#5b8def" stroke-width="2"/>
  <line x1="120" y1="70" x2="120" y2="110" stroke="#5b8def" stroke-width="2"/>
  <line x1="120" y1="110" x2="330" y2="110" stroke="#5b8def" stroke-width="2"/>
  <line x1="330" y1="110" x2="330" y2="70" stroke="#5b8def" stroke-width="2"/>
  <line x1="330" y1="70" x2="400" y2="70" stroke="#5b8def" stroke-width="2"/>
  <line x1="400" y1="70" x2="400" y2="110" stroke="#5b8def" stroke-width="2"/>
  <line x1="400" y1="110" x2="610" y2="110" stroke="#5b8def" stroke-width="2"/>
  <line x1="610" y1="110" x2="610" y2="70" stroke="#5b8def" stroke-width="2"/>
  <line x1="610" y1="70" x2="650" y2="70" stroke="#5b8def" stroke-width="2"/>

  <!-- 50% duty trace -->
  <text x="50" y="155" text-anchor="start" font-weight="bold">UserPWM = 2048  (50% duty)</text>
  <line x1="50" y1="220" x2="50" y2="170" stroke="#5b8def" stroke-width="2"/>
  <line x1="50" y1="170" x2="190" y2="170" stroke="#5b8def" stroke-width="2"/>
  <line x1="190" y1="170" x2="190" y2="220" stroke="#5b8def" stroke-width="2"/>
  <line x1="190" y1="220" x2="330" y2="220" stroke="#5b8def" stroke-width="2"/>
  <line x1="330" y1="220" x2="330" y2="170" stroke="#5b8def" stroke-width="2"/>
  <line x1="330" y1="170" x2="470" y2="170" stroke="#5b8def" stroke-width="2"/>
  <line x1="470" y1="170" x2="470" y2="220" stroke="#5b8def" stroke-width="2"/>
  <line x1="470" y1="220" x2="610" y2="220" stroke="#5b8def" stroke-width="2"/>
  <line x1="610" y1="220" x2="610" y2="170" stroke="#5b8def" stroke-width="2"/>
  <line x1="610" y1="170" x2="650" y2="170" stroke="#5b8def" stroke-width="2"/>

  <!-- Period bracket on bottom -->
  <line x1="50" y1="245" x2="330" y2="245" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="50" y1="240" x2="50" y2="250" stroke="#5b6b7b" stroke-width="1.2"/>
  <line x1="330" y1="240" x2="330" y2="250" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="190" y="262" text-anchor="middle" font-size="11" fill="#5b6b7b">period = T (set by UserPWMDiv)</text>

  <!-- duty annotations -->
  <text x="78" y="86" font-size="10" fill="#3a6bd6">on</text>
  <text x="225" y="100" font-size="10" fill="#3a6bd6">off</text>
  <text x="110" y="186" font-size="10" fill="#3a6bd6">on</text>
  <text x="260" y="210" font-size="10" fill="#3a6bd6">off</text>

  <!-- Footnote -->
  <text x="340" y="288" text-anchor="middle" font-size="11" fill="#5b6b7b">UserPWM = 4095 &#8594; ~always on; 0 &#8594; always off; smaller UserPWMDiv &#8594; shorter T &#8594; higher frequency.</text>
</svg>
