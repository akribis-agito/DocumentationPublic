<svg xmlns="http://www.w3.org/2000/svg" width="860" height="240" viewBox="0 0 860 240" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <text x="430" y="20" text-anchor="middle" font-size="14" font-weight="bold">Analog-input conditioning chain (per cycle, per input)</text>

  <!-- ADC -->
  <rect x="10" y="70" width="90" height="50" rx="4" fill="#e8eef7" stroke="#33567a"/>
  <text x="55" y="92" text-anchor="middle">Raw ADC</text>
  <text x="55" y="108" text-anchor="middle" font-size="10">AInPort[5..8]</text>

  <!-- Filter -->
  <rect x="130" y="70" width="100" height="50" rx="4" fill="#eef7ee" stroke="#3a7a3a"/>
  <text x="180" y="90" text-anchor="middle">LPF</text>
  <text x="180" y="106" text-anchor="middle" font-size="10">AInFilt</text>

  <!-- Offset -->
  <rect x="260" y="70" width="100" height="50" rx="4" fill="#eef7ee" stroke="#3a7a3a"/>
  <text x="310" y="90" text-anchor="middle">+ Offset</text>
  <text x="310" y="106" text-anchor="middle" font-size="10">AInOffset</text>

  <!-- Deadband 1 -->
  <rect x="390" y="70" width="100" height="50" rx="4" fill="#eef7ee" stroke="#3a7a3a"/>
  <text x="440" y="90" text-anchor="middle">Deadband 1</text>
  <text x="440" y="106" text-anchor="middle" font-size="10">AInDB</text>

  <!-- Gain -->
  <rect x="520" y="70" width="100" height="50" rx="4" fill="#eef7ee" stroke="#3a7a3a"/>
  <text x="570" y="90" text-anchor="middle">x Gain</text>
  <text x="570" y="106" text-anchor="middle" font-size="10">AInGain/65536</text>

  <!-- Deadband 2 / mute -->
  <rect x="650" y="70" width="100" height="50" rx="4" fill="#eef7ee" stroke="#3a7a3a"/>
  <text x="700" y="90" text-anchor="middle">Mute (DB 2)</text>
  <text x="700" y="106" text-anchor="middle" font-size="10">AInMuteRange</text>

  <!-- Result -->
  <rect x="780" y="70" width="70" height="50" rx="4" fill="#e8eef7" stroke="#33567a"/>
  <text x="815" y="92" text-anchor="middle">Result</text>
  <text x="815" y="108" text-anchor="middle" font-size="10">AInPort</text>
  <text x="815" y="120" text-anchor="middle" font-size="10">[1..4]</text>

  <!-- arrows -->
  <line x1="100" y1="95" x2="128" y2="95" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="230" y1="95" x2="258" y2="95" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="360" y1="95" x2="388" y2="95" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="490" y1="95" x2="518" y2="95" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="620" y1="95" x2="648" y2="95" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="750" y1="95" x2="778" y2="95" stroke="#333" marker-end="url(#arrow)"/>

  <text x="430" y="170" text-anchor="middle" font-size="11">All stage values are in mV. The raw reading is stored unconditioned in the upper half of AInPort;</text>
  <text x="430" y="188" text-anchor="middle" font-size="11">the fully conditioned result is stored in the lower half and is what control functions consume.</text>
  <text x="430" y="212" text-anchor="middle" font-size="11">AInMode selects which control function (if any) reads the conditioned result.</text>
</svg>
