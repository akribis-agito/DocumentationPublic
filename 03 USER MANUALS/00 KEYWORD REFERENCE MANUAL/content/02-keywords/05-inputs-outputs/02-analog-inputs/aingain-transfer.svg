<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" role="img" aria-label="AInGain transfer characteristic: output y equals input u times AInGain divided by 65536. Three straight-line examples shown: AInGain = 65536 unity, AInGain = 131072 gain 2x, and AInGain = -65536 inverted. Both u and y are in millivolts." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>AInGain transfer characteristic</title>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker></defs>

  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">AInGain transfer characteristic</text>

  <!-- axes -->
  <line x1="50" y1="180" x2="510" y2="180" stroke="#5b6b7b" stroke-width="1"/>
  <line x1="280" y1="40" x2="280" y2="320" stroke="#5b6b7b" stroke-width="1"/>
  <text x="500" y="200" text-anchor="end">input u (mV)</text>
  <text x="288" y="50" text-anchor="start">output y (mV)</text>

  <!-- gridlines / labels -->
  <text x="270" y="178" text-anchor="end">0</text>

  <!-- y-axis ticks at +/-100, +/-200 -->
  <line x1="276" y1="100" x2="284" y2="100" stroke="#5b6b7b"/>
  <text x="270" y="104" text-anchor="end" font-size="11">+200</text>
  <line x1="276" y1="140" x2="284" y2="140" stroke="#5b6b7b"/>
  <text x="270" y="144" text-anchor="end" font-size="11">+100</text>
  <line x1="276" y1="220" x2="284" y2="220" stroke="#5b6b7b"/>
  <text x="270" y="224" text-anchor="end" font-size="11">-100</text>
  <line x1="276" y1="260" x2="284" y2="260" stroke="#5b6b7b"/>
  <text x="270" y="264" text-anchor="end" font-size="11">-200</text>

  <!-- x-axis ticks at +/-100 -->
  <line x1="200" y1="176" x2="200" y2="184" stroke="#5b6b7b"/>
  <text x="200" y="200" text-anchor="middle" font-size="11">-100</text>
  <line x1="360" y1="176" x2="360" y2="184" stroke="#5b6b7b"/>
  <text x="360" y="200" text-anchor="middle" font-size="11">+100</text>

  <!-- gain = 1 (unity): y = u, from -100 to +100 -->
  <line x1="200" y1="220" x2="360" y2="140" stroke="#5b8def" stroke-width="2"/>
  <text x="380" y="135" font-size="11" fill="#3a6bd6">AInGain = 65536 (unity)</text>

  <!-- gain = 2: y = 2u (steeper), from -100 to +100 maps to -200 to +200 -->
  <line x1="200" y1="260" x2="360" y2="100" stroke="#5b8def" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="380" y="105" font-size="11" fill="#3a6bd6">AInGain = 131072 (gain 2x)</text>

  <!-- gain = -1: y = -u (inverted), from -100 to +100 maps to +100 to -100 -->
  <line x1="200" y1="140" x2="360" y2="220" stroke="#e0736b" stroke-width="2"/>
  <text x="380" y="225" font-size="11" fill="#c0392b">AInGain = -65536 (inverted)</text>

  <!-- formula -->
  <text x="280" y="305" text-anchor="middle" font-size="12">y = (AInGain / 65536) &#215; u</text>
  <text x="280" y="322" text-anchor="middle" font-size="11" fill="#5b6b7b">Both u and y are in mV; AInGain is the integer scale (&#215;65536).</text>
</svg>
