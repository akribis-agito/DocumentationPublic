<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <!-- column headings -->
  <text x="120" y="28" text-anchor="middle" font-weight="600" fill="#33455a">Physical pins</text>
  <text x="600" y="28" text-anchor="middle" font-weight="600" fill="#33455a">Controller / keywords</text>

  <!-- ANALOG INPUT -->
  <text x="40" y="68" font-weight="600" fill="#33455a">Analog input</text>
  <rect x="40" y="78" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="115" y="105" text-anchor="middle">Analog in pin</text>
  <rect x="300" y="78" width="170" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="385" y="100" text-anchor="middle">ADC &#215; conditioning</text>
  <text x="385" y="116" text-anchor="middle" font-size="11" fill="#5b6b7b">filter, offset, gain, mute</text>
  <rect x="560" y="78" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="635" y="100" text-anchor="middle">AInPort</text>
  <text x="635" y="116" text-anchor="middle" font-size="11" fill="#5b6b7b">routed by AInMode</text>
  <path d="M190,100 L298,100" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M470,100 L558,100" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ANALOG OUTPUT -->
  <text x="40" y="158" font-weight="600" fill="#33455a">Analog output</text>
  <rect x="40" y="168" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="115" y="190" text-anchor="middle">Analog out pin</text>
  <text x="115" y="206" text-anchor="middle" font-size="11" fill="#5b6b7b">mV</text>
  <rect x="300" y="168" width="170" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="385" y="195" text-anchor="middle">DAC</text>
  <rect x="560" y="168" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="635" y="190" text-anchor="middle">AOutPort / parameter</text>
  <text x="635" y="206" text-anchor="middle" font-size="11" fill="#5b6b7b">scale + AOutOffset</text>
  <path d="M298,190 L192,190" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M558,190 L472,190" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DIGITAL INPUT -->
  <text x="40" y="248" font-weight="600" fill="#33455a">Digital input</text>
  <rect x="40" y="258" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="115" y="285" text-anchor="middle">Digital in pin</text>
  <rect x="300" y="258" width="170" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="385" y="280" text-anchor="middle">DInFilt &#215; DInLog</text>
  <text x="385" y="296" text-anchor="middle" font-size="11" fill="#5b6b7b">debounce, polarity</text>
  <rect x="560" y="258" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="635" y="280" text-anchor="middle">DInPort</text>
  <text x="635" y="296" text-anchor="middle" font-size="11" fill="#5b6b7b">functions via DInMode</text>
  <path d="M190,280 L298,280" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M470,280 L558,280" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DIGITAL OUTPUT -->
  <text x="40" y="338" font-weight="600" fill="#33455a">Digital output</text>
  <rect x="40" y="348" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="115" y="375" text-anchor="middle">Digital out pin</text>
  <rect x="300" y="348" width="170" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="385" y="370" text-anchor="middle">DOutLog &#215; DOutType</text>
  <text x="385" y="386" text-anchor="middle" font-size="11" fill="#5b6b7b">polarity, sink/source</text>
  <rect x="560" y="348" width="150" height="44" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="635" y="370" text-anchor="middle">DOutPort / functions</text>
  <text x="635" y="386" text-anchor="middle" font-size="11" fill="#5b6b7b">DOutSelect, DOutMode</text>
  <path d="M298,370 L192,370" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M558,370 L472,370" fill="none" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- BiDirConfig accent -->
  <rect x="40" y="402" width="320" height="20" rx="6" fill="#fdecea" stroke="#e0736b" stroke-width="1.2"/>
  <text x="200" y="416" text-anchor="middle" font-size="11" fill="#9c3b33">Bi-directional pins act as input or output &#8212; set by BiDirConfig</text>
</svg>
