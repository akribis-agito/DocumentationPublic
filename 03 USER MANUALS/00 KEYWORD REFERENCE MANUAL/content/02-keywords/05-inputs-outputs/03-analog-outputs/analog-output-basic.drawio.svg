<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" role="img" aria-label="Analog output in direct command mode: AOutPort is summed with AOutOffset, the sum drives the DAC, and the DAC produces the analog output voltage." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Analog output, direct command mode</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="320" y="22" text-anchor="middle" font-size="14" font-weight="bold">Analog output &#8212; direct command mode</text>
  <text x="320" y="40" text-anchor="middle" font-size="11" fill="#5b6b7b">AOutPort is the commanded value; AOutOffset shifts the DAC reference</text>

  <!-- AOutPort -->
  <rect x="20"  y="70" width="140" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="90"  y="100" text-anchor="middle" font-weight="bold">AOutPort</text>

  <!-- Sum node -->
  <circle cx="240" cy="95" r="20" fill="#ffffff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="240" y="100" text-anchor="middle" font-size="16" fill="#5b6b7b">+</text>

  <!-- AOutOffset (below, fed up) -->
  <rect x="170" y="150" width="140" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="240" y="174" text-anchor="middle" font-weight="bold">AOutOffset</text>

  <!-- DAC -->
  <rect x="320" y="70" width="140" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="390" y="94" text-anchor="middle">DAC</text>
  <text x="390" y="110" text-anchor="middle" font-size="11" fill="#5b6b7b">digital &#8594; analog</text>

  <!-- Output -->
  <rect x="480" y="70" width="140" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="550" y="100" text-anchor="middle">Analog output</text>

  <!-- arrows -->
  <line x1="160" y1="95" x2="218" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="240" y1="148" x2="240" y2="118" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="262" y1="95" x2="318" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="460" y1="95" x2="478" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
