<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" role="img" aria-label="Analog output in monitoring mode: the chosen parameter is scaled by AOutShifts, summed with AOutOffset, the sum drives the DAC, and the DAC produces the analog output voltage." font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <title>Analog output, monitoring (emulation) mode</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6b7b"/></marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold">Analog output &#8212; monitoring mode</text>
  <text x="400" y="40" text-anchor="middle" font-size="11" fill="#5b6b7b">parameter scaled by AOutShifts, then offset by AOutOffset, then DAC</text>

  <!-- Parameter source -->
  <rect x="20"  y="70" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="95"  y="92" text-anchor="middle">Parameter</text>
  <text x="95"  y="108" text-anchor="middle" font-size="11" fill="#5b6b7b">value to be emulated</text>

  <!-- Gain scaling -->
  <rect x="200" y="70" width="150" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="275" y="92" text-anchor="middle">Gain scaling</text>
  <text x="275" y="108" text-anchor="middle" font-size="11" fill="#5b6b7b">AOutShifts</text>

  <!-- Sum -->
  <circle cx="420" cy="95" r="20" fill="#ffffff" stroke="#5b6b7b" stroke-width="1.2"/>
  <text x="420" y="100" text-anchor="middle" font-size="16" fill="#5b6b7b">+</text>

  <!-- AOutOffset -->
  <rect x="350" y="150" width="140" height="40" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="420" y="174" text-anchor="middle" font-weight="bold">AOutOffset</text>

  <!-- DAC -->
  <rect x="500" y="70" width="140" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="570" y="94" text-anchor="middle">DAC</text>
  <text x="570" y="110" text-anchor="middle" font-size="11" fill="#5b6b7b">digital &#8594; analog</text>

  <!-- Output -->
  <rect x="660" y="70" width="120" height="50" rx="6" fill="#eaf2fb" stroke="#5b8def" stroke-width="1.2"/>
  <text x="720" y="100" text-anchor="middle">Analog output</text>

  <!-- arrows -->
  <line x1="170" y1="95" x2="198" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="350" y1="95" x2="398" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="420" y1="148" x2="420" y2="118" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="95" x2="498" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="640" y1="95" x2="658" y2="95" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
